<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE SIMULATOR 2008 · CREADOR CUSTOM</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background-color: black;
            color: #0f0;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border: 2px solid #0f0;
            border-radius: 0px;
            box-shadow: 0 0 15px #0f0;
            z-index: 100;
            font-size: 18px;
            letter-spacing: 2px;
        }
        #contador {
            position: absolute;
            top: 60px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border: 2px solid #0ff;
            color: #0ff;
            border-radius: 0px;
            box-shadow: 0 0 15px #0ff;
            z-index: 100;
            font-size: 16px;
        }
        /* Panel de personalización */
        #custom-panel {
            position: absolute;
            top: 120px;
            left: 20px;
            background: rgba(10, 10, 20, 0.9);
            border: 3px solid #ffaa00;
            padding: 15px;
            width: 240px;
            color: #ffaa00;
            box-shadow: 0 0 30px #ffaa00;
            z-index: 150;
            font-family: 'Courier New', monospace;
            backdrop-filter: blur(2px);
        }
        #custom-panel h3 {
            margin: 0 0 15px 0;
            text-align: center;
            text-transform: uppercase;
            letter-spacing: 3px;
            border-bottom: 2px dashed #ffaa00;
            padding-bottom: 5px;
        }
        .custom-row {
            margin-bottom: 15px;
        }
        .custom-label {
            display: block;
            font-size: 16px;
            margin-bottom: 5px;
            color: #fff700;
            text-shadow: 0 0 5px #ffaa00;
        }
        .color-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .color-btn {
            width: 35px;
            height: 35px;
            border: 2px solid white;
            cursor: pointer;
            box-shadow: 0 0 10px currentColor;
            transition: transform 0.1s;
        }
        .color-btn.selected {
            transform: scale(1.2);
            border-color: yellow;
            box-shadow: 0 0 20px yellow;
        }
        .shape-buttons {
            display: flex;
            gap: 10px;
        }
        .shape-btn {
            background: black;
            border: 2px solid #0ff;
            color: #0ff;
            font-size: 18px;
            padding: 8px 12px;
            cursor: pointer;
            text-transform: uppercase;
            box-shadow: 0 0 10px #0ff;
            flex: 1;
        }
        .shape-btn.selected {
            background: #0ff;
            color: black;
            border-color: black;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .slider-container input {
            flex: 1;
            cursor: pointer;
            accent-color: #ffaa00;
            height: 8px;
        }
        .slider-container span {
            min-width: 45px;
            text-align: right;
            color: white;
            text-shadow: 0 0 5px cyan;
        }
        #panel-colocacion {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            border: 3px solid #ffaa00;
            color: #ffaa00;
            padding: 15px 25px;
            display: flex;
            gap: 20px;
            z-index: 200;
            box-shadow: 0 0 30px #ffaa00;
        }
        .boton-bando {
            background: black;
            border: 2px solid;
            font-size: 24px;
            font-weight: bold;
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
            font-family: 'Courier New', monospace;
        }
        #btnRojo {
            border-color: #ff3333;
            color: #ff3333;
            box-shadow: 0 0 15px #ff3333;
        }
        #btnRojo.activo {
            background: #ff3333;
            color: black;
        }
        #btnAzul {
            border-color: #3366ff;
            color: #3366ff;
            box-shadow: 0 0 15px #3366ff;
        }
        #btnAzul.activo {
            background: #3366ff;
            color: black;
        }
        #btnIniciar {
            background: black;
            border: 3px solid #00ff00;
            color: #00ff00;
            font-size: 28px;
            padding: 12px 40px;
            cursor: pointer;
            box-shadow: 0 0 30px #00ff00;
            letter-spacing: 4px;
        }
        #btnIniciar:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        #btnReiniciar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            border: 3px solid #ff00ff;
            color: #ff00ff;
            font-size: 20px;
            padding: 10px 30px;
            cursor: pointer;
            box-shadow: 0 0 25px #ff00ff;
            z-index: 200;
            letter-spacing: 2px;
        }
        .instruccion {
            position: absolute;
            top: 120px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border: 2px solid yellow;
            color: yellow;
            padding: 10px;
            font-size: 16px;
            z-index: 100;
            max-width: 250px;
            text-align: center;
            box-shadow: 0 0 20px yellow;
        }
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.03) 0px, rgba(0,0,0,0.3) 2px, transparent 3px);
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="info">⚡ BATTLE SIMULATOR 2008 · CREADOR CUSTOM ⚡</div>
    <div id="contador">ROJO: <span id="rojo-count">0</span> | AZUL: <span id="azul-count">0</span></div>
    
    <!-- Panel de personalización -->
    <div id="custom-panel">
        <h3>🎨 CREADOR DE TROPAS</h3>
        <div class="custom-row">
            <span class="custom-label">COLOR CUERPO</span>
            <div class="color-buttons">
                <div class="color-btn" style="background:#ff3333; box-shadow:0 0 15px #ff3333;" data-color="#ff3333" data-name="rojo"></div>
                <div class="color-btn" style="background:#3366ff; box-shadow:0 0 15px #3366ff;" data-color="#3366ff" data-name="azul"></div>
                <div class="color-btn" style="background:#33ff33; box-shadow:0 0 15px #33ff33;" data-color="#33ff33" data-name="verde"></div>
                <div class="color-btn" style="background:#ffff33; box-shadow:0 0 15px #ffff33;" data-color="#ffff33" data-name="amarillo"></div>
                <div class="color-btn" style="background:#ff33ff; box-shadow:0 0 15px #ff33ff;" data-color="#ff33ff" data-name="morado"></div>
                <div class="color-btn" style="background:#ff8800; box-shadow:0 0 15px #ff8800;" data-color="#ff8800" data-name="naranja"></div>
            </div>
        </div>
        <div class="custom-row">
            <span class="custom-label">FORMA CABEZA</span>
            <div class="shape-buttons">
                <button class="shape-btn" data-shape="sphere">⚪</button>
                <button class="shape-btn" data-shape="cube">⬛</button>
                <button class="shape-btn" data-shape="pyramid">🔺</button>
            </div>
        </div>
        <div class="custom-row">
            <span class="custom-label">VELOCIDAD: <span id="speed-val">0.06</span></span>
            <div class="slider-container">
                <input type="range" id="speed-slider" min="0.02" max="0.15" step="0.01" value="0.06">
            </div>
        </div>
        <div class="custom-row">
            <span class="custom-label">TAMAÑO: <span id="size-val">1.0</span></span>
            <div class="slider-container">
                <input type="range" id="size-slider" min="0.6" max="1.8" step="0.1" value="1.0">
            </div>
        </div>
    </div>

    <div class="instruccion">
        🖱️ SELECCIONA BANDO, PERSONALIZA Y HAZ CLIC EN EL SUELO<br>
        <span style="color:#ff3333">ROJO</span> ⚔️ <span style="color:#3366ff">AZUL</span>
    </div>

    <div id="panel-colocacion">
        <button class="boton-bando" id="btnRojo">🔥 ROJO</button>
        <button class="boton-bando" id="btnAzul">💧 AZUL</button>
        <button id="btnIniciar">⚔️ INICIAR BATALLA</button>
    </div>
    <button id="btnReiniciar">🔄 REINICIAR COLOCACIÓN</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- CONFIGURACIÓN INICIAL ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.3;
        controls.target.set(0, 2, 0);

        // --- LUCES ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 20;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 30;
        scene.add(dirLight);

        const lightRed = new THREE.PointLight(0xff3333, 0.6, 30);
        lightRed.position.set(-8, 3, 5);
        scene.add(lightRed);
        
        const lightBlue = new THREE.PointLight(0x3333ff, 0.6, 30);
        lightBlue.position.set(8, 3, -5);
        scene.add(lightBlue);

        // --- SUELO ---
        const groundGeometry = new THREE.PlaneGeometry(30, 30);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x224422, roughness: 0.7 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(30, 20, 0xff00ff, 0x00ffff);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // Fondo estrellado
        for (let i = 0; i < 30; i++) {
            const starMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, emissive: 0x222222 });
            const starGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const star = new THREE.Mesh(starGeo, starMat);
            star.position.set((Math.random() - 0.5) * 50, Math.random() * 15 + 5, (Math.random() - 0.5) * 50);
            star.castShadow = true;
            scene.add(star);
        }

        // --- EJÉRCITOS ---
        let armyRed = [];
        let armyBlue = [];
        
        let bandoSeleccionado = 'rojo';
        const maxTropas = 20;

        // Referencias a los botones de bando
        const btnRojo = document.getElementById('btnRojo');
        const btnAzul = document.getElementById('btnAzul');
        const btnIniciar = document.getElementById('btnIniciar');
        const btnReiniciar = document.getElementById('btnReiniciar');

        btnRojo.classList.add('activo');

        btnRojo.addEventListener('click', () => {
            bandoSeleccionado = 'rojo';
            btnRojo.classList.add('activo');
            btnAzul.classList.remove('activo');
        });

        btnAzul.addEventListener('click', () => {
            bandoSeleccionado = 'azul';
            btnAzul.classList.add('activo');
            btnRojo.classList.remove('activo');
        });

        // --- PERSONALIZACIÓN ---
        const customState = {
            color: '#ff3333', // por defecto rojo
            shape: 'sphere',
            speed: 0.06,
            size: 1.0
        };

        // Colores
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                customState.color = btn.dataset.color;
            });
        });
        // Seleccionar rojo por defecto
        document.querySelector('.color-btn[data-color="#ff3333"]').classList.add('selected');

        // Formas
        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                customState.shape = btn.dataset.shape;
            });
        });
        // Seleccionar esfera por defecto
        document.querySelector('.shape-btn[data-shape="sphere"]').classList.add('selected');

        // Sliders
        const speedSlider = document.getElementById('speed-slider');
        const speedSpan = document.getElementById('speed-val');
        speedSlider.addEventListener('input', (e) => {
            customState.speed = parseFloat(e.target.value);
            speedSpan.textContent = customState.speed.toFixed(2);
        });

        const sizeSlider = document.getElementById('size-slider');
        const sizeSpan = document.getElementById('size-val');
        sizeSlider.addEventListener('input', (e) => {
            customState.size = parseFloat(e.target.value);
            sizeSpan.textContent = customState.size.toFixed(1);
        });

        // --- FUNCIÓN PARA CREAR UNIDAD PERSONALIZADA ---
        function crearUnidadCustom(equipo) {
            const group = new THREE.Group();
            const colorHex = parseInt(customState.color.slice(1), 16);
            
            // Cuerpo (cilindro con el color elegido)
            const bodyGeo = new THREE.CylinderGeometry(0.5 * customState.size, 0.5 * customState.size, 1.2 * customState.size, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, emissive: 0x222222 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6 * customState.size;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Cabeza según forma
            let headGeo, headMat;
            const headColor = 0xffcc88; // color carne fijo para que resalte
            if (customState.shape === 'sphere') {
                headGeo = new THREE.SphereGeometry(0.4 * customState.size, 6, 4);
            } else if (customState.shape === 'cube') {
                headGeo = new THREE.BoxGeometry(0.7 * customState.size, 0.7 * customState.size, 0.7 * customState.size);
            } else if (customState.shape === 'pyramid') {
                headGeo = new THREE.ConeGeometry(0.5 * customState.size, 0.8 * customState.size, 4);
            }
            headMat = new THREE.MeshStandardMaterial({ color: headColor, emissive: 0x332200 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.4 * customState.size;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            // Ojos (solo si la cabeza lo permite, los colocamos siempre)
            const eyeGeo = new THREE.SphereGeometry(0.1 * customState.size, 4);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.2 * customState.size, 1.5 * customState.size, 0.4 * customState.size);
            group.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.2 * customState.size, 1.5 * customState.size, 0.4 * customState.size);
            group.add(eyeR);
            
            return group;
        }

        // --- COLOCACIÓN MEDIANTE CLIC ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();
        let batallaIniciada = false;

        function onMouseClick(event) {
            if (batallaIniciada) return;

            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, target)) {
                if (Math.abs(target.x) < 14 && Math.abs(target.z) < 14) {
                    // Límite de tropas
                    if (bandoSeleccionado === 'rojo' && armyRed.length >= maxTropas) {
                        alert('Máximo de tropas rojas alcanzado');
                        return;
                    }
                    if (bandoSeleccionado === 'azul' && armyBlue.length >= maxTropas) {
                        alert('Máximo de tropas azules alcanzado');
                        return;
                    }

                    const nuevaUnidad = crearUnidadCustom(bandoSeleccionado);
                    nuevaUnidad.position.copy(target);
                    nuevaUnidad.position.y = 0;
                    nuevaUnidad.rotation.y = Math.random() * Math.PI * 2;
                    
                    scene.add(nuevaUnidad);
                    
                    const unidadData = {
                        mesh: nuevaUnidad,
                        health: 1,
                        speed: customState.speed // velocidad personalizada
                    };
                    
                    if (bandoSeleccionado === 'rojo') {
                        armyRed.push(unidadData);
                    } else {
                        armyBlue.push(unidadData);
                    }
                    
                    actualizarContador();
                }
            }
        }

        renderer.domElement.addEventListener('click', onMouseClick);

        function actualizarContador() {
            document.getElementById('rojo-count').innerText = armyRed.length;
            document.getElementById('azul-count').innerText = armyBlue.length;
        }

        // --- INICIAR BATALLA ---
        btnIniciar.addEventListener('click', () => {
            if (armyRed.length === 0 || armyBlue.length === 0) {
                alert('¡Debe haber tropas de ambos bandos!');
                return;
            }
            batallaIniciada = true;
            btnIniciar.disabled = true;
            btnRojo.disabled = true;
            btnAzul.disabled = true;
            document.getElementById('info').innerHTML = '⚡ BATALLA EN CURSO ⚡';
        });

        // --- REINICIAR ---
        btnReiniciar.addEventListener('click', () => {
            armyRed.forEach(u => scene.remove(u.mesh));
            armyBlue.forEach(u => scene.remove(u.mesh));
            armyRed = [];
            armyBlue = [];
            
            deathParticles.forEach(p => scene.remove(p));
            deathParticles.length = 0;
            
            batallaIniciada = false;
            btnIniciar.disabled = false;
            btnRojo.disabled = false;
            btnAzul.disabled = false;
            document.getElementById('info').innerHTML = '⚡ BATTLE SIMULATOR 2008 · CREADOR CUSTOM ⚡';
            
            actualizarContador();
        });

        // --- LÓGICA DE BATALLA ---
        const deathParticles = [];

        function checkCollisionsAndMove() {
            if (!batallaIniciada) return;

            // Mover rojos
            for (let i = armyRed.length - 1; i >= 0; i--) {
                const unit = armyRed[i];
                let dirX = -unit.mesh.position.x;
                let dirZ = -unit.mesh.position.z * 0.5;
                const len = Math.sqrt(dirX*dirX + dirZ*dirZ);
                if (len > 0.1) {
                    unit.mesh.position.x += (dirX / len) * unit.speed;
                    unit.mesh.position.z += (dirZ / len) * unit.speed;
                }
                if (len > 0.1) {
                    unit.mesh.rotation.y = Math.atan2(dirX, dirZ);
                }
            }

            for (let i = armyBlue.length - 1; i >= 0; i--) {
                const unit = armyBlue[i];
                let dirX = -unit.mesh.position.x;
                let dirZ = -unit.mesh.position.z * 0.5;
                const len = Math.sqrt(dirX*dirX + dirZ*dirZ);
                if (len > 0.1) {
                    unit.mesh.position.x += (dirX / len) * unit.speed;
                    unit.mesh.position.z += (dirZ / len) * unit.speed;
                }
                if (len > 0.1) {
                    unit.mesh.rotation.y = Math.atan2(dirX, dirZ);
                }
            }

            // Colisiones
            for (let i = armyRed.length - 1; i >= 0; i--) {
                const redUnit = armyRed[i];
                for (let j = armyBlue.length - 1; j >= 0; j--) {
                    const blueUnit = armyBlue[j];
                    const dist = redUnit.mesh.position.distanceTo(blueUnit.mesh.position);
                    if (dist < 1.5) {
                        createDeathEffect(redUnit.mesh.position.clone().lerp(blueUnit.mesh.position, 0.5));
                        scene.remove(redUnit.mesh);
                        scene.remove(blueUnit.mesh);
                        armyRed.splice(i, 1);
                        armyBlue.splice(j, 1);
                        break;
                    }
                }
            }

            actualizarContador();

            if (armyRed.length === 0 || armyBlue.length === 0) {
                batallaIniciada = false;
                btnIniciar.disabled = false;
                btnRojo.disabled = false;
                btnAzul.disabled = false;
                document.getElementById('info').innerHTML = '⚡ BATALLA FINALIZADA · REINICIA ⚡';
            }
        }

        function createDeathEffect(position) {
            for (let k = 0; k < 6; k++) {
                const boxGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
                const boxMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, emissive: 0x442200 });
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.copy(position);
                box.position.y += 0.5;
                box.castShadow = true;
                scene.add(box);
                
                box.userData = { velocity: new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.3, (Math.random()-0.5)*0.2), life: 30 };
                deathParticles.push(box);
            }
        }

        // --- ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);

            checkCollisionsAndMove();

            for (let i = deathParticles.length - 1; i >= 0; i--) {
                const p = deathParticles[i];
                p.position.add(p.userData.velocity);
                p.userData.velocity.y -= 0.01;
                p.userData.life--;
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    deathParticles.splice(i, 1);
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        actualizarContador();
    </script>
</body>
</html>
