<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ NOOB WAR · ZOOM & BATALLA CENTRAL · 2008 🗺️</title>
    <style>
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background: #1b3b4f;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .game-container {
            max-width: 1300px;
            width: 100%;
            background: #6d9ac4;
            border: 6px ridge #ffffff;
            box-shadow: 12px 12px 0px #0a1f2b;
            padding: 24px 20px;
        }

        .header {
            background: #4b6e8c;
            border: 4px outset #e0e0e0;
            padding: 14px 8px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 4px 4px 0px #1f4f6e, 6px 6px 0px #0b2b3f;
            letter-spacing: 2px;
        }

        .stats-panel {
            background: #b8d8f0;
            border: 4px inset #f0f8ff;
            padding: 20px 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 16px;
            box-shadow: inset 2px 2px 0px #3b5e7a;
        }

        .stat-item {
            background: #e6f0fa;
            border: 3px ridge #ffffff;
            padding: 12px 18px;
            font-size: 22px;
            font-weight: bold;
            color: #0f2f44;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 3px 3px 0px #3b6e8c;
        }

        .stat-item span {
            background: #1b2f44;
            color: #ffffc0;
            padding: 4px 16px;
            border: 2px inset #c0c0c0;
            font-size: 30px;
            margin-left: 8px;
        }

        .map-wrapper {
            position: relative;
            margin: 20px 0;
            border: 8px ridge #5f8faf;
            background: #2f5f7a;
            padding: 0;
            overflow: hidden;
            cursor: grab;
            width: 100%;
            height: 600px;
        }

        .map-wrapper:active {
            cursor: grabbing;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #3f7a5a;
            image-rendering: crisp-edges;
        }

        .buildings-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 25px 0 15px;
        }

        .roblox-btn {
            background: #c0c0c0;
            border: 6px outset #f8f8f8;
            font-size: 26px;
            font-weight: bold;
            padding: 16px 32px;
            cursor: pointer;
            color: #1f2f3f;
            text-transform: uppercase;
            box-shadow: 5px 5px 0px #2f4f6f;
            transition: 0.05s linear;
            letter-spacing: 2px;
            min-width: 260px;
        }

        .roblox-btn:active {
            border: 6px inset #f8f8f8;
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #2f4f6f;
        }

        .roblox-btn:disabled {
            opacity: 0.4;
            filter: grayscale(60%);
            transform: none;
            border: 6px outset #a0a0a0;
            box-shadow: 2px 2px 0px #1f3f4f;
            cursor: not-allowed;
        }

        .attack-btn {
            background: #c02f2f;
            border: 8px outset #ffc0c0;
            font-size: 44px;
            padding: 24px 70px;
            color: white;
            text-shadow: 4px 4px 0 #5f1f1f;
            box-shadow: 12px 12px 0 #2f1f1f;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .log-box {
            background: #0f1f2b;
            border: 6px inset #3f6f8f;
            padding: 16px;
            color: #9bff9b;
            font-size: 20px;
            min-height: 100px;
            max-height: 140px;
            overflow-y: auto;
            box-shadow: inset 0 0 0 2px #1f4f6e;
            margin: 20px 0 10px;
        }

        .log-box p {
            margin: 4px 0;
            border-left: 4px solid #5faf5f;
            padding-left: 10px;
        }

        .footer-note {
            text-align: center;
            font-size: 18px;
            color: #e0f0ff;
            text-shadow: 2px 2px 0 #0f2a3f;
            background: #2b4f6b;
            padding: 6px;
            border: 2px ridge #9fbfdf;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            🏰 NOOB WAR · ZOOM & BATALLA CENTRAL 🏰
        </div>

        <!-- Panel de recursos -->
        <div class="stats-panel">
            <div class="stat-item">💰 TIX <span id="tixDisplay">300</span></div>
            <div class="stat-item">⚔️ NOOBS <span id="noobsDisplay">0</span></div>
            <div class="stat-item">🏭 SPAWNERS <span id="spawnerCount">1</span></div>
            <div class="stat-item">🔬 INVEST. <span id="investigatorCount">1</span></div>
        </div>

        <!-- Mapa con zoom y pan -->
        <div class="map-wrapper" id="mapWrapper">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
        </div>

        <!-- Botones de construcción -->
        <div class="buildings-panel">
            <button class="roblox-btn" id="buySpawnerBtn">🏭 COMPRAR SPAWNER (50💰)</button>
            <button class="roblox-btn" id="buyInvestigatorBtn">🔬 COMPRAR INVESTIGADOR (30💰)</button>
        </div>

        <!-- Botón de ataque central -->
        <div style="display: flex; justify-content: center;">
            <button class="roblox-btn attack-btn" id="attackBtn">💥 ¡ATACAR! 💥</button>
        </div>

        <!-- Log de eventos -->
        <div class="log-box" id="logMessages">
            <p>🌍 2008: Zoom con rueda, arrastra el mapa. Los noobs luchan en el centro.</p>
        </div>

        <div class="footer-note">
            🧱 ROBLOX 2008 · MAPA 120x120 · BATALLA CENTRAL · ZOOM 🧱
        </div>
    </div>

    <script>
        (function() {
            // --- Dimensiones del mapa ---
            const MAP_SIZE = 120;            // 120x120 casillas
            const CELL_SIZE = 5;              // píxeles por casilla (canvas 600x600)

            // --- Territorios ---
            const PLAYER_ZONE = { rowMin: 0, rowMax: 39, colMin: 0, colMax: 39 };
            const ENEMY_ZONE = { rowMin: 80, rowMax: 119, colMin: 80, colMax: 119 };

            // --- Estado del juego ---
            let playerTix = 300;
            let playerNoobs = 0;
            let enemyNoobs = 5;

            let playerSpawners = [];          // {x, y}
            let playerInvestigators = [];
            let enemySpawners = [];

            const SPAWNER_COST = 50;
            const INVESTIGATOR_COST = 30;
            const REWARD = 50;
            const PRODUCTION_INTERVAL = 3000;  // 3 segundos

            // Variables para zoom y pan
            let viewX = 300, viewY = 300;      // centro de la vista en coordenadas del mundo (píxeles)
            let zoom = 1.0;
            const MIN_ZOOM = 0.5;
            const MAX_ZOOM = 3.0;

            // Variables para arrastrar
            let isDragging = false;
            let lastMouseX, lastMouseY;

            // Variables para animación de batalla
            let isBattling = false;
            let battleProgress = 0;             // 0 a 1
            let battleResult = null;             // { playerWon, playerLoss, enemyLoss, reward }
            let battleAnimationFrame = null;
            const BATTLE_DURATION = 1000;        // 1 segundo

            // Elementos DOM
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const mapWrapper = document.getElementById('mapWrapper');
            const tixSpan = document.getElementById('tixDisplay');
            const noobsSpan = document.getElementById('noobsDisplay');
            const spawnerCountSpan = document.getElementById('spawnerCount');
            const investigatorCountSpan = document.getElementById('investigatorCount');
            const logDiv = document.getElementById('logMessages');
            const buySpawnerBtn = document.getElementById('buySpawnerBtn');
            const buyInvestigatorBtn = document.getElementById('buyInvestigatorBtn');
            const attackBtn = document.getElementById('attackBtn');

            // --- Funciones de utilidad ---
            function agregarLog(mensaje) {
                const p = document.createElement('p');
                p.textContent = mensaje;
                logDiv.appendChild(p);
                while (logDiv.children.length > 6) {
                    logDiv.removeChild(logDiv.firstChild);
                }
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            // --- Dibujar mapa completo con transformaciones ---
            function dibujarMapa() {
                ctx.clearRect(0, 0, 600, 600);
                ctx.save();
                // Aplicar zoom y pan (centrado en viewX, viewY)
                ctx.translate(300, 300);
                ctx.scale(zoom, zoom);
                ctx.translate(-viewX, -viewY);

                // Fondo de césped
                ctx.fillStyle = '#3f7a5a';
                ctx.fillRect(0, 0, 600, 600);

                // Dibujar líneas de cuadrícula (cada 5 píxeles = 1 casilla)
                ctx.strokeStyle = '#2f5f4f';
                ctx.lineWidth = 1 / zoom; // ajustar grosor para que no desaparezca con zoom
                for (let i = 0; i <= MAP_SIZE; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * CELL_SIZE, 0);
                    ctx.lineTo(i * CELL_SIZE, 600);
                    ctx.strokeStyle = '#2f5f4f';
                    ctx.stroke();
                    ctx.beginPath();
                    ctx.moveTo(0, i * CELL_SIZE);
                    ctx.lineTo(600, i * CELL_SIZE);
                    ctx.stroke();
                }

                // Sombras de territorios
                ctx.fillStyle = '#ffffff20';
                ctx.fillRect(PLAYER_ZONE.colMin * CELL_SIZE, PLAYER_ZONE.rowMin * CELL_SIZE, 
                            (PLAYER_ZONE.colMax - PLAYER_ZONE.colMin + 1) * CELL_SIZE, 
                            (PLAYER_ZONE.rowMax - PLAYER_ZONE.rowMin + 1) * CELL_SIZE);
                ctx.fillStyle = '#ff000020';
                ctx.fillRect(ENEMY_ZONE.colMin * CELL_SIZE, ENEMY_ZONE.rowMin * CELL_SIZE, 
                            (ENEMY_ZONE.colMax - ENEMY_ZONE.colMin + 1) * CELL_SIZE, 
                            (ENEMY_ZONE.rowMax - ENEMY_ZONE.rowMin + 1) * CELL_SIZE);

                // Dibujar edificios del jugador
                playerSpawners.forEach(s => {
                    ctx.fillStyle = '#3a7aff';
                    ctx.fillRect(s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${4 * (1/zoom)}px monospace`; // ajustar texto al zoom
                    ctx.fillText('🏭', s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 4);
                });
                playerInvestigators.forEach(s => {
                    ctx.fillStyle = '#3aff3a';
                    ctx.fillRect(s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    ctx.fillStyle = '#000000';
                    ctx.font = `bold ${4 * (1/zoom)}px monospace`;
                    ctx.fillText('🔬', s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 4);
                });
                enemySpawners.forEach(s => {
                    ctx.fillStyle = '#ff3a3a';
                    ctx.fillRect(s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${4 * (1/zoom)}px monospace`;
                    ctx.fillText('🏭', s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 4);
                });

                // --- Dibujar animación de batalla (tropas moviéndose al centro) ---
                if (isBattling && battleProgress < 1.0) {
                    const centroX = 300; // centro del canvas en coordenadas mundiales
                    const centroY = 300;

                    // Calculamos posiciones interpoladas para grupos de noobs
                    const numPlayerMarkers = Math.min(playerNoobs, 30); // límite para no saturar
                    const numEnemyMarkers = Math.min(enemyNoobs, 30);

                    // Posición de origen de los marcadores: un punto aleatorio dentro del territorio del jugador/enemigo
                    for (let i = 0; i < numPlayerMarkers; i++) {
                        // Origen aleatorio en zona jugador
                        const row = PLAYER_ZONE.rowMin + Math.random() * (PLAYER_ZONE.rowMax - PLAYER_ZONE.rowMin);
                        const col = PLAYER_ZONE.colMin + Math.random() * (PLAYER_ZONE.colMax - PLAYER_ZONE.colMin);
                        const startX = col * CELL_SIZE + CELL_SIZE/2;
                        const startY = row * CELL_SIZE + CELL_SIZE/2;
                        const currentX = startX + (centroX - startX) * battleProgress;
                        const currentY = startY + (centroY - startY) * battleProgress;
                        ctx.beginPath();
                        ctx.arc(currentX, currentY, 3, 0, 2*Math.PI);
                        ctx.fillStyle = '#ffff00';
                        ctx.shadowColor = '#ffaa00';
                        ctx.shadowBlur = 5;
                        ctx.fill();
                    }
                    for (let i = 0; i < numEnemyMarkers; i++) {
                        const row = ENEMY_ZONE.rowMin + Math.random() * (ENEMY_ZONE.rowMax - ENEMY_ZONE.rowMin);
                        const col = ENEMY_ZONE.colMin + Math.random() * (ENEMY_ZONE.colMax - ENEMY_ZONE.colMin);
                        const startX = col * CELL_SIZE + CELL_SIZE/2;
                        const startY = row * CELL_SIZE + CELL_SIZE/2;
                        const currentX = startX + (centroX - startX) * battleProgress;
                        const currentY = startY + (centroY - startY) * battleProgress;
                        ctx.beginPath();
                        ctx.arc(currentX, currentY, 3, 0, 2*Math.PI);
                        ctx.fillStyle = '#ff4444';
                        ctx.shadowColor = '#aa0000';
                        ctx.shadowBlur = 5;
                        ctx.fill();
                    }
                    ctx.shadowBlur = 0; // reset
                }

                ctx.restore();
            }

            // --- Actualizar UI y canvas ---
            function actualizarUI() {
                tixSpan.textContent = playerTix;
                noobsSpan.textContent = playerNoobs;
                spawnerCountSpan.textContent = playerSpawners.length;
                investigatorCountSpan.textContent = playerInvestigators.length;

                // Habilitar botones solo si no estamos en batalla
                if (!isBattling) {
                    buySpawnerBtn.disabled = (playerTix < SPAWNER_COST);
                    buyInvestigatorBtn.disabled = (playerTix < INVESTIGATOR_COST);
                    attackBtn.disabled = false;
                } else {
                    buySpawnerBtn.disabled = true;
                    buyInvestigatorBtn.disabled = true;
                    attackBtn.disabled = true;
                }

                dibujarMapa();
            }

            // --- Obtener celda libre aleatoria en zona ---
            function getRandomFreeCell(zone, existingBuildings) {
                const maxAttempts = 1000;
                for (let attempt = 0; attempt < maxAttempts; attempt++) {
                    const row = Math.floor(Math.random() * (zone.rowMax - zone.rowMin + 1)) + zone.rowMin;
                    const col = Math.floor(Math.random() * (zone.colMax - zone.colMin + 1)) + zone.colMin;
                    const ocupado = existingBuildings.some(b => b.x === row && b.y === col);
                    if (!ocupado) {
                        return { x: row, y: col };
                    }
                }
                return null;
            }

            // --- Comprar spawner ---
            function comprarSpawner() {
                if (playerTix < SPAWNER_COST) {
                    agregarLog(`❌ Necesitas ${SPAWNER_COST} TIX.`);
                    return;
                }
                const edificios = [...playerSpawners, ...playerInvestigators];
                const pos = getRandomFreeCell(PLAYER_ZONE, edificios);
                if (!pos) {
                    agregarLog('⚠️ No hay espacio en tu territorio.');
                    return;
                }
                playerTix -= SPAWNER_COST;
                playerSpawners.push(pos);
                agregarLog(`🏭 Nuevo spawner en (${pos.x}, ${pos.y}).`);
                actualizarUI();
            }

            function comprarInvestigador() {
                if (playerTix < INVESTIGATOR_COST) {
                    agregarLog(`❌ Necesitas ${INVESTIGATOR_COST} TIX.`);
                    return;
                }
                const edificios = [...playerSpawners, ...playerInvestigators];
                const pos = getRandomFreeCell(PLAYER_ZONE, edificios);
                if (!pos) {
                    agregarLog('⚠️ No hay espacio en tu territorio.');
                    return;
                }
                playerTix -= INVESTIGATOR_COST;
                playerInvestigators.push(pos);
                agregarLog(`🔬 Nuevo investigador en (${pos.x}, ${pos.y}).`);
                actualizarUI();
            }

            // --- Producción ---
            function producir() {
                if (playerSpawners.length > 0) {
                    playerNoobs += playerSpawners.length;
                    agregarLog(`🏭 Spawners producen ${playerSpawners.length} noob(s).`);
                }
                if (playerInvestigators.length > 0) {
                    playerTix += playerInvestigators.length * 5;
                    agregarLog(`🔬 Investigadores generan ${playerInvestigators.length * 5} Tix.`);
                }
                if (enemySpawners.length > 0) {
                    enemyNoobs += enemySpawners.length;
                    agregarLog(`👾 Enemigo gana ${enemySpawners.length} noob(s).`);
                }
                actualizarUI();
            }

            // --- Enemigo construye ---
            function enemigoConstruye() {
                if (enemySpawners.length >= 40) return;
                const pos = getRandomFreeCell(ENEMY_ZONE, enemySpawners);
                if (pos) {
                    enemySpawners.push(pos);
                    agregarLog(`⚠️ Enemigo construyó spawner. Total: ${enemySpawners.length}`);
                }
                actualizarUI();
            }

            // --- Iniciar batalla (animación) ---
            function iniciarBatalla() {
                if (isBattling) return;
                if (playerNoobs === 0 && enemyNoobs === 0) {
                    agregarLog('🤷 Nadie tiene noobs para pelear.');
                    return;
                }

                // Calcular resultado
                let playerWon, playerLoss, enemyLoss, reward = 0;
                if (playerNoobs > enemyNoobs) {
                    playerLoss = enemyNoobs;
                    enemyLoss = enemyNoobs;
                    playerWon = true;
                    reward = REWARD;
                } else if (enemyNoobs > playerNoobs) {
                    playerLoss = playerNoobs;
                    enemyLoss = playerNoobs;
                    playerWon = false;
                } else {
                    playerLoss = playerNoobs;
                    enemyLoss = enemyNoobs;
                    playerWon = null; // empate
                }

                battleResult = {
                    playerWon,
                    playerLoss,
                    enemyLoss,
                    reward
                };

                // Iniciar animación
                isBattling = true;
                battleProgress = 0;
                actualizarUI();

                const startTime = performance.now();
                function animar(now) {
                    const elapsed = now - startTime;
                    battleProgress = Math.min(elapsed / BATTLE_DURATION, 1.0);
                    dibujarMapa();

                    if (battleProgress < 1.0) {
                        battleAnimationFrame = requestAnimationFrame(animar);
                    } else {
                        // Terminar batalla, aplicar resultado
                        if (battleResult.playerWon === true) {
                            playerNoobs -= battleResult.playerLoss;
                            enemyNoobs = 0;
                            playerTix += battleResult.reward;
                            agregarLog(`🎉 VICTORIA! +${battleResult.reward} TIX. Te quedan ${playerNoobs} noobs.`);
                        } else if (battleResult.playerWon === false) {
                            enemyNoobs -= battleResult.enemyLoss;
                            playerNoobs = 0;
                            agregarLog(`💔 DERROTA... Enemigo queda con ${enemyNoobs} noobs.`);
                        } else {
                            playerNoobs = 0;
                            enemyNoobs = 0;
                            agregarLog(`⚖️ EMPATE! Ambos ejércitos destruidos.`);
                        }
                        isBattling = false;
                        battleAnimationFrame = null;
                        actualizarUI();
                    }
                }
                battleAnimationFrame = requestAnimationFrame(animar);
            }

            // --- Eventos de zoom y pan ---
            mapWrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = -Math.sign(e.deltaY) * 0.1;
                zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom + delta));
                dibujarMapa();
            });

            mapWrapper.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                mapWrapper.style.cursor = 'grabbing';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = (e.clientX - lastMouseX) / zoom;
                const dy = (e.clientY - lastMouseY) / zoom;
                viewX = Math.max(0, Math.min(600, viewX - dx));
                viewY = Math.max(0, Math.min(600, viewY - dy));
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                dibujarMapa();
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                mapWrapper.style.cursor = 'grab';
            });

            // --- Inicializar ---
            function inicializarEdificios() {
                let edificios = [];
                let pos = getRandomFreeCell(PLAYER_ZONE, edificios);
                if (pos) { playerSpawners.push(pos); edificios.push(pos); }
                pos = getRandomFreeCell(PLAYER_ZONE, edificios);
                if (pos) { playerInvestigators.push(pos); edificios.push(pos); }
                for (let i = 0; i < 2; i++) {
                    pos = getRandomFreeCell(ENEMY_ZONE, enemySpawners);
                    if (pos) enemySpawners.push(pos);
                }
            }

            // Event listeners
            buySpawnerBtn.addEventListener('click', comprarSpawner);
            buyInvestigatorBtn.addEventListener('click', comprarInvestigador);
            attackBtn.addEventListener('click', iniciarBatalla);

            inicializarEdificios();
            actualizarUI();
            agregarLog('🌟 Imperio con zoom. Arrastra para mover, rueda para zoom.');

            setInterval(producir, PRODUCTION_INTERVAL);
            setInterval(enemigoConstruye, 30000);

            // Inicializar vista centrada
            viewX = 300;
            viewY = 300;
            dibujarMapa();
        })();
    </script>
</body>
</html>
