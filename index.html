<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CS 2008 · Apertura de Cajas</title>
    <style>
        /* ESTÉTICA 2008 — GLOSS, BORDES REDONDEADOS, SOMBRAS, DEGRADÉS */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #2a2a2a url('data:image/svg+xml;utf8,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><path d="M30 0 L60 30 L30 60 L0 30 Z" fill="%23333333" fill-opacity="0.15"/></svg>');
            font-family: 'Arial', 'Helvetica', 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
        }

        /* ventana principal — como un widget de escritorio vintage */
        .ventana {
            max-width: 680px;
            width: 100%;
            background: #eae3d7;  /* fondo crema antiguo */
            background: linear-gradient(145deg, #f2ecdf 0%, #d9cfbc 100%);
            border: 3px solid #5d4b3a;
            border-radius: 24px 24px 20px 20px;
            box-shadow: inset 0 1px 4px #fff4e6, 0 12px 20px rgba(0,0,0,0.7), 0 0 0 2px #3b2e22;
            padding: 28px 24px 32px 24px;
            position: relative;
        }

        /* brillo superpuesto "glass" */
        .ventana::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,245,0.7) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            border-radius: 24px 24px 0 0;
        }

        h1 {
            font-size: 2.4rem;
            font-weight: 900;
            text-align: center;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
            color: #1f2b1f;
            text-shadow: 3px 3px 0 #8b7a64, 1px 1px 0 #d9c8b2, 4px 4px 0 #3a2e20;
            font-family: 'Impact', 'Arial Black', 'Arial', sans-serif;
            word-break: break-word;
            line-height: 1.1;
            transform: rotate(-0.5deg);
        }

        .subhead {
            text-align: center;
            font-size: 1rem;
            margin-bottom: 28px;
            font-style: italic;
            color: #2c3e2c;
            background: #c9bcab;
            display: inline-block;
            padding: 4px 24px;
            border-radius: 40px;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            border: 2px solid #948470;
            box-shadow: inset 0 1px 4px #efebdd, 0 2px 0 #5f4f3e;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Caja de madera artesanal (estética crate Counter-Strike) */
        .crate-wrapper {
            display: flex;
            justify-content: center;
            margin: 16px 0 24px 0;
            cursor: pointer;
        }

        .crate {
            position: relative;
            width: 240px;
            height: 180px;
            background-color: #b87c4b;
            background-image: repeating-linear-gradient(0deg, 
                #9c6b3e 0px, 
                #9c6b3e 12px, 
                #b87c4b 12px, 
                #b87c4b 24px);
            border: 8px solid #5f3e28;
            border-radius: 20px 20px 16px 16px;
            box-shadow: inset 0 0 0 2px #e4b585, 0 14px 0 #3e2e1d, 0 20px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        .crate:hover {
            transform: scale(1.02);
            box-shadow: inset 0 0 0 2px #f3ca9c, 0 14px 0 #3e2e1d, 0 22px 20px rgba(0,0,0,0.6);
        }

        .crate:active {
            transform: translateY(6px);
            box-shadow: inset 0 0 0 2px #f3ca9c, 0 8px 0 #3e2e1d, 0 16px 18px rgba(0,0,0,0.6);
        }

        /* flejes metálicos */
        .stripe {
            position: absolute;
            background: #2d2d2d;
            background: linear-gradient(135deg, #3a3a3a, #1e1e1e);
            border-radius: 6px;
            box-shadow: 0 0 0 2px #6b4f31, 2px 2px 0 #1a1a1a;
            z-index: 2;
        }

        .stripe.horizontal {
            width: 100%;
            height: 16px;
            top: 40%;
            left: 0;
            transform: translateY(-50%);
        }

        .stripe.vertical {
            width: 16px;
            height: 100%;
            left: 25%;
            top: 0;
        }

        .stripe.vertical2 {
            width: 16px;
            height: 100%;
            left: 70%;
            top: 0;
        }

        .crate-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1f1f1f;
            color: #e0d9c7;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 2.5rem;
            padding: 10px 16px 4px 16px;
            border: 4px solid #ab7e54;
            border-radius: 18px;
            box-shadow: inset 0 -2px 0 #4d3f2b, 0 5px 0 #422f1d, 0 8px 10px black;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0 #211810;
            z-index: 5;
            line-height: 1;
        }

        /* área del objeto actual */
        .current-item {
            background: #3d3329;
            border: 6px ridge #8b735b;
            border-radius: 50px 16px 50px 16px;
            padding: 20px 16px;
            margin: 20px 0 18px 0;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0 #1f1f1f, 1px 1px 10px black;
            box-shadow: inset 0 0 30px #1f1712, 0 10px 10px rgba(0,0,0,0.5);
            background-image: url('data:image/svg+xml;utf8,<svg width="40" height="40" viewBox="0 0 40 40" xmlns="http://www.w3.org/2000/svg"><circle cx="20" cy="20" r="2" fill="%23ffeecc" fill-opacity="0.1"/></svg>');
            word-break: break-word;
        }

        .item-rarity {
            font-size: 1.2rem;
            display: block;
            margin-top: 8px;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        /* botón gigante gloss 2k8 */
        .open-btn {
            display: block;
            width: 100%;
            background: transparent;
            border: none;
            margin: 24px 0 18px 0;
        }

        .open-btn button {
            width: 100%;
            padding: 24px 10px;
            font-size: 2.4rem;
            font-weight: bold;
            background: #d6b17e;
            background: linear-gradient(180deg, #f3dbb8 0%, #c99f68 50%, #a07442 100%);
            border: 6px solid #6e4f2b;
            border-radius: 120px;
            color: #211c14;
            text-shadow: 3px 3px 0 #dbbd92, 0 2px 0 white;
            box-shadow: inset 0 -6px 0 #5f401f, inset 0 6px 10px #ffefcd, 0 16px 12px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.06s linear;
            font-family: 'Arial', 'Helvetica', sans-serif;
            letter-spacing: 5px;
        }

        .open-btn button:active {
            transform: translateY(8px);
            box-shadow: inset 0 -2px 0 #5f401f, inset 0 6px 8px #ffefcd, 0 8px 6px rgba(0,0,0,0.5);
        }

        .stats {
            background: #48412e;
            color: #faeacb;
            padding: 10px 24px;
            border-radius: 40px 40px 10px 10px;
            font-size: 1.4rem;
            font-weight: bold;
            text-align: center;
            display: inline-block;
            margin: 10px auto 20px auto;
            border: 3px solid #7f6a48;
            box-shadow: inset 0 0 0 2px #b79f72, 0 4px 0 #2a1f12;
        }

        .history-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2b2b1a;
            text-shadow: 2px 2px 0 #bba88b;
            margin-bottom: 12px;
            border-bottom: 4px dotted #7a6548;
            padding-bottom: 6px;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: #bba88b;
            background: linear-gradient(0deg, #988f7a, #cbbaa7);
            border: 4px inset #6d5c46;
            padding: 20px 12px;
            border-radius: 30px 8px 30px 8px;
            min-height: 110px;
            box-shadow: inset 0 0 0 3px #efe2cf, 0 5px 0 #4d3d2e;
        }

        .history-item {
            background: #4b3d31;
            color: white;
            padding: 8px 6px;
            border-radius: 16px 4px 16px 4px;
            font-size: 1.0rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 0 #1c1c1c;
            border: 3px solid #b5976c;
            box-shadow: 0 6px 0 #3a2d1f, 0 8px 8px black;
            min-width: 90px;
            max-width: 110px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: 0.1s ease;
            flex: 0 1 auto;
        }

        .history-item span {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.9;
        }

        footer {
            margin-top: 28px;
            color: #3b3522;
            font-size: 0.9rem;
            text-align: center;
            background: #cbbc9f;
            padding: 4px 8px;
            border-radius: 50px;
            border: 2px solid #8f754b;
        }
    </style>
</head>
<body>
<div class="ventana">
    <h1>CS: 2OO8</h1>
    <div class="subhead">★ crate opening ★</div>

    <!-- crate clickeable -->
    <div class="crate-wrapper" id="crateClick">
        <div class="crate">
            <div class="stripe horizontal"></div>
            <div class="stripe vertical"></div>
            <div class="stripe vertical2"></div>
            <div class="crate-label">CS</div>
        </div>
    </div>

    <!-- item actual -->
    <div class="current-item" id="currentItem">
        HAZ CLICK EN LA CAJA
        <span class="item-rarity" id="currentRarity"></span>
    </div>

    <!-- botón enorme -->
    <div class="open-btn">
        <button id="openBtn">ABRIR CAJA</button>
    </div>

    <!-- contador -->
    <div class="stats">
        📦 CAJAS ABIERTAS: <span id="caseCounter">0</span>
    </div>

    <!-- historial últimos objetos -->
    <div class="history-title">ÚLTIMOS OBJETOS</div>
    <div class="history-list" id="historyList">
        <!-- se llena con JS -->
    </div>

    <footer>
        ⚡ CS 2008 · rarezas originales ⚡
    </footer>
</div>

<script>
    (function() {
        // ---------- BASE DE DATOS ESTILO COUNTER-STRIKE ----------
        const itemsByRarity = [
            {
                rarity: "CONSUMER (GRIS)",
                color: "#b0c3d9",
                weight: 50,
                items: ["Glock-18 | Sand Dune", "USP-S | Forest Leaves", "MAG-7 | Hazard", "MP9 | Green Plaid", "SSG 08 | Lichen Dashed"]
            },
            {
                rarity: "INDUSTRIAL (AZUL CLARO)",
                color: "#5e98d9",
                weight: 20,
                items: ["M4A1-S | Boreal Forest", "AWP | Safari Mesh", "FAMAS | Cyanospatter", "P250 | Gunsmoke", "UMP-45 | Urban DDPAT"]
            },
            {
                rarity: "MIL-SPEC (AZUL)",
                color: "#4b69ff",
                weight: 15,
                items: ["AK-47 | Blue Laminate", "M4A4 | Faded Zebra", "AWP | Pit Viper", "Desert Eagle | Mudder", "P90 | Teardown"]
            },
            {
                rarity: "RESTRICTED (PÚRPURA)",
                color: "#8847ff",
                weight: 8,
                items: ["AK-47 | Redline", "AWP | Electric Hive", "M4A1-S | Guardian", "USP-S | Caiman", "FAMAS | Pulse"]
            },
            {
                rarity: "CLASSIFIED (ROSA)",
                color: "#d32ce6",
                weight: 4,
                items: ["AK-47 | Vulcan", "M4A4 | Howl", "AWP | Asiimov", "Desert Eagle | Hand Cannon", "P250 | Undertow"]
            },
            {
                rarity: "COVERT (ROJO)",
                color: "#eb4b4b",
                weight: 2,
                items: ["AWP | Dragon Lore", "M4A1-S | Knight", "AK-47 | Fire Serpent", "Desert Eagle | Blaze", "Glock-18 | Fade"]
            },
            {
                rarity: "CUCHILLO / RARO (ORO)",
                color: "#ffd700",
                weight: 1,
                items: ["Karambit | Fade", "M9 Bayonet | Crimson Web", "Butterfly Knife | Slaughter", "Flip Knife | Blue Steel", "Bayonet | Doppler"]
            }
        ];

        // Variables de estado
        let openedCount = 0;
        const lastItems = [];   // guarda hasta 5 objetos { name, rarity, color }

        // Elementos DOM
        const currentItemDiv = document.getElementById('currentItem');
        const currentRaritySpan = document.getElementById('currentRarity');
        const caseCounterSpan = document.getElementById('caseCounter');
        const historyListDiv = document.getElementById('historyList');
        const openBtn = document.getElementById('openBtn');
        const crateClick = document.getElementById('crateClick');

        // Función para obtener un objeto aleatorio según pesos
        function getRandomItem() {
            const totalWeight = itemsByRarity.reduce((acc, curr) => acc + curr.weight, 0);
            let rand = Math.random() * totalWeight;  // 0 .. 100

            for (let i = 0; i < itemsByRarity.length; i++) {
                const tier = itemsByRarity[i];
                if (rand < tier.weight) {
                    // Seleccionar un item aleatorio dentro del tier
                    const randomIndex = Math.floor(Math.random() * tier.items.length);
                    const itemName = tier.items[randomIndex];
                    return {
                        name: itemName,
                        rarity: tier.rarity,
                        color: tier.color
                    };
                }
                rand -= tier.weight;
            }
            // fallback (nunca debería pasar)
            return {
                name: "AK-47 | Case Hardened",
                rarity: "COVERT (ROJO)",
                color: "#eb4b4b"
            };
        }

        // Actualizar display del item actual y contador/historial
        function openCrate() {
            const newItem = getRandomItem();

            // Mostrar item actual con su color
            currentItemDiv.innerHTML = `${newItem.name} <span class="item-rarity" id="currentRarity" style="background: ${newItem.color}; color: #111; text-shadow: 1px 1px 0 white;">${newItem.rarity}</span>`;
            currentItemDiv.style.backgroundColor = newItem.color;
            currentItemDiv.style.color = '#111';
            currentItemDiv.style.textShadow = '2px 2px 0 rgba(255,255,255,0.5)';

            // Incrementar contador
            openedCount++;
            caseCounterSpan.innerText = openedCount;

            // Actualizar historial (últimos 5)
            lastItems.unshift({ name: newItem.name, rarity: newItem.rarity, color: newItem.color });
            if (lastItems.length > 5) lastItems.pop();

            renderHistory();
        }

        // Dibujar los últimos items
        function renderHistory() {
            historyListDiv.innerHTML = ''; 
            if (lastItems.length === 0) {
                // placeholder vacío con estilo
                const emptyMsg = document.createElement('div');
                emptyMsg.innerText = '⚡ NINGUNO ⚡';
                emptyMsg.style.background = '#5b4f3f';
                emptyMsg.style.padding = '16px';
                emptyMsg.style.borderRadius = '12px';
                emptyMsg.style.color = '#ddd';
                emptyMsg.style.width = '100%';
                emptyMsg.style.textAlign = 'center';
                historyListDiv.appendChild(emptyMsg);
                return;
            }

            lastItems.forEach(item => {
                const historyBox = document.createElement('div');
                historyBox.className = 'history-item';
                historyBox.style.backgroundColor = item.color;
                historyBox.style.color = '#111';
                historyBox.style.textShadow = '1px 1px 0 rgba(255,255,255,0.5)';
                historyBox.setAttribute('title', `${item.name} (${item.rarity})`); // tooltip

                // Mostrar nombre corto + rareza en línea
                const nameSpan = document.createElement('span');
                nameSpan.style.fontWeight = 'bold';
                nameSpan.innerText = item.name.length > 14 ? item.name.substring(0,12)+'…' : item.name;

                const raritySpan = document.createElement('span');
                raritySpan.innerText = item.rarity.split(' ')[0]; // solo primera palabra

                historyBox.appendChild(nameSpan);
                historyBox.appendChild(raritySpan);
                historyListDiv.appendChild(historyBox);
            });
        }

        // Asignar eventos
        function handleOpen() {
            openCrate();
        }

        openBtn.addEventListener('click', handleOpen);
        crateClick.addEventListener('click', handleOpen);

        // Inicializar historial vacío
        renderHistory();

        // Mensaje inicial con color neutro
        currentItemDiv.style.backgroundColor = '#3d3329';
        currentItemDiv.style.color = 'white';
        currentItemDiv.style.textShadow = '3px 3px 0 #1f1f1f';
        currentRaritySpan.innerText = '';
    })();
</script>
</body>
</html>
