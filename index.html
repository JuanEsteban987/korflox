<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ NOOB EMPIRE · 120x120 · ROBLOX 2008 🗺️</title>
    <style>
        /* --- ESTÉTICA ROBLOX 2008 (blocky, brillante, biseles) --- */
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background: #1b3b4f;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .game-container {
            max-width: 1300px;
            width: 100%;
            background: #6d9ac4;
            border: 6px ridge #ffffff;
            box-shadow: 12px 12px 0px #0a1f2b;
            padding: 24px 20px;
        }

        .header {
            background: #4b6e8c;
            border: 4px outset #e0e0e0;
            padding: 14px 8px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 4px 4px 0px #1f4f6e, 6px 6px 0px #0b2b3f;
            letter-spacing: 2px;
        }

        .stats-panel {
            background: #b8d8f0;
            border: 4px inset #f0f8ff;
            padding: 20px 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 16px;
            box-shadow: inset 2px 2px 0px #3b5e7a;
        }

        .stat-item {
            background: #e6f0fa;
            border: 3px ridge #ffffff;
            padding: 12px 18px;
            font-size: 22px;
            font-weight: bold;
            color: #0f2f44;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 3px 3px 0px #3b6e8c;
        }

        .stat-item span {
            background: #1b2f44;
            color: #ffffc0;
            padding: 4px 16px;
            border: 2px inset #c0c0c0;
            font-size: 30px;
            margin-left: 8px;
        }

        /* --- MAPA CANVAS 120x120 (600x600 píxeles) --- */
        .map-container {
            display: flex;
            justify-content: center;
            margin: 20px 0;
            border: 8px ridge #5f8faf;
            background: #2f5f7a;
            padding: 10px;
        }

        canvas {
            width: 100%;
            height: auto;
            max-width: 600px;
            border: 6px inset #9fbfdf;
            background: #3f7a5a; /* verde hierba */
            box-shadow: 8px 8px 0px #1f3f4f;
            image-rendering: crisp-edges;
        }

        /* botones de compra */
        .buildings-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 25px 0 15px;
        }

        .roblox-btn {
            background: #c0c0c0;
            border: 6px outset #f8f8f8;
            font-size: 26px;
            font-weight: bold;
            padding: 16px 32px;
            cursor: pointer;
            color: #1f2f3f;
            text-transform: uppercase;
            box-shadow: 5px 5px 0px #2f4f6f;
            transition: 0.05s linear;
            letter-spacing: 2px;
            min-width: 260px;
        }

        .roblox-btn:active {
            border: 6px inset #f8f8f8;
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #2f4f6f;
        }

        .roblox-btn:disabled {
            opacity: 0.4;
            filter: grayscale(60%);
            transform: none;
            border: 6px outset #a0a0a0;
            box-shadow: 2px 2px 0px #1f3f4f;
            cursor: not-allowed;
        }

        .attack-btn {
            background: #c02f2f;
            border: 8px outset #ffc0c0;
            font-size: 44px;
            padding: 24px 70px;
            color: white;
            text-shadow: 4px 4px 0 #5f1f1f;
            box-shadow: 12px 12px 0 #2f1f1f;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .log-box {
            background: #0f1f2b;
            border: 6px inset #3f6f8f;
            padding: 16px;
            color: #9bff9b;
            font-size: 20px;
            min-height: 100px;
            max-height: 140px;
            overflow-y: auto;
            box-shadow: inset 0 0 0 2px #1f4f6e;
            margin: 20px 0 10px;
        }

        .log-box p {
            margin: 4px 0;
            border-left: 4px solid #5faf5f;
            padding-left: 10px;
        }

        .footer-note {
            text-align: center;
            font-size: 18px;
            color: #e0f0ff;
            text-shadow: 2px 2px 0 #0f2a3f;
            background: #2b4f6b;
            padding: 6px;
            border: 2px ridge #9fbfdf;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            🏰 NOOB EMPIRE · 120x120 · 2008 🏰
        </div>

        <!-- Panel de recursos -->
        <div class="stats-panel">
            <div class="stat-item">💰 TIX <span id="tixDisplay">300</span></div>
            <div class="stat-item">⚔️ NOOBS <span id="noobsDisplay">0</span></div>
            <div class="stat-item">🏭 SPAWNERS <span id="spawnerCount">1</span></div>
            <div class="stat-item">🔬 INVEST. <span id="investigatorCount">1</span></div>
        </div>

        <!-- Mapa enorme de 120x120 casillas (canvas) -->
        <div class="map-container">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
        </div>

        <!-- Botones de construcción -->
        <div class="buildings-panel">
            <button class="roblox-btn" id="buySpawnerBtn">🏭 COMPRAR SPAWNER (50💰)</button>
            <button class="roblox-btn" id="buyInvestigatorBtn">🔬 COMPRAR INVESTIGADOR (30💰)</button>
        </div>

        <!-- Botón de ataque central -->
        <div style="display: flex; justify-content: center;">
            <button class="roblox-btn attack-btn" id="attackBtn">💥 ¡ATACAR! 💥</button>
        </div>

        <!-- Log de eventos -->
        <div class="log-box" id="logMessages">
            <p>🌍 2008: construye spawners (noobs) e investigadores (Tix). El mapa es 120x120.</p>
        </div>

        <div class="footer-note">
            🧱 ROBLOX 2008 · MAPA 120x120 · SPAWNERS + INVESTIGADORES 🧱
        </div>
    </div>

    <script>
        (function() {
            // --- Dimensiones del mapa ---
            const MAP_SIZE = 120;            // 120x120 casillas
            const CELL_SIZE = 5;              // píxeles por casilla (canvas 600x600)

            // --- Territorios (áreas donde se pueden colocar edificios) ---
            // Territorio del jugador: filas 0-39, columnas 0-39 (40x40 = 1600 celdas)
            const PLAYER_ZONE = { rowMin: 0, rowMax: 39, colMin: 0, colMax: 39 };
            // Territorio enemigo: filas 80-119, columnas 80-119 (40x40)
            const ENEMY_ZONE = { rowMin: 80, rowMax: 119, colMin: 80, colMax: 119 };

            // --- Estado del juego ---
            let playerTix = 300;
            let playerNoobs = 0;               // noobs acumulados para atacar
            let enemyNoobs = 5;                 // noobs enemigos

            // Edificios del jugador
            let playerSpawners = [];             // array de {x, y} (fila, columna)
            let playerInvestigators = [];         // array de {x, y}

            // Edificios del enemigo (solo spawners)
            let enemySpawners = [];               // array de {x, y}

            // Precios
            const SPAWNER_COST = 50;
            const INVESTIGATOR_COST = 30;
            const REWARD = 50;                    // tix por victoria

            // Intervalos de producción (ms)
            const PRODUCTION_INTERVAL = 3000;      // 3 segundos

            // Elementos DOM
            const tixSpan = document.getElementById('tixDisplay');
            const noobsSpan = document.getElementById('noobsDisplay');
            const spawnerCountSpan = document.getElementById('spawnerCount');
            const investigatorCountSpan = document.getElementById('investigatorCount');
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const logDiv = document.getElementById('logMessages');
            const buySpawnerBtn = document.getElementById('buySpawnerBtn');
            const buyInvestigatorBtn = document.getElementById('buyInvestigatorBtn');
            const attackBtn = document.getElementById('attackBtn');

            // --- Funciones de utilidad ---
            function agregarLog(mensaje) {
                const p = document.createElement('p');
                p.textContent = mensaje;
                logDiv.appendChild(p);
                while (logDiv.children.length > 6) {
                    logDiv.removeChild(logDiv.firstChild);
                }
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            // --- Dibujar el mapa completo ---
            function dibujarMapa() {
                ctx.clearRect(0, 0, 600, 600);

                // Dibujar fondo de cuadrícula (césped)
                ctx.fillStyle = '#3f7a5a';
                ctx.fillRect(0, 0, 600, 600);
                // Dibujar líneas de cuadrícula (opcional, para dar efecto parcelas)
                ctx.strokeStyle = '#2f5f4f';
                ctx.lineWidth = 1;
                for (let i = 0; i <= MAP_SIZE; i++) {
                    ctx.beginPath();
                    ctx.strokeStyle = '#2f5f4f';
                    ctx.lineWidth = 0.5;
                    ctx.moveTo(i * CELL_SIZE, 0);
                    ctx.lineTo(i * CELL_SIZE, 600);
                    ctx.stroke();
                    ctx.moveTo(0, i * CELL_SIZE);
                    ctx.lineTo(600, i * CELL_SIZE);
                    ctx.stroke();
                }

                // Dibujar territorios con un sombreado suave (bordes)
                ctx.fillStyle = '#ffffff20';
                ctx.fillRect(PLAYER_ZONE.colMin * CELL_SIZE, PLAYER_ZONE.rowMin * CELL_SIZE, 
                            (PLAYER_ZONE.colMax - PLAYER_ZONE.colMin + 1) * CELL_SIZE, 
                            (PLAYER_ZONE.rowMax - PLAYER_ZONE.rowMin + 1) * CELL_SIZE);
                ctx.fillStyle = '#ff000020';
                ctx.fillRect(ENEMY_ZONE.colMin * CELL_SIZE, ENEMY_ZONE.rowMin * CELL_SIZE, 
                            (ENEMY_ZONE.colMax - ENEMY_ZONE.colMin + 1) * CELL_SIZE, 
                            (ENEMY_ZONE.rowMax - ENEMY_ZONE.rowMin + 1) * CELL_SIZE);

                // Dibujar spawners del jugador (azul)
                playerSpawners.forEach(s => {
                    ctx.fillStyle = '#3a7aff';
                    ctx.fillRect(s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 4px monospace';
                    ctx.fillText('🏭', s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 4); // pequeño icono
                });

                // Dibujar investigadores del jugador (verde)
                playerInvestigators.forEach(s => {
                    ctx.fillStyle = '#3aff3a';
                    ctx.fillRect(s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    ctx.fillStyle = '#000000';
                    ctx.font = 'bold 4px monospace';
                    ctx.fillText('🔬', s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 4);
                });

                // Dibujar spawners enemigos (rojo)
                enemySpawners.forEach(s => {
                    ctx.fillStyle = '#ff3a3a';
                    ctx.fillRect(s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 1, CELL_SIZE - 2, CELL_SIZE - 2);
                    ctx.fillStyle = '#ffffff';
                    ctx.font = 'bold 4px monospace';
                    ctx.fillText('🏭', s.y * CELL_SIZE + 1, s.x * CELL_SIZE + 4);
                });
            }

            // --- Actualizar UI (contadores y canvas) ---
            function actualizarUI() {
                tixSpan.textContent = playerTix;
                noobsSpan.textContent = playerNoobs;
                spawnerCountSpan.textContent = playerSpawners.length;
                investigatorCountSpan.textContent = playerInvestigators.length;

                // Habilitar/deshabilitar botones
                buySpawnerBtn.disabled = (playerTix < SPAWNER_COST);
                buyInvestigatorBtn.disabled = (playerTix < INVESTIGATOR_COST);

                dibujarMapa();
            }

            // --- Función para obtener una celda libre aleatoria en una zona ---
            function getRandomFreeCell(zone, existingBuildings) {
                const maxAttempts = 1000;
                for (let attempt = 0; attempt < maxAttempts; attempt++) {
                    const row = Math.floor(Math.random() * (zone.rowMax - zone.rowMin + 1)) + zone.rowMin;
                    const col = Math.floor(Math.random() * (zone.colMax - zone.colMin + 1)) + zone.colMin;
                    // Verificar si la celda está ocupada por algún edificio (jugador o enemigo)
                    const ocupado = existingBuildings.some(b => b.x === row && b.y === col);
                    if (!ocupado) {
                        return { x: row, y: col };
                    }
                }
                return null; // no hay espacio
            }

            // --- Comprar spawner (jugador) ---
            function comprarSpawner() {
                if (playerTix < SPAWNER_COST) {
                    agregarLog(`❌ Necesitas ${SPAWNER_COST} TIX para comprar un spawner.`);
                    return;
                }
                // Reunir todos los edificios del jugador para verificar ocupación
                const edificiosJugador = [...playerSpawners, ...playerInvestigators];
                const pos = getRandomFreeCell(PLAYER_ZONE, edificiosJugador);
                if (!pos) {
                    agregarLog(`⚠️ No hay espacio en tu territorio para más edificios.`);
                    return;
                }
                playerTix -= SPAWNER_COST;
                playerSpawners.push(pos);
                agregarLog(`🏭 Nuevo spawner en (${pos.x}, ${pos.y}).`);
                actualizarUI();
            }

            // --- Comprar investigador (jugador) ---
            function comprarInvestigador() {
                if (playerTix < INVESTIGATOR_COST) {
                    agregarLog(`❌ Necesitas ${INVESTIGATOR_COST} TIX para comprar un investigador.`);
                    return;
                }
                const edificiosJugador = [...playerSpawners, ...playerInvestigators];
                const pos = getRandomFreeCell(PLAYER_ZONE, edificiosJugador);
                if (!pos) {
                    agregarLog(`⚠️ No hay espacio en tu territorio para más edificios.`);
                    return;
                }
                playerTix -= INVESTIGATOR_COST;
                playerInvestigators.push(pos);
                agregarLog(`🔬 Nuevo investigador en (${pos.x}, ${pos.y}).`);
                actualizarUI();
            }

            // --- Producción de recursos (cada 3 segundos) ---
            function producir() {
                // Los spawners del jugador generan noobs
                if (playerSpawners.length > 0) {
                    playerNoobs += playerSpawners.length;
                    agregarLog(`🏭 Spawners producen ${playerSpawners.length} noob(s). Total: ${playerNoobs}`);
                }
                // Los investigadores generan Tix
                if (playerInvestigators.length > 0) {
                    playerTix += playerInvestigators.length * 5;  // 5 tix por investigador
                    agregarLog(`🔬 Investigadores generan ${playerInvestigators.length * 5} Tix.`);
                }
                // Los spawners enemigos generan noobs enemigos
                if (enemySpawners.length > 0) {
                    enemyNoobs += enemySpawners.length;
                    agregarLog(`👾 Enemigo gana ${enemySpawners.length} noob(s). Ahora tiene ${enemyNoobs}`);
                }
                actualizarUI();
            }

            // --- El enemigo construye un spawner cada 30 segundos (hasta 20) ---
            function enemigoConstruye() {
                if (enemySpawners.length >= 40) return; // límite, hay espacio de sobra
                const pos = getRandomFreeCell(ENEMY_ZONE, enemySpawners);
                if (pos) {
                    enemySpawners.push(pos);
                    agregarLog(`⚠️ El enemigo construyó un spawner en (${pos.x}, ${pos.y}). Total: ${enemySpawners.length}`);
                } else {
                    agregarLog(`⚠️ El enemigo no tiene espacio para más spawners.`);
                }
                actualizarUI();
            }

            // --- Batalla ---
            function atacar() {
                if (playerNoobs === 0 && enemyNoobs === 0) {
                    agregarLog('🤷 Nadie tiene noobs para pelear.');
                    return;
                }

                // Animación flash (cambiamos borde del canvas)
                canvas.style.border = '6px inset #ffff00';
                setTimeout(() => {
                    canvas.style.border = '6px inset #9fbfdf';
                }, 200);

                // Comparar ejércitos
                if (playerNoobs > enemyNoobs) {
                    let bajas = enemyNoobs;
                    playerNoobs -= bajas;
                    enemyNoobs = 0;
                    playerTix += REWARD;
                    agregarLog(`🎉 VICTORIA! Eliminas al enemigo. +${REWARD} TIX. Te quedan ${playerNoobs} noobs.`);
                } else if (enemyNoobs > playerNoobs) {
                    let bajas = playerNoobs;
                    enemyNoobs -= bajas;
                    playerNoobs = 0;
                    agregarLog(`💔 DERROTA... El enemigo aniquila tus tropas. Le quedan ${enemyNoobs} noobs.`);
                } else {
                    playerNoobs = 0;
                    enemyNoobs = 0;
                    agregarLog(`⚖️ EMPATE! Ambos ejércitos se destruyen.`);
                }
                actualizarUI();
            }

            // --- Inicializar edificios iniciales ---
            function inicializarEdificios() {
                // Jugador: 1 spawner y 1 investigador en posiciones aleatorias
                let edificiosJugador = [];
                let posSpawner = getRandomFreeCell(PLAYER_ZONE, edificiosJugador);
                if (posSpawner) {
                    playerSpawners.push(posSpawner);
                    edificiosJugador.push(posSpawner);
                }
                let posInv = getRandomFreeCell(PLAYER_ZONE, edificiosJugador);
                if (posInv) {
                    playerInvestigators.push(posInv);
                    edificiosJugador.push(posInv);
                }
                // Enemigo: 2 spawners
                for (let i = 0; i < 2; i++) {
                    let posEnemy = getRandomFreeCell(ENEMY_ZONE, enemySpawners);
                    if (posEnemy) enemySpawners.push(posEnemy);
                }
            }

            // --- Event listeners ---
            buySpawnerBtn.addEventListener('click', comprarSpawner);
            buyInvestigatorBtn.addEventListener('click', comprarInvestigador);
            attackBtn.addEventListener('click', atacar);

            // Inicializar
            inicializarEdificios();
            actualizarUI();
            agregarLog('🌟 Imperio iniciado. Tienes 1 spawner y 1 investigador. El enemigo tiene 2 spawners.');

            // Intervalos de producción
            setInterval(producir, PRODUCTION_INTERVAL);
            // Intervalo para que el enemigo construya (cada 30 segundos)
            setInterval(enemigoConstruye, 30000);

            // Dibujar mapa inicial
            dibujarMapa();
        })();
    </script>
</body>
</html>
