<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOOB IN COMBAT · Completo</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: linear-gradient(45deg, #1a2f0e, #2b4b1a);
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        .game-wrapper {
            background: #3a2c1b;
            padding: 20px 20px 25px;
            border-radius: 40px 40px 20px 20px;
            box-shadow: 0 15px 0 #1f140e, 0 20px 30px rgba(0,0,0,0.7);
            border: 4px solid #a57c5c;
        }
        canvas {
            display: block;
            margin: 0 auto;
            width: 800px;
            height: 400px;
            border-radius: 30px;
            background: radial-gradient(circle at 20% 30%, #7ec850, #2f621a);
            box-shadow: inset 0 -5px 10px #1d3e0e, 0 10px 0 #3e2e18;
            cursor: crosshair;
            border: 3px solid #dab47c;
        }
        .panel {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 20px;
            padding: 10px 20px;
            background: #5d4a2e;
            border-radius: 60px;
            border: 3px solid #e3c184;
            box-shadow: inset 0 2px 5px #3b2e1d, 0 7px 0 #3a281c;
        }
        .stats {
            background: #2d2418;
            color: #b3ff9e;
            padding: 10px 25px;
            border-radius: 40px;
            font-size: 22px;
            font-weight: bold;
            text-shadow: 3px 3px 0 #1a4f00;
            letter-spacing: 1px;
            box-shadow: inset 0 -3px 0 #5b4a30, 0 5px 0 #1f150d;
            border: 2px solid #c7a15e;
            font-family: 'Press Start 2P', 'Courier New', monospace;
            font-size: 18px;
        }
        .stats span {
            color: #ffd966;
            margin: 0 8px;
        }
        .buttons {
            display: flex;
            gap: 20px;
        }
        .btn {
            background: #e0a82b;
            border: none;
            font-family: 'Courier New', Courier, monospace;
            font-size: 28px;
            font-weight: bold;
            padding: 8px 30px;
            border-radius: 40px;
            color: #31200c;
            text-shadow: 2px 2px 0 #ffcd7e;
            box-shadow: 0 7px 0 #8b6216, 0 8px 12px black;
            cursor: pointer;
            transition: all 0.07s ease;
            border: 2px solid #ffcd94;
            letter-spacing: 2px;
        }
        .btn:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #8b6216, 0 5px 10px black;
        }
        .btn:disabled {
            opacity: 0.5;
            transform: translateY(4px);
            box-shadow: 0 3px 0 #8b6216;
            pointer-events: none;
            filter: grayscale(0.5);
        }
        .game-over-tip {
            color: #ffc58b;
            font-size: 20px;
            margin-left: 20px;
            font-weight: bold;
            text-shadow: 2px 2px 0 #7a2e00;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gameCanvas" width="800" height="400"></canvas>

    <div class="panel">
        <div class="stats" id="statsDisplay">
            ⚔️ <span id="waveDisplay">1</span> · 💀 <span id="enemyHpDisplay">50</span> ❤️ <span id="playerHpDisplay">100</span>
        </div>
        <div class="buttons">
            <button class="btn" id="attackBtn">⚡ ATACAR</button>
            <button class="btn" id="restartBtn">🔄 REVIVIR</button>
        </div>
        <div class="game-over-tip" id="messageArea">🏆 pelea!</div>
    </div>
</div>

<script>
(function() {
    // ----- canvas y contexto -----
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // ----- elementos de UI -----
    const waveSpan = document.getElementById('waveDisplay');
    const enemyHpSpan = document.getElementById('enemyHpDisplay');
    const playerHpSpan = document.getElementById('playerHpDisplay');
    const messageArea = document.getElementById('messageArea');
    const attackBtn = document.getElementById('attackBtn');
    const restartBtn = document.getElementById('restartBtn');

    // ----- constantes del mundo -----
    const ENEMY_ATTACK_COOLDOWN = 1200; // milisegundos (1.2s)
    const PLAYER_X = 200;
    const PLAYER_Y = 250;   // punto de referencia para el cuerpo
    const ENEMY_X = 600;
    const ENEMY_Y = 250;

    // ----- estado del juego -----
    let player = {
        hp: 100,
        maxHp: 100,
        attack: 12
    };
    let enemy = {
        hp: 50,
        maxHp: 50,
        attack: 6
    };
    let wave = 1;
    let gameActive = true;
    let lastEnemyAttack = performance.now(); // evita ataque nada más empezar

    // ----- funciones auxiliares de escalado -----
    function spawnNewEnemy() {
        // aumenta dificultad cada oleada
        const factor = 1 + (wave - 1) * 0.25; // 1.0, 1.25, 1.5 ...
        enemy.maxHp = Math.floor(50 * factor);
        enemy.hp = enemy.maxHp;
        enemy.attack = Math.floor(6 * factor);
        // pequeña cura al noob cuando vence a un enemigo (20% vida máxima)
        player.hp = Math.min(player.maxHp, player.hp + 20);
        // reiniciam temporizador de ataque enemigo para dar respiro
        lastEnemyAttack = performance.now();
    }

    function resetGame() {
        player = {
            hp: 100,
            maxHp: 100,
            attack: 12
        };
        enemy = {
            hp: 50,
            maxHp: 50,
            attack: 6
        };
        wave = 1;
        gameActive = true;
        lastEnemyAttack = performance.now();
        messageArea.innerText = '🏆 pelea!';
    }

    // ----- ataque del jugador (click botón) -----
    function playerAttack() {
        if (!gameActive) {
            messageArea.innerText = '💀 estás muerto';
            return;
        }
        if (player.hp <= 0) {
            gameActive = false;
            messageArea.innerText = '💀 GAME OVER';
            return;
        }
        if (enemy.hp <= 0) {
            // no debería pasar, pero por si acaso
            wave++;
            spawnNewEnemy();
            return;
        }

        // golpe básico
        enemy.hp -= player.attack;

        // ¿enemigo murió?
        if (enemy.hp <= 0) {
            wave++;
            spawnNewEnemy();  // crea siguiente enemigo y cura al noob
            messageArea.innerText = `⚡ oleada ${wave}!`;
        } else {
            messageArea.innerText = '💥 buen golpe!';
        }

        // comprobar si el jugador murió mientras atacaba (imposible aquí, pero por alinear)
        if (player.hp <= 0) {
            gameActive = false;
            messageArea.innerText = '💀 GAME OVER';
        }
    }

    // ----- bucle principal (update + draw) -----
    function gameLoop(now) {
        // 1. actualizaciones de tiempo (ataque automático del enemigo)
        if (gameActive && player.hp > 0 && enemy.hp > 0) {
            if (now - lastEnemyAttack >= ENEMY_ATTACK_COOLDOWN) {
                // ¡enemigo golpea!
                player.hp -= enemy.attack;
                lastEnemyAttack = now;
                messageArea.innerText = '😡 enemigo ataca!';

                if (player.hp <= 0) {
                    gameActive = false;
                    messageArea.innerText = '💀 GAME OVER';
                }
            }
        }

        // 2. dibujar toda la escena
        drawCanvas();

        // 3. actualizar textos de UI
        waveSpan.innerText = wave;
        enemyHpSpan.innerText = enemy.hp > 0 ? enemy.hp : 0;
        playerHpSpan.innerText = player.hp > 0 ? player.hp : 0;

        // 4. próximo frame
        requestAnimationFrame(gameLoop);
    }

    // ----- DIBUJADO ARTÍSTICO (estilo noob) -----
    function drawCanvas() {
        ctx.clearRect(0, 0, 800, 400);

        // césped / sombras
        ctx.fillStyle = '#408030';
        ctx.fillRect(0, 300, 800, 100);
        ctx.fillStyle = '#5f9e4b';
        for (let i = 0; i < 10; i++) {
            ctx.fillRect(i * 80, 310, 40, 10);
        }

        // ---- NOOB (jugador) ----
        // cabeza
        ctx.fillStyle = '#fedba0';
        ctx.beginPath();
        ctx.arc(PLAYER_X, PLAYER_Y - 35, 24, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#b97c4b';
        ctx.lineWidth = 2;
        ctx.stroke();

        // ojos de noob (siempre mirando al enemigo)
        ctx.fillStyle = '#000';
        ctx.beginPath();
        ctx.arc(PLAYER_X - 9, PLAYER_Y - 42, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(PLAYER_X + 9, PLAYER_Y - 42, 4, 0, Math.PI * 2);
        ctx.fill();
        // brillo
        ctx.fillStyle = 'white';
        ctx.beginPath();
        ctx.arc(PLAYER_X - 11, PLAYER_Y - 44, 1.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(PLAYER_X + 7, PLAYER_Y - 44, 1.3, 0, Math.PI * 2);
        ctx.fill();

        // casco / pelo de noob (una visera)
        ctx.fillStyle = '#6f4f2e';
        ctx.fillRect(PLAYER_X - 15, PLAYER_Y - 50, 30, 8);
        // cuerpo (camiseta verde noob)
        ctx.fillStyle = '#3c9e3c';
        ctx.fillRect(PLAYER_X - 20, PLAYER_Y - 18, 40, 48);
        ctx.fillStyle = '#2d7a2d';
        ctx.fillRect(PLAYER_X - 18, PLAYER_Y - 10, 36, 35);
        // espada
        ctx.beginPath();
        ctx.moveTo(PLAYER_X + 25, PLAYER_Y - 35);
        ctx.lineTo(PLAYER_X + 65, PLAYER_Y - 70);
        ctx.lineWidth = 10;
        ctx.strokeStyle = '#d0d0d0';
        ctx.stroke();
        ctx.lineWidth = 4;
        ctx.strokeStyle = '#aaa';
        ctx.stroke();
        // mango
        ctx.fillStyle = '#a0522d';
        ctx.fillRect(PLAYER_X + 20, PLAYER_Y - 39, 18, 8);

        // ---- ENEMIGO (monstruo rojo) ----
        // cabeza más grande y siniestra
        ctx.fillStyle = '#834a34';
        ctx.beginPath();
        ctx.arc(ENEMY_X, ENEMY_Y - 38, 28, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#632c1c';
        ctx.beginPath();
        ctx.arc(ENEMY_X - 4, ENEMY_Y - 48, 8, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ENEMY_X + 4, ENEMY_Y - 48, 8, 0, Math.PI * 2);
        ctx.fill();
        // ojos rojos
        ctx.fillStyle = '#ff3333';
        ctx.beginPath();
        ctx.arc(ENEMY_X - 12, ENEMY_Y - 45, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ENEMY_X + 12, ENEMY_Y - 45, 5, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#990000';
        ctx.beginPath();
        ctx.arc(ENEMY_X - 14, ENEMY_Y - 47, 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(ENEMY_X + 10, ENEMY_Y - 47, 2, 0, Math.PI * 2);
        ctx.fill();
        // cuerpo oscuro
        ctx.fillStyle = '#5a3a2a';
        ctx.fillRect(ENEMY_X - 24, ENEMY_Y - 18, 48, 50);
        ctx.fillStyle = '#3f2c1f';
        ctx.fillRect(ENEMY_X - 20, ENEMY_Y - 10, 40, 35);
        // garra / arma
        ctx.fillStyle = '#7a4c3c';
        ctx.fillRect(ENEMY_X + 30, ENEMY_Y - 30, 35, 12);
        ctx.fillRect(ENEMY_X + 55, ENEMY_Y - 38, 10, 25);

        // ---- BARRAS DE VIDA (encima de cada personaje) ----
        const barWidth = 140;
        const barHeight = 18;

        // barra de vida del NOOB
        ctx.fillStyle = '#333';
        ctx.fillRect(PLAYER_X - 70, PLAYER_Y - 100, barWidth, barHeight);
        const playerPercent = player.hp / player.maxHp;
        ctx.fillStyle = player.hp > 50 ? '#0f0' : '#ffb347';
        ctx.fillRect(PLAYER_X - 70, PLAYER_Y - 100, barWidth * Math.max(0, playerPercent), barHeight);
        ctx.strokeStyle = '#111';
        ctx.lineWidth = 2;
        ctx.strokeRect(PLAYER_X - 70, PLAYER_Y - 100, barWidth, barHeight);
        ctx.font = 'bold 14px "Courier New", monospace';
        ctx.fillStyle = '#ffffff';
        ctx.shadowColor = 'black';
        ctx.shadowBlur = 4;
        ctx.fillText(`NOOB ${player.hp}/${player.maxHp}`, PLAYER_X - 60, PLAYER_Y - 85);
        ctx.shadowBlur = 0;

        // barra de vida del ENEMIGO
        ctx.fillStyle = '#333';
        ctx.fillRect(ENEMY_X - 70, ENEMY_Y - 110, barWidth, barHeight);
        const enemyPercent = enemy.hp / enemy.maxHp;
        ctx.fillStyle = '#d43f3f';
        ctx.fillRect(ENEMY_X - 70, ENEMY_Y - 110, barWidth * Math.max(0, enemyPercent), barHeight);
        ctx.strokeStyle = '#111';
        ctx.strokeRect(ENEMY_X - 70, ENEMY_Y - 110, barWidth, barHeight);
        ctx.fillStyle = 'white';
        ctx.shadowBlur = 4;
        ctx.fillText(`ENEMY ${enemy.hp > 0 ? enemy.hp : 0}/${enemy.maxHp}`, ENEMY_X - 60, ENEMY_Y - 95);
        ctx.shadowBlur = 0;

        // indicador de oleada y ataque
        ctx.font = 'bold 22px "Press Start 2P", "Courier New", monospace';
        ctx.fillStyle = '#fff7c0';
        ctx.shadowColor = '#6b4c20';
        ctx.shadowBlur = 8;
        ctx.fillText(`WAVE ${wave}`, 330, 70);
        ctx.shadowBlur = 0;

        // si el juego terminó, mensaje grande
        if (!gameActive) {
            ctx.font = '48px "Press Start 2P", "Courier New", monospace';
            ctx.fillStyle = '#aa0000';
            ctx.shadowColor = 'black';
            ctx.shadowBlur = 16;
            ctx.fillText('GAME OVER', 200, 200);
            ctx.shadowBlur = 0;
        } else if (player.hp <= 0) {
            gameActive = false;
        }

        // pequeños detalles (sangre / chispas según vida baja)
        if (enemy.hp < enemy.maxHp * 0.3 && enemy.hp > 0) {
            ctx.fillStyle = '#b00';
            ctx.beginPath();
            ctx.arc(ENEMY_X + 20, ENEMY_Y - 30, 6, 0, Math.PI * 2);
            ctx.fill();
        }
        if (player.hp < player.maxHp * 0.3 && player.hp > 0) {
            ctx.fillStyle = '#f55';
            ctx.beginPath();
            ctx.arc(PLAYER_X - 15, PLAYER_Y - 20, 5, 0, Math.PI * 2);
            ctx.fill();
        }
    }

    // ----- EVENT LISTENERS -----
    attackBtn.addEventListener('click', () => {
        playerAttack();
    });

    restartBtn.addEventListener('click', () => {
        resetGame();
        // asegurar que el enemigo se vea bien y el temporizador arranque de cero
        lastEnemyAttack = performance.now();
        messageArea.innerText = '🔄 renaciste';
    });

    // Inicializar y arrancar el loop
    resetGame(); // valores iniciales
    requestAnimationFrame(gameLoop);

    // actualización extra de UI por si acaso (el loop ya lo hace)
})();
</script>
</body>
</html>
