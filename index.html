<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE SIMULATOR 2008 · COLOCA TUS TROPAS</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background-color: black;
            color: #0f0;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border: 2px solid #0f0;
            border-radius: 0px;
            box-shadow: 0 0 15px #0f0;
            z-index: 100;
            font-size: 18px;
            letter-spacing: 2px;
        }
        #contador {
            position: absolute;
            top: 60px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border: 2px solid #0ff;
            color: #0ff;
            border-radius: 0px;
            box-shadow: 0 0 15px #0ff;
            z-index: 100;
            font-size: 16px;
        }
        #panel-colocacion {
            position: absolute;
            bottom: 120px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            border: 3px solid #ffaa00;
            color: #ffaa00;
            padding: 15px 25px;
            display: flex;
            gap: 20px;
            z-index: 200;
            box-shadow: 0 0 30px #ffaa00;
            font-family: 'Courier New', monospace;
        }
        .boton-bando {
            background: black;
            border: 2px solid;
            font-size: 24px;
            font-weight: bold;
            padding: 10px 25px;
            cursor: pointer;
            text-transform: uppercase;
            letter-spacing: 2px;
            transition: 0.2s;
            font-family: 'Courier New', monospace;
        }
        #btnRojo {
            border-color: #ff3333;
            color: #ff3333;
            box-shadow: 0 0 15px #ff3333;
        }
        #btnRojo.activo {
            background: #ff3333;
            color: black;
        }
        #btnAzul {
            border-color: #3366ff;
            color: #3366ff;
            box-shadow: 0 0 15px #3366ff;
        }
        #btnAzul.activo {
            background: #3366ff;
            color: black;
        }
        #btnIniciar {
            background: black;
            border: 3px solid #00ff00;
            color: #00ff00;
            font-size: 28px;
            padding: 12px 40px;
            cursor: pointer;
            box-shadow: 0 0 30px #00ff00;
            letter-spacing: 4px;
        }
        #btnIniciar:active, .boton-bando:active {
            transform: scale(0.95);
        }
        #btnReiniciar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            border: 3px solid #ff00ff;
            color: #ff00ff;
            font-size: 20px;
            padding: 10px 30px;
            cursor: pointer;
            box-shadow: 0 0 25px #ff00ff;
            z-index: 200;
            letter-spacing: 2px;
        }
        .instruccion {
            position: absolute;
            top: 120px;
            right: 20px;
            background: rgba(0,0,0,0.6);
            border: 2px solid yellow;
            color: yellow;
            padding: 10px;
            font-size: 16px;
            z-index: 100;
            max-width: 250px;
            text-align: center;
            box-shadow: 0 0 20px yellow;
        }
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.03) 0px, rgba(0,0,0,0.3) 2px, transparent 3px);
            pointer-events: none;
            z-index: 999;
        }
    </style>
</head>
<body>
    <div id="info">⚡ BATTLE SIMULATOR 2008 · MODO COLOCACIÓN ⚡</div>
    <div id="contador">ROJO: <span id="rojo-count">0</span> | AZUL: <span id="azul-count">0</span></div>
    <div class="instruccion">
        🖱️ SELECCIONA BANDO Y HAZ CLIC EN EL SUELO PARA COLOCAR<br>
        <span style="color:#ff3333">ROJO</span> ⚔️ <span style="color:#3366ff">AZUL</span>
    </div>

    <div id="panel-colocacion">
        <button class="boton-bando" id="btnRojo">🔥 ROJO</button>
        <button class="boton-bando" id="btnAzul">💧 AZUL</button>
        <button id="btnIniciar">⚔️ INICIAR BATALLA</button>
    </div>
    <button id="btnReiniciar">🔄 REINICIAR COLOCACIÓN</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- CONFIGURACIÓN INICIAL ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.3;
        controls.target.set(0, 2, 0);

        // --- LUCES ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 20;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 30;
        scene.add(dirLight);

        const lightRed = new THREE.PointLight(0xff3333, 0.6, 30);
        lightRed.position.set(-8, 3, 5);
        scene.add(lightRed);
        
        const lightBlue = new THREE.PointLight(0x3333ff, 0.6, 30);
        lightBlue.position.set(8, 3, -5);
        scene.add(lightBlue);

        // --- SUELO ---
        const groundGeometry = new THREE.PlaneGeometry(30, 30);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x224422, roughness: 0.7 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(30, 20, 0xff00ff, 0x00ffff);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // Fondo estrellado
        for (let i = 0; i < 30; i++) {
            const starMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, emissive: 0x222222 });
            const starGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const star = new THREE.Mesh(starGeo, starMat);
            star.position.set((Math.random() - 0.5) * 50, Math.random() * 15 + 5, (Math.random() - 0.5) * 50);
            star.castShadow = true;
            scene.add(star);
        }

        // --- EJÉRCITOS (vacíos al inicio) ---
        let armyRed = [];
        let armyBlue = [];
        
        // Bandos (para colocación)
        let bandoSeleccionado = 'rojo'; // por defecto rojo
        const maxTropas = 15; // límite por bando para no saturar

        // Referencias a los botones
        const btnRojo = document.getElementById('btnRojo');
        const btnAzul = document.getElementById('btnAzul');
        const btnIniciar = document.getElementById('btnIniciar');
        const btnReiniciar = document.getElementById('btnReiniciar');

        btnRojo.classList.add('activo'); // rojo activo por defecto

        btnRojo.addEventListener('click', () => {
            bandoSeleccionado = 'rojo';
            btnRojo.classList.add('activo');
            btnAzul.classList.remove('activo');
        });

        btnAzul.addEventListener('click', () => {
            bandoSeleccionado = 'azul';
            btnAzul.classList.add('activo');
            btnRojo.classList.remove('activo');
        });

        // Función para crear una unidad (retorna el grupo)
        function crearUnidad(colorTipo) {
            const group = new THREE.Group();
            const isRed = (colorTipo === 'rojo');
            const cuerpoColor = isRed ? 0xff3333 : 0x3366ff;
            const emisivo = isRed ? 0x330000 : 0x001133;
            
            // Cuerpo
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.2, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: cuerpoColor, emissive: emisivo });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Cabeza
            const headGeo = new THREE.SphereGeometry(0.4, 6, 4);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc88, emissive: 0x332200 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.4;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            // Ojos
            const eyeGeo = new THREE.SphereGeometry(0.1, 4);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.15, 1.5, 0.35);
            group.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.15, 1.5, 0.35);
            group.add(eyeR);
            
            return group;
        }

        // Raycaster para colocar unidades
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onMouseClick(event) {
            // Solo permitir colocación si la batalla no ha comenzado (variable global)
            if (batallaIniciada) return;

            // Calcular posición del ratón en coordenadas normalizadas
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            // Intersectar con el suelo (plano y=0)
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, target)) {
                // Verificar que esté dentro del área (opcional)
                if (Math.abs(target.x) < 14 && Math.abs(target.z) < 14) {
                    // Comprobar límite de tropas por bando
                    if (bandoSeleccionado === 'rojo' && armyRed.length >= maxTropas) {
                        alert('Máximo de tropas rojas alcanzado');
                        return;
                    }
                    if (bandoSeleccionado === 'azul' && armyBlue.length >= maxTropas) {
                        alert('Máximo de tropas azules alcanzado');
                        return;
                    }

                    const nuevaUnidad = crearUnidad(bandoSeleccionado);
                    nuevaUnidad.position.copy(target);
                    nuevaUnidad.position.y = 0; // el suelo
                    // Rotación aleatoria
                    nuevaUnidad.rotation.y = Math.random() * Math.PI * 2;
                    
                    scene.add(nuevaUnidad);
                    
                    // Guardar en el array correspondiente con velocidad aleatoria
                    if (bandoSeleccionado === 'rojo') {
                        armyRed.push({ mesh: nuevaUnidad, health: 1, speed: 0.05 + Math.random() * 0.02 });
                    } else {
                        armyBlue.push({ mesh: nuevaUnidad, health: 1, speed: 0.05 + Math.random() * 0.02 });
                    }
                    
                    actualizarContador();
                }
            }
        }

        // Actualizar contador HTML
        function actualizarContador() {
            document.getElementById('rojo-count').innerText = armyRed.length;
            document.getElementById('azul-count').innerText = armyBlue.length;
        }

        // Estado de la batalla
        let batallaIniciada = false;
        let animationFrame;
        const deathParticles = [];

        // Función para iniciar la batalla
        function iniciarBatalla() {
            if (armyRed.length === 0 || armyBlue.length === 0) {
                alert('¡Debe haber tropas de ambos bandos para iniciar la batalla!');
                return;
            }
            batallaIniciada = true;
            btnIniciar.disabled = true;
            btnIniciar.style.opacity = '0.5';
            btnRojo.disabled = true;
            btnAzul.disabled = true;
            // Cambiar texto del panel
            document.getElementById('info').innerHTML = '⚡ BATTLE SIMULATOR 2008 · BATALLA EN CURSO ⚡';
        }

        // Botón iniciar
        btnIniciar.addEventListener('click', iniciarBatalla);

        // Reiniciar colocación
        btnReiniciar.addEventListener('click', () => {
            // Eliminar todas las tropas
            armyRed.forEach(u => scene.remove(u.mesh));
            armyBlue.forEach(u => scene.remove(u.mesh));
            armyRed = [];
            armyBlue = [];
            
            // Eliminar partículas
            deathParticles.forEach(p => scene.remove(p));
            deathParticles.length = 0;
            
            batallaIniciada = false;
            btnIniciar.disabled = false;
            btnIniciar.style.opacity = '1';
            btnRojo.disabled = false;
            btnAzul.disabled = false;
            document.getElementById('info').innerHTML = '⚡ BATTLE SIMULATOR 2008 · MODO COLOCACIÓN ⚡';
            
            actualizarContador();
        });

        // Añadir event listener para clics
        renderer.domElement.addEventListener('click', onMouseClick);

        // --- LÓGICA DE BATALLA (movimiento y colisiones) ---
        function checkCollisionsAndMove() {
            if (!batallaIniciada) return;

            // Mover rojos hacia el centro (o hacia el enemigo más cercano - simplificado hacia centro)
            for (let i = armyRed.length - 1; i >= 0; i--) {
                const unit = armyRed[i];
                let dirX = -unit.mesh.position.x;
                let dirZ = -unit.mesh.position.z * 0.5;
                const len = Math.sqrt(dirX*dirX + dirZ*dirZ);
                if (len > 0.1) {
                    unit.mesh.position.x += (dirX / len) * unit.speed;
                    unit.mesh.position.z += (dirZ / len) * unit.speed;
                }
                if (len > 0.1) {
                    unit.mesh.rotation.y = Math.atan2(dirX, dirZ);
                }
            }

            for (let i = armyBlue.length - 1; i >= 0; i--) {
                const unit = armyBlue[i];
                let dirX = -unit.mesh.position.x;
                let dirZ = -unit.mesh.position.z * 0.5;
                const len = Math.sqrt(dirX*dirX + dirZ*dirZ);
                if (len > 0.1) {
                    unit.mesh.position.x += (dirX / len) * unit.speed;
                    unit.mesh.position.z += (dirZ / len) * unit.speed;
                }
                if (len > 0.1) {
                    unit.mesh.rotation.y = Math.atan2(dirX, dirZ);
                }
            }

            // Detectar colisiones
            for (let i = armyRed.length - 1; i >= 0; i--) {
                const redUnit = armyRed[i];
                for (let j = armyBlue.length - 1; j >= 0; j--) {
                    const blueUnit = armyBlue[j];
                    const dist = redUnit.mesh.position.distanceTo(blueUnit.mesh.position);
                    if (dist < 1.5) {
                        createDeathEffect(redUnit.mesh.position.clone().lerp(blueUnit.mesh.position, 0.5));
                        scene.remove(redUnit.mesh);
                        scene.remove(blueUnit.mesh);
                        armyRed.splice(i, 1);
                        armyBlue.splice(j, 1);
                        break;
                    }
                }
            }

            actualizarContador();

            // Si un equipo es destruido, terminar batalla
            if (armyRed.length === 0 || armyBlue.length === 0) {
                batallaIniciada = false;
                btnIniciar.disabled = false;
                btnIniciar.style.opacity = '1';
                btnRojo.disabled = false;
                btnAzul.disabled = false;
                document.getElementById('info').innerHTML = '⚡ BATALLA FINALIZADA · REINICIA PARA COLOCAR ⚡';
            }
        }

        // Efecto de muerte
        function createDeathEffect(position) {
            for (let k = 0; k < 6; k++) {
                const boxGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
                const boxMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, emissive: 0x442200 });
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.copy(position);
                box.position.y += 0.5;
                box.castShadow = true;
                scene.add(box);
                
                box.userData = { velocity: new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.3, (Math.random()-0.5)*0.2), life: 30 };
                deathParticles.push(box);
            }
        }

        // --- ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);

            checkCollisionsAndMove();

            // Animar partículas
            for (let i = deathParticles.length - 1; i >= 0; i--) {
                const p = deathParticles[i];
                p.position.add(p.userData.velocity);
                p.userData.velocity.y -= 0.01;
                p.userData.life--;
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    deathParticles.splice(i, 1);
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Inicializar contador
        actualizarContador();
    </script>
</body>
</html>
