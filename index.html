<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE SIMULATOR 2008 · TABS estilo retro</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background-color: black;
            color: #0f0; /* verde neón clásico */
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border: 2px solid #0f0;
            border-radius: 0px; /* bordes duros retro */
            box-shadow: 0 0 15px #0f0;
            z-index: 100;
            font-size: 18px;
            letter-spacing: 2px;
            text-shadow: 0 0 5px #0f0;
        }
        #contador {
            position: absolute;
            top: 60px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 8px 15px;
            border: 2px solid #0ff;
            color: #0ff;
            border-radius: 0px;
            box-shadow: 0 0 15px #0ff;
            z-index: 100;
            font-size: 16px;
            letter-spacing: 1px;
        }
        #btn-reiniciar {
            position: absolute;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: black;
            border: 3px solid #ff00ff; /* magenta neón */
            color: #ff00ff;
            font-family: 'Courier New', monospace;
            font-size: 24px;
            font-weight: bold;
            padding: 12px 30px;
            cursor: pointer;
            z-index: 200;
            box-shadow: 0 0 25px #ff00ff;
            text-transform: uppercase;
            letter-spacing: 4px;
            transition: 0.2s;
        }
        #btn-reiniciar:hover {
            background: #ff00ff;
            color: black;
            box-shadow: 0 0 40px #ff00ff;
            border-color: black;
        }
        #btn-reiniciar:active {
            transform: translateX(-50%) scale(0.95);
        }
        /* Efecto scanlines retro (opcional) */
        body::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(0deg, rgba(0,255,0,0.03) 0px, rgba(0,0,0,0.3) 2px, transparent 3px);
            pointer-events: none;
            z-index: 999;
        }
        /* Fondo de estrellas tipo 2008 (lo hace el three, pero añadimos textito) */
        .versus {
            position: absolute;
            top: 20%;
            right: 5%;
            color: yellow;
            font-size: 40px;
            opacity: 0.2;
            font-weight: bold;
            transform: rotate(15deg);
            text-shadow: 4px 4px 0 red;
            z-index: 50;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">⚡ BATTLE SIMULATOR 2008 ⚡</div>
    <div id="contador">ROJO: <span id="rojo-count">10</span> | AZUL: <span id="azul-count">10</span></div>
    <button id="btn-reiniciar">REINICIAR BATALLA</button>
    <div class="versus">VS</div>

    <!-- Importamos Three.js desde CDN -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- CONFIGURACIÓN INICIAL ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a); // azul noche profundo
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 20);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false }); // sin antialias para look más retro
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true; // sombras duras, retro pero chulas
        renderer.shadowMap.type = THREE.PCFSoftShadowMap; // no muy suave
        document.body.appendChild(renderer.domElement);

        // Controles para que el usuario pueda mover la cámara como en TABS (opcional)
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.3; // evitar ver bajo el suelo
        controls.target.set(0, 2, 0);

        // --- LUCES (con colores ligeramente saturados para ese toque 2008) ---
        // Luz ambiental suave
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        // Luz principal (sombra)
        const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        const d = 20;
        dirLight.shadow.camera.left = -d;
        dirLight.shadow.camera.right = d;
        dirLight.shadow.camera.top = d;
        dirLight.shadow.camera.bottom = -d;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 30;
        scene.add(dirLight);

        // Luces de colores para ambiente retro
        const lightRed = new THREE.PointLight(0xff3333, 0.6, 30);
        lightRed.position.set(-8, 3, 5);
        scene.add(lightRed);
        
        const lightBlue = new THREE.PointLight(0x3333ff, 0.6, 30);
        lightBlue.position.set(8, 3, -5);
        scene.add(lightBlue);

        // --- SUELO (con grid retro y textura simple) ---
        const groundGeometry = new THREE.PlaneGeometry(30, 30);
        const groundMaterial = new THREE.MeshStandardMaterial({ color: 0x224422, roughness: 0.7, metalness: 0.1 });
        const ground = new THREE.Mesh(groundGeometry, groundMaterial);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        // Grid decorativo (muy 2008)
        const gridHelper = new THREE.GridHelper(30, 20, 0xff00ff, 0x00ffff);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // Fondo de estrellas o neones (cubos flotantes)
        for (let i = 0; i < 30; i++) {
            const starMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, emissive: 0x222222 });
            const starGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const star = new THREE.Mesh(starGeo, starMat);
            star.position.set((Math.random() - 0.5) * 50, Math.random() * 15 + 5, (Math.random() - 0.5) * 50);
            star.castShadow = true;
            scene.add(star);
        }

        // --- EJÉRCITOS ---
        // Unidades: cada una es un grupo (cuerpo cilíndrico + cabeza esférica)
        const armyRed = [];
        const armyBlue = [];
        
        const teamSize = 12; // 12 por equipo

        // Colores neón
        const redColor = 0xff3333;
        const blueColor = 0x3366ff;

        // Crear unidades rojas (lado izquierdo)
        for (let i = 0; i < teamSize; i++) {
            const group = new THREE.Group();
            
            // Cuerpo
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.2, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: redColor, emissive: 0x330000 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            // Cabeza
            const headGeo = new THREE.SphereGeometry(0.4, 6, 4); // pocos polígonos para look retro
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x331100 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.4;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            // Ojos (puntos negros)
            const eyeGeo = new THREE.SphereGeometry(0.1, 4);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.15, 1.5, 0.35);
            group.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.15, 1.5, 0.35);
            group.add(eyeR);
            
            // Posición aleatoria en el lado rojo (x negativo)
            const angle = (i / teamSize) * Math.PI * 2;
            const radius = 3 + Math.random() * 2;
            group.position.x = -8 + Math.random() * 3;
            group.position.z = (Math.random() - 0.5) * 8;
            group.position.y = 0;
            
            // Pequeña rotación aleatoria
            group.rotation.y = Math.random() * Math.PI;
            
            scene.add(group);
            armyRed.push({ mesh: group, health: 1, speed: 0.05 + Math.random() * 0.02 });
        }

        // Crear unidades azules (lado derecho)
        for (let i = 0; i < teamSize; i++) {
            const group = new THREE.Group();
            
            const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.2, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: blueColor, emissive: 0x001133 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            const headGeo = new THREE.SphereGeometry(0.4, 6, 4);
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc88, emissive: 0x332200 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.4;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            const eyeGeo = new THREE.SphereGeometry(0.1, 4);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.15, 1.5, 0.35);
            group.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.15, 1.5, 0.35);
            group.add(eyeR);
            
            group.position.x = 8 - Math.random() * 3;
            group.position.z = (Math.random() - 0.5) * 8;
            group.position.y = 0;
            
            group.rotation.y = Math.random() * Math.PI;
            
            scene.add(group);
            armyBlue.push({ mesh: group, health: 1, speed: 0.05 + Math.random() * 0.02 });
        }

        // Actualizar contador HTML
        function updateCounter() {
            document.getElementById('rojo-count').innerText = armyRed.length;
            document.getElementById('azul-count').innerText = armyBlue.length;
        }
        updateCounter();

        // --- LÓGICA DE BATALLA (detección simple de distancia) ---
        function checkCollisionsAndMove() {
            // Mover rojos hacia el centro (o hacia el azul más cercano? lo hacemos simple: hacia el centro y un poco aleatorio)
            for (let i = armyRed.length - 1; i >= 0; i--) {
                const unit = armyRed[i];
                // Dirección hacia el centro (x=0) pero con un poco de偏移 para que no vayan todos en línea recta
                let dirX = -unit.mesh.position.x; // hacia el centro
                let dirZ = -unit.mesh.position.z * 0.5; // también convergen en Z
                // Normalizar y mover
                const len = Math.sqrt(dirX*dirX + dirZ*dirZ);
                if (len > 0.1) {
                    unit.mesh.position.x += (dirX / len) * unit.speed;
                    unit.mesh.position.z += (dirZ / len) * unit.speed;
                }
                // Rotar hacia la dirección (opcional, para que miren hacia donde van)
                if (len > 0.1) {
                    unit.mesh.rotation.y = Math.atan2(dirX, dirZ);
                }
            }

            // Mover azules hacia el centro (negativo)
            for (let i = armyBlue.length - 1; i >= 0; i--) {
                const unit = armyBlue[i];
                let dirX = -unit.mesh.position.x; // hacia el centro
                let dirZ = -unit.mesh.position.z * 0.5;
                const len = Math.sqrt(dirX*dirX + dirZ*dirZ);
                if (len > 0.1) {
                    unit.mesh.position.x += (dirX / len) * unit.speed;
                    unit.mesh.position.z += (dirZ / len) * unit.speed;
                }
                if (len > 0.1) {
                    unit.mesh.rotation.y = Math.atan2(dirX, dirZ);
                }
            }

            // Detectar colisiones entre rojos y azules (distancia entre sus posiciones)
            for (let i = armyRed.length - 1; i >= 0; i--) {
                const redUnit = armyRed[i];
                for (let j = armyBlue.length - 1; j >= 0; j--) {
                    const blueUnit = armyBlue[j];
                    const dist = redUnit.mesh.position.distanceTo(blueUnit.mesh.position);
                    if (dist < 1.5) { // distancia de combate
                        // Ambos mueren (simulacro de lucha)
                        // Efecto visual: desaparecen y creamos una pequeña explosión de cubos
                        createDeathEffect(redUnit.mesh.position.clone().lerp(blueUnit.mesh.position, 0.5));
                        
                        // Eliminar del escenario y de los arrays
                        scene.remove(redUnit.mesh);
                        scene.remove(blueUnit.mesh);
                        armyRed.splice(i, 1);
                        armyBlue.splice(j, 1);
                        
                        // Importante: romper el bucle interior y retroceder índice exterior
                        // (como ya eliminamos red, salimos del bucle interior)
                        break; 
                    }
                }
            }

            // Actualizar contador
            updateCounter();

            // Si un equipo se queda vacío, mostramos mensaje (opcional, lo reinicia el botón)
            if (armyRed.length === 0 || armyBlue.length === 0) {
                // Mostrar texto flotante rápido (no implementado, se puede añadir)
                // Pero el botón de reiniciar funciona.
            }
        }

        // Efecto retro de muerte (lluvia de cubos pequeños)
        function createDeathEffect(position) {
            for (let k = 0; k < 6; k++) {
                const boxGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
                const boxMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, emissive: 0x442200 });
                const box = new THREE.Mesh(boxGeo, boxMat);
                box.position.copy(position);
                box.position.y += 0.5;
                box.castShadow = true;
                scene.add(box);
                
                // Animación simple con velocidad (la haremos en el loop)
                box.userData = { velocity: new THREE.Vector3((Math.random()-0.5)*0.2, Math.random()*0.3, (Math.random()-0.5)*0.2), life: 30 };
                deathParticles.push(box);
            }
        }

        // Array para partículas de muerte
        const deathParticles = [];

        // --- REINICIAR BATALLA ---
        document.getElementById('btn-reiniciar').addEventListener('click', () => {
            // Limpiar ejércitos actuales
            armyRed.forEach(u => scene.remove(u.mesh));
            armyBlue.forEach(u => scene.remove(u.mesh));
            armyRed.length = 0;
            armyBlue.length = 0;
            
            // Limpiar partículas
            deathParticles.forEach(p => scene.remove(p));
            deathParticles.length = 0;

            // Volver a crear ejércitos (casi igual que arriba, pero podríamos refactorizar)
            for (let i = 0; i < teamSize; i++) {
                const group = new THREE.Group();
                const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.2, 8);
                const bodyMat = new THREE.MeshStandardMaterial({ color: redColor, emissive: 0x330000 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 0.6;
                body.castShadow = true;
                body.receiveShadow = true;
                group.add(body);
                
                const headGeo = new THREE.SphereGeometry(0.4, 6, 4);
                const headMat = new THREE.MeshStandardMaterial({ color: 0xffaa66, emissive: 0x331100 });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 1.4;
                head.castShadow = true;
                head.receiveShadow = true;
                group.add(head);
                
                const eyeGeo = new THREE.SphereGeometry(0.1, 4);
                const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
                const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
                eyeL.position.set(-0.15, 1.5, 0.35);
                group.add(eyeL);
                const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
                eyeR.position.set(0.15, 1.5, 0.35);
                group.add(eyeR);
                
                group.position.x = -8 + Math.random() * 3;
                group.position.z = (Math.random() - 0.5) * 8;
                group.position.y = 0;
                group.rotation.y = Math.random() * Math.PI;
                
                scene.add(group);
                armyRed.push({ mesh: group, health: 1, speed: 0.05 + Math.random() * 0.02 });
            }

            for (let i = 0; i < teamSize; i++) {
                const group = new THREE.Group();
                const bodyGeo = new THREE.CylinderGeometry(0.5, 0.5, 1.2, 8);
                const bodyMat = new THREE.MeshStandardMaterial({ color: blueColor, emissive: 0x001133 });
                const body = new THREE.Mesh(bodyGeo, bodyMat);
                body.position.y = 0.6;
                body.castShadow = true;
                body.receiveShadow = true;
                group.add(body);
                
                const headGeo = new THREE.SphereGeometry(0.4, 6, 4);
                const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc88, emissive: 0x332200 });
                const head = new THREE.Mesh(headGeo, headMat);
                head.position.y = 1.4;
                head.castShadow = true;
                head.receiveShadow = true;
                group.add(head);
                
                const eyeGeo = new THREE.SphereGeometry(0.1, 4);
                const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
                const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
                eyeL.position.set(-0.15, 1.5, 0.35);
                group.add(eyeL);
                const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
                eyeR.position.set(0.15, 1.5, 0.35);
                group.add(eyeR);
                
                group.position.x = 8 - Math.random() * 3;
                group.position.z = (Math.random() - 0.5) * 8;
                group.position.y = 0;
                group.rotation.y = Math.random() * Math.PI;
                
                scene.add(group);
                armyBlue.push({ mesh: group, health: 1, speed: 0.05 + Math.random() * 0.02 });
            }
            updateCounter();
        });

        // --- ANIMACIÓN Y BUCLE ---
        function animate() {
            requestAnimationFrame(animate);

            // Lógica de batalla
            if (armyRed.length > 0 && armyBlue.length > 0) {
                checkCollisionsAndMove();
            }

            // Animar partículas de muerte
            for (let i = deathParticles.length - 1; i >= 0; i--) {
                const p = deathParticles[i];
                p.position.add(p.userData.velocity);
                p.userData.velocity.y -= 0.01; // gravedad
                p.userData.life--;
                if (p.userData.life <= 0) {
                    scene.remove(p);
                    deathParticles.splice(i, 1);
                }
            }

            controls.update(); // actualizar cámara si se mueve

            renderer.render(scene, camera);
        }

        animate();

        // Manejar resize
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // Añadir texto 3D retro simple (opcional, no necesario)
        // Puede ser un cartel flotante, pero lo dejamos así.
    </script>
</body>
</html>
