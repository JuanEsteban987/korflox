<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create-a-Plant vs Zombies · DIY PVZ</title>
    <style>
        * {
            box-sizing: border-box;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            user-select: none;
        }
        body {
            background: #1a3e1f;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
        }
        .game-wrapper {
            background: #5b8c4e;
            padding: 25px 30px 30px;
            border-radius: 40px 40px 20px 20px;
            box-shadow: 0 15px 0 #2b5e2b, 0 20px 20px rgba(0,0,0,0.4);
            border-bottom: 5px solid #6a9e5a;
        }
        .header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #eecd9e;
            padding: 10px 20px;
            border-radius: 60px;
            border: 4px solid #b38b40;
            margin-bottom: 20px;
            box-shadow: inset 0 2px 5px #fff3c9, 0 5px 0 #8b6b32;
        }
        .sun-display {
            background: #f7da65;
            border-radius: 40px;
            padding: 8px 25px;
            font-size: 26px;
            font-weight: bold;
            color: #a65d0e;
            text-shadow: 2px 2px 0 #ffea9e;
            box-shadow: inset 0 -3px 0 #c88f2e, 0 4px 0 #a05f20;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .sun-display::before {
            content: "☀️";
            font-size: 32px;
            filter: drop-shadow(2px 2px 0 #ad7a3b);
        }
        .restart-btn {
            background: #c9ae7a;
            border: none;
            font-size: 20px;
            font-weight: bold;
            padding: 8px 25px;
            border-radius: 40px;
            color: #2d3e1f;
            box-shadow: 0 5px 0 #7b623a, 0 3px 10px black;
            cursor: pointer;
            transition: 0.06s linear;
            border: 2px solid #f5e1b0;
        }
        .restart-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #7b623a;
        }
        .canvas-container {
            display: flex;
            justify-content: center;
            background: #577a44;
            padding: 20px;
            border-radius: 40px;
            border: 5px solid #36632e;
            box-shadow: inset 0 0 0 3px #9bbf7b;
        }
        canvas {
            display: block;
            width: 420px;
            height: 300px;
            border-radius: 24px;
            border: 4px solid #2a4d26;
            background: #96b582;
            cursor: crosshair;
            box-shadow: 0 8px 0 #1f3f1c;
        }
        .plant-palette {
            margin: 20px 0 15px;
            background: #b39264;
            padding: 15px 15px 10px;
            border-radius: 40px;
            border: 4px solid #836e48;
            box-shadow: inset 0 2px 8px #eedbaa, 0 7px 0 #675234;
        }
        .palette-title {
            font-size: 18px;
            font-weight: bold;
            margin-left: 5px;
            color: #fffbd6;
            text-shadow: 2px 2px 0 #4b6b2b;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .plant-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin-top: 8px;
            min-height: 60px;
        }
        .plant-btn {
            background: #ded19b;
            border: 3px solid #fcf3c5;
            border-radius: 30px;
            padding: 8px 16px;
            font-size: 18px;
            font-weight: bold;
            color: #2f441f;
            box-shadow: 0 5px 0 #887542, 0 4px 8px black;
            cursor: pointer;
            transition: 0.05s linear;
            display: flex;
            align-items: center;
            gap: 6px;
            min-width: 100px;
            text-shadow: 1px 1px 0 #cfb57b;
        }
        .plant-btn.selected {
            background: #ffdb7c;
            border: 4px solid #fffbbc;
            transform: scale(1.02);
            box-shadow: 0 4px 0 #c79e3a, 0 6px 12px black;
        }
        .plant-color-dot {
            width: 24px;
            height: 24px;
            border-radius: 50%;
            border: 2px solid #3d3d1f;
            display: inline-block;
        }
        .creator-panel {
            background: #a6c9a1;
            padding: 18px 20px;
            border-radius: 50px;
            border: 4px solid #618558;
            box-shadow: inset 0 2px 10px #d8f0cf, 0 8px 0 #406a38;
        }
        .creator-title {
            font-size: 20px;
            font-weight: bold;
            color: #1b3b13;
            margin-bottom: 10px;
            padding-left: 10px;
        }
        .form-row {
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 10px 15px;
            margin-bottom: 15px;
        }
        .form-field {
            display: flex;
            flex-direction: column;
            font-size: 14px;
            font-weight: 600;
            color: #1e4f1a;
        }
        .form-field label {
            margin-left: 5px;
        }
        .form-field input {
            width: 90px;
            padding: 8px 8px;
            border-radius: 30px;
            border: 2px solid #36632e;
            background: #f9f2cf;
            font-weight: bold;
            text-align: center;
            outline: none;
        }
        .form-field input[type="color"] {
            width: 60px;
            height: 40px;
            padding: 2px;
            background: white;
        }
        .add-plant-btn {
            background: #fad873;
            border: none;
            font-size: 20px;
            font-weight: bold;
            padding: 10px 30px;
            border-radius: 40px;
            box-shadow: 0 5px 0 #a88337, 0 3px 10px black;
            cursor: pointer;
            border: 2px solid #ffecb3;
            margin-top: 8px;
            transition: 0.05s linear;
        }
        .add-plant-btn:active {
            transform: translateY(5px);
            box-shadow: 0 2px 0 #a88337;
        }
        .footer {
            display: flex;
            justify-content: space-between;
            margin-top: 12px;
            color: #dcedb9;
            font-weight: bold;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <div class="header">
        <div class="sun-display" id="sunDisplay">150</div>
        <button class="restart-btn" id="restartGame">🌱 RESTART</button>
    </div>

    <div class="canvas-container">
        <canvas id="gameCanvas" width="420" height="300"></canvas>
    </div>

    <!-- PLANT PALETTE (dynamic) -->
    <div class="plant-palette">
        <div class="palette-title">🌿 YOUR PLANTS · click to select</div>
        <div class="plant-buttons" id="plantPalette"></div>
    </div>

    <!-- CUSTOM PLANT CREATOR -->
    <div class="creator-panel">
        <div class="creator-title">🧪 CREATE YOUR OWN PLANT</div>
        <div class="form-row">
            <div class="form-field">
                <label>🌱 name</label>
                <input type="text" id="newName" value="Spikeweed" maxlength="12">
            </div>
            <div class="form-field">
                <label>💥 dmg</label>
                <input type="number" id="newDamage" min="1" max="5" value="2">
            </div>
            <div class="form-field">
                <label>📏 range</label>
                <input type="number" id="newRange" min="1" max="7" value="4">
            </div>
            <div class="form-field">
                <label>⚡ shots/s</label>
                <input type="number" id="newSpeed" min="0.2" max="3.0" step="0.1" value="1.0">
            </div>
            <div class="form-field">
                <label>🪙 cost</label>
                <input type="number" id="newCost" min="25" max="300" step="5" value="75">
            </div>
            <div class="form-field">
                <label>❤️ health</label>
                <input type="number" id="newHealth" min="1" max="15" value="4">
            </div>
            <div class="form-field">
                <label>🎨 color</label>
                <input type="color" id="newColor" value="#77b300">
            </div>
        </div>
        <button class="add-plant-btn" id="addPlantBtn">➕ ADD NEW PLANT</button>
    </div>
    <div class="footer">
        <span>☀️ sun auto +5/sec</span>
        <span>🧟 zombies spawn every 5s</span>
    </div>
</div>

<script>
(function() {
    // ---------- CONSTANTS ----------
    const ROWS = 5;
    const COLS = 7;
    const CELL_SIZE = 60;
    const CANVAS_WIDTH = 420;
    const CANVAS_HEIGHT = 300;

    // ---------- GLOBAL STATE ----------
    let plantTypes = [];               // array of custom plant definitions
    let selectedPlantIndex = 0;        // index in plantTypes

    // grid: 2D array [row][col] -> { typeIndex, health, lastShot } or null
    let grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));

    let zombies = [];                  // active zombies
    let projectiles = [];              // active projectiles

    let sun = 150;
    let gameActive = true;
    let gameOverFlag = false;          // for display

    // timers & intervals
    let sunInterval = null;
    let spawnInterval = null;
    let animationFrame = null;
    let lastTimestamp = null;

    // ---------- HELPER FUNCTIONS ----------
    function getCurrentTime() {
        return performance.now();
    }

    // ---------- INITIAL DEFAULT PLANT ----------
    function initDefaultPlants() {
        plantTypes.push({
            name: "PeaShooter",
            damage: 1,
            range: 5,          // cells ahead
            attackCooldown: 1000, // 1 shot per second (1000ms)
            cost: 50,
            health: 3,
            color: "#5a9e4e"
        });
        // second optional default for demo
        plantTypes.push({
            name: "Nut",
            damage: 0,          // doesn't shoot
            range: 0,
            attackCooldown: 999999,
            cost: 30,
            health: 8,
            color: "#cc9966"
        });
    }
    initDefaultPlants();

    // ---------- RENDER PLANT PALETTE (buttons) ----------
    function renderPalette() {
        const container = document.getElementById('plantPalette');
        container.innerHTML = '';
        plantTypes.forEach((plant, idx) => {
            const btn = document.createElement('div');
            btn.className = `plant-btn ${idx === selectedPlantIndex ? 'selected' : ''}`;
            btn.setAttribute('data-index', idx);
            const dot = document.createElement('span');
            dot.className = 'plant-color-dot';
            dot.style.backgroundColor = plant.color;
            dot.style.borderColor = '#3d3d1f';
            btn.appendChild(dot);
            btn.appendChild(document.createTextNode(`${plant.name} (${plant.cost}☀️)`));
            btn.addEventListener('click', (e) => {
                selectedPlantIndex = idx;
                renderPalette(); // refresh selected style
            });
            container.appendChild(btn);
        });
    }

    // ---------- UPDATE SUN DISPLAY ----------
    function updateSunDisplay() {
        document.getElementById('sunDisplay').innerText = sun;
    }

    // ---------- GAME OVER ----------
    function gameOver() {
        if (!gameActive) return;
        gameActive = false;
        gameOverFlag = true;
        if (sunInterval) clearInterval(sunInterval);
        if (spawnInterval) clearInterval(spawnInterval);
        // cancel animation frame will be handled in loop
        alert("💀 ZOMBIES ATE YOUR BRAIN! Click RESTART.");
    }

    // ---------- RESTART GAME ----------
    function restartGame() {
        // kill intervals
        if (sunInterval) clearInterval(sunInterval);
        if (spawnInterval) clearInterval(spawnInterval);
        if (animationFrame) cancelAnimationFrame(animationFrame);

        // reset state
        grid = Array(ROWS).fill().map(() => Array(COLS).fill(null));
        zombies = [];
        projectiles = [];
        sun = 150;
        gameActive = true;
        gameOverFlag = false;
        selectedPlantIndex = 0;    // keep selected index valid
        updateSunDisplay();

        // restart intervals
        sunInterval = setInterval(() => {
            if (!gameActive) return;
            sun += 5;
            updateSunDisplay();
        }, 1000);

        spawnInterval = setInterval(() => {
            if (!gameActive) return;
            // spawn a zombie on random row
            const row = Math.floor(Math.random() * ROWS);
            // start just outside canvas right edge
            const startX = CANVAS_WIDTH - 10;
            zombies.push({
                row: row,
                x: startX,
                health: 8 + Math.floor(Math.random() * 5), // 8-12
                speed: 16,          // pixels per second
                lastAttackTime: 0,
                attacking: false,
                attackCooldown: 1200,
                damage: 1
            });
        }, 5000);

        // restart animation
        lastTimestamp = null;
        animationFrame = requestAnimationFrame(gameLoop);
    }

    // ---------- PLANT CUSTOM CREATION ----------
    function addCustomPlant() {
        const name = document.getElementById('newName').value.trim() || "Custom";
        const damage = parseInt(document.getElementById('newDamage').value, 10) || 1;
        const range = parseInt(document.getElementById('newRange').value, 10) || 3;
        const shotsPerSec = parseFloat(document.getElementById('newSpeed').value) || 1.0;
        const cost = parseInt(document.getElementById('newCost').value, 10) || 50;
        const health = parseInt(document.getElementById('newHealth').value, 10) || 3;
        const color = document.getElementById('newColor').value;

        // clamp
        const attackCooldown = Math.max(200, Math.floor(1000 / Math.min(3, Math.max(0.2, shotsPerSec))));

        const newPlant = {
            name: name.substring(0, 12),
            damage: Math.min(8, Math.max(0, damage)),
            range: Math.min(7, Math.max(1, range)),
            attackCooldown: attackCooldown,
            cost: Math.min(300, Math.max(20, cost)),
            health: Math.min(15, Math.max(1, health)),
            color: color
        };
        plantTypes.push(newPlant);
        renderPalette();
    }

    // ---------- HANDLE CANVAS CLICK (PLANT) ----------
    function handleCanvasClick(e) {
        if (!gameActive) return;
        const rect = e.target.getBoundingClientRect();
        const scaleX = e.target.width / rect.width;
        const scaleY = e.target.height / rect.height;

        const mouseX = (e.clientX - rect.left) * scaleX;
        const mouseY = (e.clientY - rect.top) * scaleY;

        const col = Math.floor(mouseX / CELL_SIZE);
        const row = Math.floor(mouseY / CELL_SIZE);
        if (row >= 0 && row < ROWS && col >= 0 && col < COLS) {
            if (!grid[row][col]) {
                const plantType = plantTypes[selectedPlantIndex];
                if (!plantType) return;
                if (sun >= plantType.cost) {
                    // place plant
                    grid[row][col] = {
                        typeIndex: selectedPlantIndex,
                        health: plantType.health,
                        lastShot: getCurrentTime() - plantType.attackCooldown // allow initial shot after cooldown
                    };
                    sun -= plantType.cost;
                    updateSunDisplay();
                } else {
                    alert("☀️ Not enough sun!");
                }
            }
        }
    }

    // ---------- UPDATE GAME (delta-based) ----------
    function updateGame(deltaSec) {
        if (!gameActive) return;

        // 1) Move zombies & handle attacks
        for (let i = zombies.length - 1; i >= 0; i--) {
            const z = zombies[i];
            if (z.health <= 0) {
                zombies.splice(i, 1);
                continue;
            }

            // determine current column based on x
            let col = Math.floor(z.x / CELL_SIZE);
            if (col < 0) { // game over condition
                gameOver();
                return;
            }
            if (col >= COLS) col = COLS - 1; // clamp for array

            const plantAtCell = (z.row >= 0 && z.row < ROWS && col >= 0 && col < COLS) ? grid[z.row][col] : null;

            // attacking logic
            if (plantAtCell) {
                // zombie is on same cell as plant -> attack
                z.attacking = true;
                const now = getCurrentTime();
                if (now - (z.lastAttackTime || 0) >= z.attackCooldown) {
                    // attack plant
                    plantAtCell.health -= z.damage;
                    z.lastAttackTime = now;
                    if (plantAtCell.health <= 0) {
                        // plant dies
                        grid[z.row][col] = null;
                        z.attacking = false; // resume moving
                    }
                }
                // don't move while attacking
            } else {
                z.attacking = false;
                // move left
                z.x -= z.speed * deltaSec;
                // check game over if x < 0
                if (z.x < 0) {
                    gameOver();
                    return;
                }
            }
        }

        // 2) Plant shooting
        const now = getCurrentTime();
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                const plant = grid[row][col];
                if (!plant) continue;
                const type = plantTypes[plant.typeIndex];
                if (!type || type.damage <= 0) continue; // non-attacking plant

                // cooldown check
                if (now - plant.lastShot >= type.attackCooldown) {
                    // find closest zombie in same row, with col > plant.col and within range
                    let targetZombie = null;
                    let minDist = Infinity;
                    for (let z of zombies) {
                        if (z.row !== row) continue;
                        const zCol = Math.floor(z.x / CELL_SIZE);
                        // zombie must be ahead (to the right) and within range columns
                        if (zCol > col && zCol <= col + type.range) {
                            const dist = z.x - (col * CELL_SIZE);
                            if (dist < minDist) {
                                minDist = dist;
                                targetZombie = z;
                            }
                        }
                    }
                    if (targetZombie) {
                        // shoot projectile
                        projectiles.push({
                            row: row,
                            x: col * CELL_SIZE + CELL_SIZE * 0.7,
                            y: row * CELL_SIZE + CELL_SIZE * 0.5,
                            damage: type.damage,
                            speed: 120, // px per second
                        });
                        plant.lastShot = now;
                    }
                }
            }
        }

        // 3) Move projectiles & collisions
        for (let i = projectiles.length - 1; i >= 0; i--) {
            const p = projectiles[i];
            p.x += p.speed * deltaSec;
            if (p.x > CANVAS_WIDTH) {
                projectiles.splice(i, 1);
                continue;
            }
            let hit = false;
            for (let j = zombies.length - 1; j >= 0; j--) {
                const z = zombies[j];
                if (z.row !== p.row) continue;
                // simple bounding circle collision
                if (Math.abs(p.x - z.x) < 20 && z.health > 0) {
                    z.health -= p.damage;
                    projectiles.splice(i, 1);
                    if (z.health <= 0) {
                        zombies.splice(j, 1);
                    }
                    hit = true;
                    break;
                }
            }
            if (hit) continue;
        }
    }

    // ---------- DRAWING ----------
    function draw(ctx) {
        ctx.clearRect(0, 0, CANVAS_WIDTH, CANVAS_HEIGHT);

        // draw grid lines
        ctx.strokeStyle = "#3d6b37";
        ctx.lineWidth = 2;
        for (let i = 0; i <= ROWS; i++) {
            ctx.beginPath();
            ctx.moveTo(0, i * CELL_SIZE);
            ctx.lineTo(CANVAS_WIDTH, i * CELL_SIZE);
            ctx.strokeStyle = "#3d6b37";
            ctx.stroke();
        }
        for (let i = 0; i <= COLS; i++) {
            ctx.beginPath();
            ctx.moveTo(i * CELL_SIZE, 0);
            ctx.lineTo(i * CELL_SIZE, CANVAS_HEIGHT);
            ctx.strokeStyle = "#3d6b37";
            ctx.stroke();
        }

        // draw plants
        for (let row = 0; row < ROWS; row++) {
            for (let col = 0; col < COLS; col++) {
                const plant = grid[row][col];
                if (!plant) continue;
                const type = plantTypes[plant.typeIndex];
                if (!type) continue;
                const x = col * CELL_SIZE + 5;
                const y = row * CELL_SIZE + 5;
                const w = CELL_SIZE - 10;
                ctx.fillStyle = type.color;
                ctx.shadowColor = "#2b4d1a";
                ctx.shadowBlur = 6;
                ctx.beginPath();
                ctx.roundRect(x, y, w, w-10, 12);
                ctx.fill();
                ctx.shadowBlur = 0;
                ctx.fillStyle = "#222";
                ctx.font = "bold 16px 'Segoe UI'";
                ctx.fillText(type.name.substring(0,2), x+8, y+28);
                // health bar
                const healthPercent = plant.health / type.health;
                ctx.fillStyle = "#d46b4b";
                ctx.fillRect(x+5, y-3, 40 * healthPercent, 5);
            }
        }

        // draw zombies
        zombies.forEach(z => {
            const x = z.x - 20;
            const y = z.row * CELL_SIZE + 15;
            ctx.fillStyle = "#3a2e1c";
            ctx.shadowColor = "#1a1a1a";
            ctx.shadowBlur = 8;
            ctx.beginPath();
            ctx.ellipse(x+20, y+15, 18, 22, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#814e4e";
            ctx.beginPath();
            ctx.ellipse(x+10, y+5, 6, 8, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "#814e4e";
            ctx.beginPath();
            ctx.ellipse(x+30, y+5, 6, 8, 0, 0, Math.PI*2);
            ctx.fill();
            ctx.fillStyle = "white";
            ctx.font = "bold 12px monospace";
            ctx.fillText(`❤️${z.health}`, x+12, y-5);
            ctx.shadowBlur = 0;
        });

        // draw projectiles
        projectiles.forEach(p => {
            ctx.fillStyle = "#f5c542";
            ctx.shadowBlur = 12;
            ctx.shadowColor = "orange";
            ctx.beginPath();
            ctx.arc(p.x, p.y, 8, 0, 2 * Math.PI);
            ctx.fill();
            ctx.shadowBlur = 0;
        });

        if (!gameActive && gameOverFlag) {
            ctx.fillStyle = "rgba(0,0,0,0.5)";
            ctx.fillRect(0,0,CANVAS_WIDTH,CANVAS_HEIGHT);
            ctx.fillStyle = "#ffdab0";
            ctx.font = "bold 32px 'Segoe UI'";
            ctx.fillText("💀 GAME OVER", 60, 160);
        }
    }

    // helper canvas rounding
    CanvasRenderingContext2D.prototype.roundRect = function(x, y, w, h, r) {
        if (w < 2 * r) r = w / 2;
        if (h < 2 * r) r = h / 2;
        this.moveTo(x + r, y);
        this.lineTo(x + w - r, y);
        this.quadraticCurveTo(x + w, y, x + w, y + r);
        this.lineTo(x + w, y + h - r);
        this.quadraticCurveTo(x + w, y + h, x + w - r, y + h);
        this.lineTo(x + r, y + h);
        this.quadraticCurveTo(x, y + h, x, y + h - r);
        this.lineTo(x, y + r);
        this.quadraticCurveTo(x, y, x + r, y);
        this.closePath();
        return this;
    };

    // ---------- GAME LOOP (requestAnimationFrame) ----------
    function gameLoop(timestamp) {
        if (!gameActive) {
            draw(ctx); // show game over screen
            return;
        }
        if (lastTimestamp === null) {
            lastTimestamp = timestamp;
            animationFrame = requestAnimationFrame(gameLoop);
            return;
        }
        const deltaMs = timestamp - lastTimestamp;
        const deltaSec = Math.min(0.1, deltaMs / 1000); // cap large delta
        lastTimestamp = timestamp;

        updateGame(deltaSec);
        draw(ctx);

        if (gameActive) {
            animationFrame = requestAnimationFrame(gameLoop);
        } else {
            draw(ctx); // final draw game over
        }
    }

    // ---------- INITIALISE CANVAS & EVENTS ----------
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    canvas.addEventListener('click', handleCanvasClick);

    // restart button
    document.getElementById('restartGame').addEventListener('click', () => {
        restartGame();
    });

    // add plant button
    document.getElementById('addPlantBtn').addEventListener('click', () => {
        addCustomPlant();
    });

    // initial render
    renderPalette();
    updateSunDisplay();

    // start game
    restartGame(); // sets intervals and animation
})();
</script>
</body>
</html>
