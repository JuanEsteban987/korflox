<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noob In Combat · Selector de tropas</title>
    <style>
        * { box-sizing: border-box; user-select: none; }
        body { background: #1a2f2f; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Courier New', monospace; margin: 0; padding: 16px; }
        .game-container { background: #1e3b3b; border-radius: 32px; padding: 24px; border: 4px solid #4f7f7f; box-shadow: 0 10px 0 #0f2a2a; max-width: 1100px; }
        canvas { display: block; margin: 0 auto; background: #2f4f4f; border-radius: 20px; box-shadow: inset 0 0 0 2px #6f9f9f; cursor: pointer; }
        .panel { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; background: #1f3f3f; margin-top: 20px; padding: 15px 20px; border-radius: 60px; border: 2px solid #5f9f9f; color: #c8ffff; font-weight: bold; font-size: 20px; gap: 15px; }
        .stats { display: flex; gap: 30px; }
        .stats span { background: #0f2f2f; padding: 6px 20px; border-radius: 40px; border: 2px solid #5fbfbf; }
        button { background: #6f9f9f; border: none; color: #1f3f3f; font-size: 22px; font-weight: bold; padding: 8px 30px; border-radius: 40px; border-bottom: 5px solid #2f6f6f; cursor: pointer; font-family: inherit; transition: 0.08s; box-shadow: 0 4px 0 #1f4f4f; }
        button:hover { background: #8fbfbf; border-bottom-width: 3px; transform: translateY(2px); }
        button:active { border-bottom-width: 1px; transform: translateY(4px); }
        .info { font-size: 16px; background: #1f3737; padding: 5px 20px; border-radius: 30px; border: 1px solid #5f9f9f; }
        .turn-indicator { background: #2f5f5f; padding: 6px 20px; border-radius: 40px; border: 2px solid #8fcfcf; }

        /* Selector de tropas */
        .troop-selector {
            display: flex;
            justify-content: center;
            gap: 20px;
            margin: 20px 0 10px;
            flex-wrap: wrap;
        }
        .troop-btn {
            background: #2f5f5f;
            border: 3px solid #5f9f9f;
            border-radius: 60px;
            padding: 10px 25px;
            font-size: 22px;
            font-weight: bold;
            color: #efe;
            cursor: pointer;
            box-shadow: 0 5px 0 #1f3f3f;
            transition: 0.05s;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .troop-btn.selected {
            background: #7fbfbf;
            color: #1f3f3f;
            border-color: #cfefef;
            transform: translateY(2px);
            box-shadow: 0 3px 0 #1f3f3f;
        }
        .troop-btn .cost {
            background: #1f3f3f;
            color: #ffd966;
            padding: 4px 12px;
            border-radius: 40px;
            font-size: 18px;
        }
        .troop-info {
            display: flex;
            gap: 10px;
            align-items: center;
            color: #b3f0f0;
            background: #1f3737;
            padding: 8px 20px;
            border-radius: 40px;
            border: 1px solid #5f9f9f;
        }
    </style>
</head>
<body>
<div class="game-container">
    <canvas id="gridCanvas" width="800" height="800"></canvas>

    <!-- Selector de tropas -->
    <div class="troop-selector" id="troopSelector">
        <div class="troop-btn" data-type="warrior" id="btnWarrior">
            ⚔️ Guerrero <span class="cost">50💰</span>
        </div>
        <div class="troop-btn" data-type="archer" id="btnArcher">
            🏹 Arquero <span class="cost">70💰</span>
        </div>
        <div class="troop-btn" data-type="tank" id="btnTank">
            🛡️ Tanque <span class="cost">90💰</span>
        </div>
    </div>

    <div class="panel">
        <div class="stats">
            <span>💰 <span id="goldDisplay">300</span></span>
            <span>⚔️ <span id="enemiesDisplay">0</span></span>
        </div>
        <div class="turn-indicator" id="turnDisplay">🔵 Turno Jugador</div>
        <button id="endTurnBtn">🔁 Terminar turno</button>
    </div>

    <div style="display: flex; justify-content: space-between; margin-top: 16px; gap: 10px; flex-wrap: wrap;">
        <button id="restartBtn" style="background: #b36f6f; border-bottom-color: #6f3f3f;">💀 Reiniciar</button>
        <span class="troop-info" id="selectedTroopDisplay">⚔️ Guerrero seleccionado</span>
    </div>
</div>

<script>
    (function() {
        // ---------- Configuración ----------
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const goldSpan = document.getElementById('goldDisplay');
        const enemiesSpan = document.getElementById('enemiesDisplay');
        const turnDisplay = document.getElementById('turnDisplay');
        const endTurnBtn = document.getElementById('endTurnBtn');
        const restartBtn = document.getElementById('restartBtn');
        const selectedTroopDisplay = document.getElementById('selectedTroopDisplay');

        const GRID_SIZE = 10;
        const CELL_SIZE = canvas.width / GRID_SIZE;

        // Tipos de celda
        const TILE_EMPTY = 0;
        const TILE_PLAYER = 1;
        const TILE_ENEMY = 2;
        const TILE_BASE = 3;

        // Tipos de tropas jugador
        const TROOP_TYPES = {
            WARRIOR: 0,
            ARCHER: 1,
            TANK: 2
        };

        const TROOP_DATA = {
            [TROOP_TYPES.WARRIOR]: { name: 'Guerrero', cost: 50, attack: 28, hp: 100, color: '#f5d742', emoji: '⚔️' },
            [TROOP_TYPES.ARCHER]: { name: 'Arquero', cost: 70, attack: 35, hp: 80, color: '#7fbf7f', emoji: '🏹' },
            [TROOP_TYPES.TANK]: { name: 'Tanque', cost: 90, attack: 18, hp: 180, color: '#bf9f6f', emoji: '🛡️' }
        };

        // Enemigos (estándar)
        const ENEMY_ATTACK = 22;
        const ENEMY_HP = 100;

        // Bases
        const BASE_HP = 200;
        const BASE_COST = 150;
        const KILL_REWARD = 30;

        // Estado global
        let gold = 300;
        let turn = 'player';
        let gameOver = false;
        let victory = false;
        let turnCounter = 0;
        let selectedTroopType = TROOP_TYPES.WARRIOR; // Tipo seleccionado para comprar

        // Grid: cada celda { type, hp, acted, troopType (solo para jugador) }
        let grid = [];

        // Selección actual (para mover/atacar)
        let selectedRow = -1, selectedCol = -1;

        // Inicializar grid vacío
        function initGrid() {
            grid = [];
            for (let r = 0; r < GRID_SIZE; r++) {
                let row = [];
                for (let c = 0; c < GRID_SIZE; c++) {
                    row.push({ type: TILE_EMPTY, hp: 0, acted: false, troopType: null });
                }
                grid.push(row);
            }
        }

        // Comprobar si una casilla está adyacente a alguna base aliada
        function isAdjacentToBase(row, col) {
            const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
            for (let [dr, dc] of dirs) {
                let nr = row + dr, nc = col + dc;
                if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
                    if (grid[nr][nc].type === TILE_BASE) return true;
                }
            }
            return false;
        }

        // Colocar enemigos iniciales
        function spawnInitialEnemies() {
            let count = 0;
            while (count < 5) {
                let r = Math.floor(Math.random() * GRID_SIZE);
                let c = Math.floor(Math.random() * GRID_SIZE);
                if (grid[r][c].type === TILE_EMPTY && !(r === 0 && c === 0) && !(r === 0 && c === 1) && !(r === 1 && c === 0)) {
                    grid[r][c].type = TILE_ENEMY;
                    grid[r][c].hp = ENEMY_HP;
                    grid[r][c].acted = false;
                    count++;
                }
            }
        }

        // Reiniciar juego
        function restartGame() {
            gameOver = false;
            victory = false;
            gold = 300;
            turn = 'player';
            turnCounter = 0;
            selectedTroopType = TROOP_TYPES.WARRIOR;
            updateSelectedDisplay();
            initGrid();
            // Base inicial
            grid[0][0].type = TILE_BASE;
            grid[0][0].hp = BASE_HP;
            // Noob inicial (guerrero) en (0,1)
            grid[0][1].type = TILE_PLAYER;
            grid[0][1].hp = TROOP_DATA[TROOP_TYPES.WARRIOR].hp;
            grid[0][1].troopType = TROOP_TYPES.WARRIOR;
            grid[0][1].acted = false;
            spawnInitialEnemies();
            selectedRow = -1;
            selectedCol = -1;
            updateDisplay();
            drawGrid();
        }

        // Actualizar UI
        function updateDisplay() {
            goldSpan.textContent = gold;
            let enemyCount = 0;
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c].type === TILE_ENEMY) enemyCount++;
                }
            }
            enemiesSpan.textContent = enemyCount;
            turnDisplay.textContent = turn === 'player' ? '🔵 Turno Jugador' : '🔴 Turno Enemigo';
        }

        function updateSelectedDisplay() {
            const t = TROOP_DATA[selectedTroopType];
            selectedTroopDisplay.innerHTML = `${t.emoji} ${t.name} seleccionado (ataque ${t.attack} | vida ${t.hp})`;
        }

        // Comprobar fin del juego
        function checkGameOver() {
            let playerBaseExists = false;
            let enemyExists = false;
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c].type === TILE_BASE) playerBaseExists = true;
                    if (grid[r][c].type === TILE_ENEMY) enemyExists = true;
                }
            }
            if (!playerBaseExists) {
                gameOver = true;
                victory = false;
            } else if (!enemyExists) {
                gameOver = true;
                victory = true;
            }
            return gameOver;
        }

        // ---------- Acciones del jugador ----------
        // Comprar tropa del tipo seleccionado
        function tryBuyTroop(row, col) {
            if (gameOver) return false;
            if (turn !== 'player') return false;
            if (grid[row][col].type !== TILE_EMPTY) return false;
            if (!isAdjacentToBase(row, col)) return false;

            const troop = TROOP_DATA[selectedTroopType];
            if (gold < troop.cost) return false;

            gold -= troop.cost;
            grid[row][col].type = TILE_PLAYER;
            grid[row][col].hp = troop.hp;
            grid[row][col].troopType = selectedTroopType;
            grid[row][col].acted = true; // no actúa este turno
            updateDisplay();
            drawGrid();
            return true;
        }

        // Construir nueva base
        function tryBuildBase(row, col) {
            if (gameOver) return false;
            if (turn !== 'player') return false;
            if (grid[row][col].type !== TILE_EMPTY) return false;
            if (gold < BASE_COST) return false;
            if (!isAdjacentToBase(row, col)) return false;

            gold -= BASE_COST;
            grid[row][col].type = TILE_BASE;
            grid[row][col].hp = BASE_HP;
            updateDisplay();
            drawGrid();
            return true;
        }

        // Intentar mover o atacar
        function tryAction(sr, sc, dr, dc) {
            if (gameOver) return false;
            if (turn !== 'player') return false;
            if (grid[sr][sc].type !== TILE_PLAYER) return false;
            if (grid[sr][sc].acted) return false;
            if (Math.abs(sr - dr) + Math.abs(sc - dc) !== 1) return false;

            const attackerType = grid[sr][sc].troopType;
            const attackPower = TROOP_DATA[attackerType].attack;

            // Mover a vacío
            if (grid[dr][dc].type === TILE_EMPTY) {
                grid[dr][dc].type = TILE_PLAYER;
                grid[dr][dc].hp = grid[sr][sc].hp;
                grid[dr][dc].troopType = attackerType;
                grid[dr][dc].acted = true;
                grid[sr][sc].type = TILE_EMPTY;
                grid[sr][sc].hp = 0;
                grid[sr][sc].troopType = null;
                return true;
            }
            // Atacar enemigo
            else if (grid[dr][dc].type === TILE_ENEMY) {
                grid[dr][dc].hp -= attackPower;
                grid[sr][sc].acted = true;
                if (grid[dr][dc].hp <= 0) {
                    grid[dr][dc].type = TILE_EMPTY;
                    grid[dr][dc].hp = 0;
                    gold += KILL_REWARD;
                }
                return true;
            }
            return false;
        }

        // Manejar clic del jugador
        function handlePlayerClick(row, col) {
            const cell = grid[row][col];

            // Si no hay selección
            if (selectedRow === -1) {
                // Si es noob aliado y no ha actuado, seleccionar
                if (cell.type === TILE_PLAYER && !cell.acted) {
                    selectedRow = row;
                    selectedCol = col;
                }
                // Si es base, seleccionar para construir
                else if (cell.type === TILE_BASE) {
                    selectedRow = row;
                    selectedCol = col;
                }
                // Si es vacío, puede ser compra de tropa (si adyacente a base)
                else if (cell.type === TILE_EMPTY) {
                    // Si hay una base seleccionada y es adyacente, construir base
                    if (selectedRow !== -1 && grid[selectedRow][selectedCol].type === TILE_BASE) {
                        if (Math.abs(selectedRow - row) + Math.abs(selectedCol - col) === 1) {
                            tryBuildBase(row, col);
                        }
                        selectedRow = -1;
                    } else {
                        // Comprar tropa del tipo seleccionado
                        tryBuyTroop(row, col);
                    }
                }
            } else {
                // Hay algo seleccionado
                const selectedType = grid[selectedRow][selectedCol].type;

                if (selectedRow === row && selectedCol === col) {
                    selectedRow = -1;
                    selectedCol = -1;
                    return;
                }

                if (selectedType === TILE_PLAYER) {
                    const success = tryAction(selectedRow, selectedCol, row, col);
                    selectedRow = -1;
                    selectedCol = -1;
                    if (success) {
                        updateDisplay();
                        checkGameOver();
                    }
                }
                else if (selectedType === TILE_BASE) {
                    if (grid[row][col].type === TILE_EMPTY && Math.abs(selectedRow - row) + Math.abs(selectedCol - col) === 1) {
                        tryBuildBase(row, col);
                    }
                    selectedRow = -1;
                    selectedCol = -1;
                } else {
                    selectedRow = -1;
                    selectedCol = -1;
                }
            }
            drawGrid();
        }

        // ---------- Turno enemigo ----------
        function processEnemyTurn() {
            if (gameOver) return;

            // Resetear acted enemigos
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c].type === TILE_ENEMY) grid[r][c].acted = false;
                }
            }

            // Acciones enemigas
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c].type === TILE_ENEMY && !grid[r][c].acted) {
                        let attacked = false;
                        const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
                        // Atacar base
                        for (let [dr, dc] of dirs) {
                            let nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
                                if (grid[nr][nc].type === TILE_BASE) {
                                    grid[nr][nc].hp -= ENEMY_ATTACK;
                                    grid[r][c].acted = true;
                                    if (grid[nr][nc].hp <= 0) {
                                        grid[nr][nc].type = TILE_EMPTY;
                                        grid[nr][nc].hp = 0;
                                    }
                                    attacked = true;
                                    break;
                                }
                            }
                        }
                        if (!attacked) {
                            for (let [dr, dc] of dirs) {
                                let nr = r + dr, nc = c + dc;
                                if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
                                    if (grid[nr][nc].type === TILE_PLAYER) {
                                        grid[nr][nc].hp -= ENEMY_ATTACK;
                                        grid[r][c].acted = true;
                                        if (grid[nr][nc].hp <= 0) {
                                            grid[nr][nc].type = TILE_EMPTY;
                                            grid[nr][nc].hp = 0;
                                            grid[nr][nc].troopType = null;
                                        }
                                        attacked = true;
                                        break;
                                    }
                                }
                            }
                        }
                        if (!attacked) {
                            // Moverse hacia base o jugador
                            let targetR = -1, targetC = -1;
                            let minDist = Infinity;
                            for (let pr = 0; pr < GRID_SIZE; pr++) {
                                for (let pc = 0; pc < GRID_SIZE; pc++) {
                                    if (grid[pr][pc].type === TILE_BASE || grid[pr][pc].type === TILE_PLAYER) {
                                        let d = Math.abs(pr - r) + Math.abs(pc - c);
                                        if (d < minDist) {
                                            minDist = d;
                                            targetR = pr;
                                            targetC = pc;
                                        }
                                    }
                                }
                            }
                            if (targetR !== -1) {
                                let bestDir = null;
                                let bestDist = minDist;
                                for (let [dr, dc] of dirs) {
                                    let nr = r + dr, nc = c + dc;
                                    if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && grid[nr][nc].type === TILE_EMPTY) {
                                        let newDist = Math.abs(targetR - nr) + Math.abs(targetC - nc);
                                        if (newDist < bestDist) {
                                            bestDist = newDist;
                                            bestDir = [dr, dc];
                                        }
                                    }
                                }
                                if (bestDir) {
                                    let nr = r + bestDir[0], nc = c + bestDir[1];
                                    grid[nr][nc].type = TILE_ENEMY;
                                    grid[nr][nc].hp = grid[r][c].hp;
                                    grid[nr][nc].acted = true;
                                    grid[r][c].type = TILE_EMPTY;
                                    grid[r][c].hp = 0;
                                } else {
                                    grid[r][c].acted = true;
                                }
                            } else {
                                grid[r][c].acted = true;
                            }
                        }
                    }
                }
            }

            // Resetear acted enemigos
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c].type === TILE_ENEMY) grid[r][c].acted = false;
                }
            }

            turnCounter++;
            if (turnCounter % 2 === 0) spawnWave();
        }

        function spawnWave() {
            let newEnemies = 2 + Math.floor(Math.random() * 3);
            for (let i = 0; i < newEnemies; i++) {
                let r, c;
                let side = Math.floor(Math.random() * 4);
                let attempts = 0;
                do {
                    if (side === 0) { r = 0; c = Math.floor(Math.random() * GRID_SIZE); }
                    else if (side === 1) { r = Math.floor(Math.random() * GRID_SIZE); c = GRID_SIZE - 1; }
                    else if (side === 2) { r = GRID_SIZE - 1; c = Math.floor(Math.random() * GRID_SIZE); }
                    else { r = Math.floor(Math.random() * GRID_SIZE); c = 0; }
                    attempts++;
                    if (attempts > 200) break;
                } while (grid[r][c].type !== TILE_EMPTY);
                if (attempts <= 200) {
                    grid[r][c].type = TILE_ENEMY;
                    grid[r][c].hp = ENEMY_HP;
                    grid[r][c].acted = false;
                }
            }
        }

        function endTurn() {
            if (gameOver) return;
            if (turn === 'player') {
                for (let r = 0; r < GRID_SIZE; r++) {
                    for (let c = 0; c < GRID_SIZE; c++) {
                        if (grid[r][c].type === TILE_PLAYER) grid[r][c].acted = false;
                    }
                }
                turn = 'enemy';
                updateDisplay();
                drawGrid();

                setTimeout(() => {
                    if (!gameOver && turn === 'enemy') {
                        processEnemyTurn();
                        checkGameOver();
                        turn = 'player';
                        selectedRow = -1;
                        selectedCol = -1;
                        updateDisplay();
                        drawGrid();
                    }
                }, 300);
            }
        }

        // Eventos
        canvas.addEventListener('click', (e) => {
            if (gameOver) return;
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            const col = Math.floor(mouseX / CELL_SIZE);
            const row = Math.floor(mouseY / CELL_SIZE);
            if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) return;

            if (turn === 'player') {
                handlePlayerClick(row, col);
            }
        });

        // Selector de tropas
        document.getElementById('btnWarrior').addEventListener('click', () => {
            selectedTroopType = TROOP_TYPES.WARRIOR;
            updateSelectedDisplay();
            // Resaltar botón
            document.querySelectorAll('.troop-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('btnWarrior').classList.add('selected');
        });
        document.getElementById('btnArcher').addEventListener('click', () => {
            selectedTroopType = TROOP_TYPES.ARCHER;
            updateSelectedDisplay();
            document.querySelectorAll('.troop-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('btnArcher').classList.add('selected');
        });
        document.getElementById('btnTank').addEventListener('click', () => {
            selectedTroopType = TROOP_TYPES.TANK;
            updateSelectedDisplay();
            document.querySelectorAll('.troop-btn').forEach(btn => btn.classList.remove('selected'));
            document.getElementById('btnTank').classList.add('selected');
        });

        endTurnBtn.addEventListener('click', endTurn);
        restartBtn.addEventListener('click', () => {
            restartGame();
            drawGrid();
        });

        // Dibujado
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Líneas
            ctx.strokeStyle = '#5f9f9f';
            ctx.lineWidth = 2;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const x = c * CELL_SIZE;
                    const y = r * CELL_SIZE;
                    const cell = grid[r][c];

                    if (selectedRow === r && selectedCol === c) {
                        ctx.fillStyle = '#ffffc0';
                        ctx.globalAlpha = 0.4;
                        ctx.fillRect(x+2, y+2, CELL_SIZE-4, CELL_SIZE-4);
                        ctx.globalAlpha = 1;
                    }

                    if (cell.type === TILE_PLAYER) {
                        const troop = TROOP_DATA[cell.troopType];
                        ctx.shadowColor = troop.color;
                        ctx.shadowBlur = 12;
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, CELL_SIZE*0.3, 0, 2*Math.PI);
                        ctx.fillStyle = troop.color;
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // Ojos
                        ctx.fillStyle = '#000';
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.35, y + CELL_SIZE*0.4, 5, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.65, y + CELL_SIZE*0.4, 5, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.32, y + CELL_SIZE*0.37, 2, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.62, y + CELL_SIZE*0.37, 2, 0, 2*Math.PI);
                        ctx.fill();
                        // Emoji según tipo
                        ctx.font = '24px monospace';
                        ctx.fillStyle = '#1f1f1f';
                        ctx.fillText(troop.emoji, x+25, y+55);
                        if (cell.acted) {
                            ctx.fillStyle = '#aaa';
                            ctx.globalAlpha = 0.5;
                            ctx.beginPath();
                            ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, CELL_SIZE*0.25, 0, 2*Math.PI);
                            ctx.fill();
                            ctx.globalAlpha = 1;
                        }
                        // Barra de vida
                        ctx.fillStyle = '#2fbf2f';
                        ctx.fillRect(x+10, y+CELL_SIZE-15, (cell.hp / troop.hp) * (CELL_SIZE-20), 6);
                    }
                    else if (cell.type === TILE_ENEMY) {
                        ctx.shadowColor = '#e33f3f';
                        ctx.shadowBlur = 12;
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, CELL_SIZE*0.3, 0, 2*Math.PI);
                        ctx.fillStyle = '#e33f3f';
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#000';
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.35, y + CELL_SIZE*0.4, 5, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.65, y + CELL_SIZE*0.4, 5, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.32, y + CELL_SIZE*0.37, 2, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.62, y + CELL_SIZE*0.37, 2, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.fillStyle = '#bf2f2f';
                        ctx.fillRect(x+10, y+CELL_SIZE-15, (cell.hp / ENEMY_HP) * (CELL_SIZE-20), 6);
                    }
                    else if (cell.type === TILE_BASE) {
                        ctx.fillStyle = '#6f9fcf';
                        ctx.shadowColor = '#2f6f9f';
                        ctx.shadowBlur = 12;
                        ctx.fillRect(x+5, y+5, CELL_SIZE-10, CELL_SIZE-10);
                        ctx.shadowBlur = 0;
                        ctx.fillStyle = '#4f7faf';
                        ctx.font = 'bold 30px monospace';
                        ctx.fillText('🏰', x+20, y+60);
                        ctx.fillStyle = '#2f6fbf';
                        ctx.fillRect(x+10, y+CELL_SIZE-15, (cell.hp / BASE_HP) * (CELL_SIZE-20), 6);
                    }
                }
            }

            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.7)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 48px "Courier New"';
                ctx.fillStyle = victory ? '#cfc' : '#f99';
                ctx.shadowColor = '#000';
                ctx.shadowBlur = 10;
                ctx.fillText(victory ? 'VICTORIA!' : 'DERROTA', 200, 400);
                ctx.shadowBlur = 0;
            }
        }

        function loop() {
            drawGrid();
            requestAnimationFrame(loop);
        }

        restartGame();
        loop();
    })();
</script>
</body>
</html>
