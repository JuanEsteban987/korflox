<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🗺️ NOOB WAR · CONSTRUCCIÓN & MOVIMIENTO · 2008 🗺️</title>
    <style>
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background: #1b3b4f;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .game-container {
            max-width: 1300px;
            width: 100%;
            background: #6d9ac4;
            border: 6px ridge #ffffff;
            box-shadow: 12px 12px 0px #0a1f2b;
            padding: 24px 20px;
        }

        .header {
            background: #4b6e8c;
            border: 4px outset #e0e0e0;
            padding: 14px 8px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 4px 4px 0px #1f4f6e, 6px 6px 0px #0b2b3f;
            letter-spacing: 2px;
        }

        .stats-panel {
            background: #b8d8f0;
            border: 4px inset #f0f8ff;
            padding: 20px 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 16px;
            box-shadow: inset 2px 2px 0px #3b5e7a;
        }

        .stat-item {
            background: #e6f0fa;
            border: 3px ridge #ffffff;
            padding: 12px 18px;
            font-size: 22px;
            font-weight: bold;
            color: #0f2f44;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 3px 3px 0px #3b6e8c;
        }

        .stat-item span {
            background: #1b2f44;
            color: #ffffc0;
            padding: 4px 16px;
            border: 2px inset #c0c0c0;
            font-size: 30px;
            margin-left: 8px;
        }

        .map-wrapper {
            position: relative;
            margin: 20px 0;
            border: 8px ridge #5f8faf;
            background: #2f5f7a;
            padding: 0;
            overflow: hidden;
            cursor: grab;
            width: 100%;
            height: 600px;
        }

        .map-wrapper:active {
            cursor: grabbing;
        }

        canvas {
            display: block;
            width: 100%;
            height: 100%;
            background: #3f7a5a;
            image-rendering: crisp-edges;
        }

        .buildings-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            margin: 25px 0 15px;
        }

        .roblox-btn {
            background: #c0c0c0;
            border: 6px outset #f8f8f8;
            font-size: 26px;
            font-weight: bold;
            padding: 16px 32px;
            cursor: pointer;
            color: #1f2f3f;
            text-transform: uppercase;
            box-shadow: 5px 5px 0px #2f4f6f;
            transition: 0.05s linear;
            letter-spacing: 2px;
            min-width: 260px;
        }

        .roblox-btn:active {
            border: 6px inset #f8f8f8;
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #2f4f6f;
        }

        .roblox-btn.active {
            background: #f0f0a0;
            border-color: #ffff00;
            box-shadow: 0 0 10px yellow;
        }

        .roblox-btn:disabled {
            opacity: 0.4;
            filter: grayscale(60%);
            transform: none;
            border: 6px outset #a0a0a0;
            box-shadow: 2px 2px 0px #1f3f4f;
            cursor: not-allowed;
        }

        .attack-btn {
            background: #c02f2f;
            border: 8px outset #ffc0c0;
            font-size: 44px;
            padding: 24px 70px;
            color: white;
            text-shadow: 4px 4px 0 #5f1f1f;
            box-shadow: 12px 12px 0 #2f1f1f;
            width: 100%;
            max-width: 500px;
            margin: 0 auto;
        }

        .log-box {
            background: #0f1f2b;
            border: 6px inset #3f6f8f;
            padding: 16px;
            color: #9bff9b;
            font-size: 20px;
            min-height: 100px;
            max-height: 140px;
            overflow-y: auto;
            box-shadow: inset 0 0 0 2px #1f4f6e;
            margin: 20px 0 10px;
        }

        .log-box p {
            margin: 4px 0;
            border-left: 4px solid #5faf5f;
            padding-left: 10px;
        }

        .footer-note {
            text-align: center;
            font-size: 18px;
            color: #e0f0ff;
            text-shadow: 2px 2px 0 #0f2a3f;
            background: #2b4f6b;
            padding: 6px;
            border: 2px ridge #9fbfdf;
        }

        .mode-indicator {
            background: #00000080;
            color: white;
            font-size: 24px;
            padding: 10px;
            border-radius: 10px;
            position: absolute;
            top: 10px;
            left: 10px;
            z-index: 10;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            🏰 NOOB WAR · CONSTRUCCIÓN & MOVIMIENTO 🏰
        </div>

        <!-- Panel de recursos -->
        <div class="stats-panel">
            <div class="stat-item">💰 TIX <span id="tixDisplay">300</span></div>
            <div class="stat-item">⚔️ NOOBS EN CENTRO <span id="noobsCenterDisplay">0</span></div>
            <div class="stat-item">🏭 SPAWNERS <span id="spawnerCount">1</span></div>
            <div class="stat-item">🔬 INVEST. <span id="investigatorCount">1</span></div>
        </div>

        <!-- Mapa con zoom y pan -->
        <div class="map-wrapper" id="mapWrapper">
            <canvas id="gameCanvas" width="600" height="600"></canvas>
            <div class="mode-indicator" id="modeIndicator">⚡ Modo: Ninguno</div>
        </div>

        <!-- Botones de construcción -->
        <div class="buildings-panel">
            <button class="roblox-btn" id="buySpawnerBtn">🏭 COLOCAR SPAWNER (50💰)</button>
            <button class="roblox-btn" id="buyInvestigatorBtn">🔬 COLOCAR INVESTIGADOR (30💰)</button>
        </div>

        <!-- Botón de ataque central -->
        <div style="display: flex; justify-content: center;">
            <button class="roblox-btn attack-btn" id="attackBtn">💥 ¡ATACAR! 💥</button>
        </div>

        <!-- Log de eventos -->
        <div class="log-box" id="logMessages">
            <p>🌍 2008: Haz clic en tu territorio (verde) para colocar edificios. Los noobs van al centro.</p>
        </div>

        <div class="footer-note">
            🧱 ROBLOX 2008 · MAPA 120x120 · CONSTRUCCIÓN MANUAL · CUBOS 🧱
        </div>
    </div>

    <script>
        (function() {
            // --- Dimensiones del mapa ---
            const MAP_SIZE = 120;            // 120x120 casillas
            const CELL_SIZE = 5;              // píxeles por casilla (canvas 600x600)

            // --- Territorios ---
            const PLAYER_ZONE = { rowMin: 0, rowMax: 39, colMin: 0, colMax: 39 };
            const ENEMY_ZONE = { rowMin: 80, rowMax: 119, colMin: 80, colMax: 119 };

            // --- Estado del juego ---
            let playerTix = 300;
            let playerCenterNoobs = 0;          // noobs que han llegado al centro (listos para pelear)
            let enemyCenterNoobs = 5;            // noobs enemigos en centro (inicialmente algunos)

            let playerSpawners = [];              // {x, y}
            let playerInvestigators = [];          // {x, y}
            let enemySpawners = [];                // {x, y}

            // Tropas en movimiento hacia el centro
            let movingTroops = [];                 // { x, y, targetX, targetY, bando }  bando: 'player' o 'enemy'

            const SPAWNER_COST = 50;
            const INVESTIGATOR_COST = 30;
            const REWARD = 50;
            const PRODUCTION_INTERVAL = 3000;      // 3 segundos
            const MOVE_SPEED = 1.0;                 // píxeles por frame (a 60fps, 60 por segundo)

            // Variables para zoom y pan
            let viewX = 300, viewY = 300;
            let zoom = 1.0;
            const MIN_ZOOM = 0.5;
            const MAX_ZOOM = 3.0;

            // Arrastre
            let isDragging = false;
            let lastMouseX, lastMouseY;

            // Modo construcción
            let buildMode = null;                   // 'spawner' o 'investigator'

            // Elementos DOM
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const mapWrapper = document.getElementById('mapWrapper');
            const tixSpan = document.getElementById('tixDisplay');
            const noobsCenterSpan = document.getElementById('noobsCenterDisplay');
            const spawnerCountSpan = document.getElementById('spawnerCount');
            const investigatorCountSpan = document.getElementById('investigatorCount');
            const logDiv = document.getElementById('logMessages');
            const buySpawnerBtn = document.getElementById('buySpawnerBtn');
            const buyInvestigatorBtn = document.getElementById('buyInvestigatorBtn');
            const attackBtn = document.getElementById('attackBtn');
            const modeIndicator = document.getElementById('modeIndicator');

            // --- Funciones de utilidad ---
            function agregarLog(mensaje) {
                const p = document.createElement('p');
                p.textContent = mensaje;
                logDiv.appendChild(p);
                while (logDiv.children.length > 6) {
                    logDiv.removeChild(logDiv.firstChild);
                }
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            // --- Actualizar UI y modo visual ---
            function actualizarUI() {
                tixSpan.textContent = playerTix;
                noobsCenterSpan.textContent = playerCenterNoobs;
                spawnerCountSpan.textContent = playerSpawners.length;
                investigatorCountSpan.textContent = playerInvestigators.length;

                // Botones según modo
                buySpawnerBtn.classList.toggle('active', buildMode === 'spawner');
                buyInvestigatorBtn.classList.toggle('active', buildMode === 'investigator');
                modeIndicator.textContent = buildMode ? `⚡ Modo: ${buildMode === 'spawner' ? 'SPAWNER' : 'INVESTIGADOR'}` : '⚡ Modo: Ninguno';
            }

            // --- Dibujar mapa con efecto cubo (relieve en celdas) ---
            function dibujarMapa() {
                ctx.clearRect(0, 0, 600, 600);
                ctx.save();
                ctx.translate(300, 300);
                ctx.scale(zoom, zoom);
                ctx.translate(-viewX, -viewY);

                // Dibujar fondo de césped (cada celda con relieve)
                // Para dar efecto cubo, pintamos cada celda con un color base y luego bordes claros/oscuros
                for (let row = 0; row < MAP_SIZE; row++) {
                    for (let col = 0; col < MAP_SIZE; col++) {
                        let x = col * CELL_SIZE;
                        let y = row * CELL_SIZE;
                        // Color base según territorio
                        let baseColor;
                        if (row >= PLAYER_ZONE.rowMin && row <= PLAYER_ZONE.rowMax && col >= PLAYER_ZONE.colMin && col <= PLAYER_ZONE.colMax) {
                            baseColor = '#5f9f6f'; // verde jugador
                        } else if (row >= ENEMY_ZONE.rowMin && row <= ENEMY_ZONE.rowMax && col >= ENEMY_ZONE.colMin && col <= ENEMY_ZONE.colMax) {
                            baseColor = '#9f6f5f'; // rojizo enemigo
                        } else {
                            baseColor = '#3f7a5a'; // tierra de nadie
                        }
                        ctx.fillStyle = baseColor;
                        ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);

                        // Efecto cubo: borde superior e izquierdo más claro, inferior y derecho más oscuro
                        ctx.beginPath();
                        ctx.strokeStyle = '#ffffff40';
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(x, y + CELL_SIZE);
                        ctx.lineTo(x, y);
                        ctx.lineTo(x + CELL_SIZE, y);
                        ctx.stroke();

                        ctx.beginPath();
                        ctx.strokeStyle = '#00000040';
                        ctx.lineWidth = 0.5;
                        ctx.moveTo(x + CELL_SIZE, y);
                        ctx.lineTo(x + CELL_SIZE, y + CELL_SIZE);
                        ctx.lineTo(x, y + CELL_SIZE);
                        ctx.stroke();
                    }
                }

                // Dibujar edificios del jugador (con efecto 3D simple)
                playerSpawners.forEach(s => {
                    let x = s.y * CELL_SIZE;
                    let y = s.x * CELL_SIZE;
                    // Cara frontal
                    ctx.fillStyle = '#3a7aff';
                    ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                    // Relieve: cara superior e izquierda más claras
                    ctx.fillStyle = '#7aafff';
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + CELL_SIZE, y);
                    ctx.lineTo(x + CELL_SIZE - 2, y + 2);
                    ctx.lineTo(x + 2, y + 2);
                    ctx.fill();
                    ctx.fillStyle = '#1a4fbf';
                    ctx.beginPath();
                    ctx.moveTo(x + CELL_SIZE, y);
                    ctx.lineTo(x + CELL_SIZE, y + CELL_SIZE);
                    ctx.lineTo(x + CELL_SIZE - 2, y + CELL_SIZE - 2);
                    ctx.lineTo(x + CELL_SIZE - 2, y + 2);
                    ctx.fill();
                    // Icono
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${4 * (1/zoom)}px monospace`;
                    ctx.fillText('🏭', x + 1, y + 4);
                });
                playerInvestigators.forEach(s => {
                    let x = s.y * CELL_SIZE;
                    let y = s.x * CELL_SIZE;
                    ctx.fillStyle = '#3aff3a';
                    ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                    ctx.fillStyle = '#afffaf';
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + CELL_SIZE, y);
                    ctx.lineTo(x + CELL_SIZE - 2, y + 2);
                    ctx.lineTo(x + 2, y + 2);
                    ctx.fill();
                    ctx.fillStyle = '#1fbf1f';
                    ctx.beginPath();
                    ctx.moveTo(x + CELL_SIZE, y);
                    ctx.lineTo(x + CELL_SIZE, y + CELL_SIZE);
                    ctx.lineTo(x + CELL_SIZE - 2, y + CELL_SIZE - 2);
                    ctx.lineTo(x + CELL_SIZE - 2, y + 2);
                    ctx.fill();
                    ctx.fillStyle = '#000000';
                    ctx.font = `bold ${4 * (1/zoom)}px monospace`;
                    ctx.fillText('🔬', x + 1, y + 4);
                });
                enemySpawners.forEach(s => {
                    let x = s.y * CELL_SIZE;
                    let y = s.x * CELL_SIZE;
                    ctx.fillStyle = '#ff3a3a';
                    ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                    ctx.fillStyle = '#ffafaf';
                    ctx.beginPath();
                    ctx.moveTo(x, y);
                    ctx.lineTo(x + CELL_SIZE, y);
                    ctx.lineTo(x + CELL_SIZE - 2, y + 2);
                    ctx.lineTo(x + 2, y + 2);
                    ctx.fill();
                    ctx.fillStyle = '#bf1f1f';
                    ctx.beginPath();
                    ctx.moveTo(x + CELL_SIZE, y);
                    ctx.lineTo(x + CELL_SIZE, y + CELL_SIZE);
                    ctx.lineTo(x + CELL_SIZE - 2, y + CELL_SIZE - 2);
                    ctx.lineTo(x + CELL_SIZE - 2, y + 2);
                    ctx.fill();
                    ctx.fillStyle = '#ffffff';
                    ctx.font = `bold ${4 * (1/zoom)}px monospace`;
                    ctx.fillText('🏭', x + 1, y + 4);
                });

                // Dibujar tropas en movimiento
                movingTroops.forEach(t => {
                    ctx.beginPath();
                    ctx.arc(t.x, t.y, 3, 0, 2 * Math.PI);
                    ctx.fillStyle = t.bando === 'player' ? '#ffff00' : '#ff4444';
                    ctx.shadowColor = t.bando === 'player' ? '#ffaa00' : '#aa0000';
                    ctx.shadowBlur = 5;
                    ctx.fill();
                });
                ctx.shadowBlur = 0;

                ctx.restore();
            }

            // --- Actualizar posiciones de tropas en movimiento ---
            function actualizarMovimiento() {
                let nuevas = [];
                for (let t of movingTroops) {
                    // Dirección al centro (300,300)
                    let dx = 300 - t.x;
                    let dy = 300 - t.y;
                    let dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < MOVE_SPEED) {
                        // Llegó al centro
                        if (t.bando === 'player') {
                            playerCenterNoobs++;
                        } else {
                            enemyCenterNoobs++;
                        }
                        // No agregar a nuevas
                    } else {
                        let ang = Math.atan2(dy, dx);
                        t.x += Math.cos(ang) * MOVE_SPEED;
                        t.y += Math.sin(ang) * MOVE_SPEED;
                        nuevas.push(t);
                    }
                }
                movingTroops = nuevas;
                dibujarMapa();
                requestAnimationFrame(actualizarMovimiento);
            }

            // --- Producción de recursos (cada 3 segundos) ---
            function producir() {
                // Los spawners del jugador generan tropas en movimiento
                playerSpawners.forEach(s => {
                    // Crear una nueva tropa en la posición del spawner
                    let x = s.y * CELL_SIZE + CELL_SIZE/2;
                    let y = s.x * CELL_SIZE + CELL_SIZE/2;
                    movingTroops.push({ x, y, targetX: 300, targetY: 300, bando: 'player' });
                });
                if (playerSpawners.length > 0) {
                    agregarLog(`🏭 Spawners envían ${playerSpawners.length} noob(s) al centro.`);
                }
                // Investigadores generan Tix
                if (playerInvestigators.length > 0) {
                    playerTix += playerInvestigators.length * 5;
                    agregarLog(`🔬 Investigadores generan ${playerInvestigators.length * 5} Tix.`);
                }
                // Spawners enemigos generan tropas en movimiento enemigas
                enemySpawners.forEach(s => {
                    let x = s.y * CELL_SIZE + CELL_SIZE/2;
                    let y = s.x * CELL_SIZE + CELL_SIZE/2;
                    movingTroops.push({ x, y, targetX: 300, targetY: 300, bando: 'enemy' });
                });
                if (enemySpawners.length > 0) {
                    agregarLog(`👾 Enemigo envía ${enemySpawners.length} noob(s) al centro.`);
                }
                actualizarUI();
                dibujarMapa();
            }

            // --- El enemigo construye spawners periódicamente ---
            function enemigoConstruye() {
                if (enemySpawners.length >= 40) return;
                // Buscar celda libre en zona enemiga
                let intentos = 0;
                while (intentos < 100) {
                    let row = Math.floor(Math.random() * (ENEMY_ZONE.rowMax - ENEMY_ZONE.rowMin + 1)) + ENEMY_ZONE.rowMin;
                    let col = Math.floor(Math.random() * (ENEMY_ZONE.colMax - ENEMY_ZONE.colMin + 1)) + ENEMY_ZONE.colMin;
                    let ocupado = enemySpawners.some(s => s.x === row && s.y === col);
                    if (!ocupado) {
                        enemySpawners.push({ x: row, y: col });
                        agregarLog(`⚠️ Enemigo construyó spawner en (${row}, ${col}).`);
                        break;
                    }
                    intentos++;
                }
                actualizarUI();
                dibujarMapa();
            }

            // --- Batalla (combate en el centro) ---
            function atacar() {
                if (playerCenterNoobs === 0 && enemyCenterNoobs === 0) {
                    agregarLog('🤷 No hay noobs en el centro para pelear.');
                    return;
                }

                // Animación flash en canvas
                canvas.style.border = '6px inset #ffff00';
                setTimeout(() => canvas.style.border = '6px inset #9fbfdf', 200);

                // Comparar
                if (playerCenterNoobs > enemyCenterNoobs) {
                    let bajas = enemyCenterNoobs;
                    playerCenterNoobs -= bajas;
                    enemyCenterNoobs = 0;
                    playerTix += REWARD;
                    agregarLog(`🎉 VICTORIA! +${REWARD} TIX. Te quedan ${playerCenterNoobs} noobs en centro.`);
                } else if (enemyCenterNoobs > playerCenterNoobs) {
                    let bajas = playerCenterNoobs;
                    enemyCenterNoobs -= bajas;
                    playerCenterNoobs = 0;
                    agregarLog(`💔 DERROTA... Enemigo queda con ${enemyCenterNoobs} noobs en centro.`);
                } else {
                    playerCenterNoobs = 0;
                    enemyCenterNoobs = 0;
                    agregarLog(`⚖️ EMPATE! Ambos ejércitos se destruyen.`);
                }
                actualizarUI();
                dibujarMapa();
            }

            // --- Conversión de coordenadas de clic a celda ---
            function obtenerCeldaDesdeClic(clientX, clientY) {
                const rect = canvas.getBoundingClientRect();
                // Coordenadas relativas al canvas (píxeles de pantalla)
                let canvasX = (clientX - rect.left) * (canvas.width / rect.width);
                let canvasY = (clientY - rect.top) * (canvas.height / rect.height);

                // Aplicar transformación inversa: (canvasX, canvasY) en píxeles del canvas (0-600)
                // Transformar a coordenadas del mundo
                let worldX = (canvasX - 300) / zoom + viewX;
                let worldY = (canvasY - 300) / zoom + viewY;

                // Convertir a fila y columna
                let col = Math.floor(worldX / CELL_SIZE);
                let row = Math.floor(worldY / CELL_SIZE);

                return { row, col };
            }

            // --- Manejar clic en canvas para construir ---
            function handleCanvasClick(e) {
                if (!buildMode) return;

                const { row, col } = obtenerCeldaDesdeClic(e.clientX, e.clientY);

                // Verificar si está dentro del territorio del jugador
                if (row < PLAYER_ZONE.rowMin || row > PLAYER_ZONE.rowMax || col < PLAYER_ZONE.colMin || col > PLAYER_ZONE.colMax) {
                    agregarLog('❌ Solo puedes construir en tu territorio (verde).');
                    return;
                }

                // Verificar que la celda esté vacía
                let ocupado = playerSpawners.some(s => s.x === row && s.y === col) ||
                              playerInvestigators.some(s => s.x === row && s.y === col);
                if (ocupado) {
                    agregarLog('❌ Celda ocupada por otro edificio.');
                    return;
                }

                // Comprar según modo
                if (buildMode === 'spawner') {
                    if (playerTix < SPAWNER_COST) {
                        agregarLog(`❌ Necesitas ${SPAWNER_COST} TIX.`);
                        return;
                    }
                    playerTix -= SPAWNER_COST;
                    playerSpawners.push({ x: row, y: col });
                    agregarLog(`🏭 Spawner colocado en (${row}, ${col}).`);
                } else if (buildMode === 'investigator') {
                    if (playerTix < INVESTIGATOR_COST) {
                        agregarLog(`❌ Necesitas ${INVESTIGATOR_COST} TIX.`);
                        return;
                    }
                    playerTix -= INVESTIGATOR_COST;
                    playerInvestigators.push({ x: row, y: col });
                    agregarLog(`🔬 Investigador colocado en (${row}, ${col}).`);
                }

                // Salir del modo construcción
                buildMode = null;
                actualizarUI();
                dibujarMapa();
            }

            // --- Eventos de zoom y pan ---
            mapWrapper.addEventListener('wheel', (e) => {
                e.preventDefault();
                const delta = -Math.sign(e.deltaY) * 0.1;
                zoom = Math.min(MAX_ZOOM, Math.max(MIN_ZOOM, zoom + delta));
                dibujarMapa();
            });

            mapWrapper.addEventListener('mousedown', (e) => {
                if (e.button !== 0) return;
                isDragging = true;
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                mapWrapper.style.cursor = 'grabbing';
            });

            window.addEventListener('mousemove', (e) => {
                if (!isDragging) return;
                const dx = (e.clientX - lastMouseX) / zoom;
                const dy = (e.clientY - lastMouseY) / zoom;
                viewX = Math.max(0, Math.min(600, viewX - dx));
                viewY = Math.max(0, Math.min(600, viewY - dy));
                lastMouseX = e.clientX;
                lastMouseY = e.clientY;
                dibujarMapa();
            });

            window.addEventListener('mouseup', () => {
                isDragging = false;
                mapWrapper.style.cursor = 'grab';
            });

            // Clic en canvas para construir
            canvas.addEventListener('click', handleCanvasClick);

            // Botones de construcción
            buySpawnerBtn.addEventListener('click', () => {
                buildMode = buildMode === 'spawner' ? null : 'spawner';
                actualizarUI();
            });
            buyInvestigatorBtn.addEventListener('click', () => {
                buildMode = buildMode === 'investigator' ? null : 'investigator';
                actualizarUI();
            });
            attackBtn.addEventListener('click', atacar);

            // --- Inicializar ---
            function inicializarEdificios() {
                // Colocar spawner inicial aleatorio
                for (let i = 0; i < 1; i++) {
                    let row = Math.floor(Math.random() * (PLAYER_ZONE.rowMax - PLAYER_ZONE.rowMin + 1)) + PLAYER_ZONE.rowMin;
                    let col = Math.floor(Math.random() * (PLAYER_ZONE.colMax - PLAYER_ZONE.colMin + 1)) + PLAYER_ZONE.colMin;
                    playerSpawners.push({ x: row, y: col });
                }
                // Investigador inicial
                let row = Math.floor(Math.random() * (PLAYER_ZONE.rowMax - PLAYER_ZONE.rowMin + 1)) + PLAYER_ZONE.rowMin;
                let col = Math.floor(Math.random() * (PLAYER_ZONE.colMax - PLAYER_ZONE.colMin + 1)) + PLAYER_ZONE.colMin;
                playerInvestigators.push({ x: row, y: col });

                // Enemigo: 2 spawners
                for (let i = 0; i < 2; i++) {
                    row = Math.floor(Math.random() * (ENEMY_ZONE.rowMax - ENEMY_ZONE.rowMin + 1)) + ENEMY_ZONE.rowMin;
                    col = Math.floor(Math.random() * (ENEMY_ZONE.colMax - ENEMY_ZONE.colMin + 1)) + ENEMY_ZONE.colMin;
                    enemySpawners.push({ x: row, y: col });
                }
            }

            inicializarEdificios();
            actualizarUI();
            dibujarMapa();
            agregarLog('🌟 Haz clic en tu territorio (verde) para colocar edificios. Los noobs van al centro.');

            // Iniciar bucle de movimiento
            requestAnimationFrame(actualizarMovimiento);

            // Intervalos
            setInterval(producir, PRODUCTION_INTERVAL);
            setInterval(enemigoConstruye, 30000);
        })();
    </script>
</body>
</html>
