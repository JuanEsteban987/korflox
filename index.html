<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RPG 2D · Estilo TABS (2008)</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }
        body {
            background: #1a1a2e;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            font-family: 'Courier New', Courier, monospace;
        }
        .game-container {
            background: #0b0b1f;
            border: 6px ridge #7a5c3a;
            border-radius: 12px;
            padding: 20px 20px 15px 20px;
            box-shadow: 0 0 0 3px #4a3a2a, 0 10px 20px rgba(0,0,0,0.8);
        }
        .canvas-wrapper {
            border: 4px inset #6b4f32;
            background: #2a2a1e;
            display: inline-block;
        }
        canvas {
            display: block;
            width: 640px;
            height: 480px;
            background: #2d2d1c;
            cursor: crosshair;
            image-rendering: crisp-edges; /* retro pixelado */
        }
        .panel {
            margin-top: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #1f2a1f;
            border: 3px groove #6a5a4a;
            padding: 8px 15px;
            border-radius: 30px;
            color: #b8ffb0;
            text-shadow: 2px 2px 0 #0a3a0a;
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 1px;
            box-shadow: inset 0 0 8px #00000066;
        }
        .stats {
            display: flex;
            gap: 30px;
        }
        .stat {
            background: #1a1f1a;
            padding: 4px 12px;
            border-radius: 40px;
            border: 2px solid #7a9f7a;
            color: #d0ffb0;
            font-size: 22px;
        }
        .message-box {
            background: #0f0f0f;
            border: 3px inset #7a7a5a;
            border-radius: 20px;
            padding: 6px 20px;
            min-width: 240px;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-size: 18px;
            color: #f5e6c4;
            background: #2f2f1f;
            box-shadow: 0 0 0 2px #4d3d2a;
        }
        .footer-note {
            color: #7e9b7e;
            text-align: center;
            margin-top: 8px;
            font-size: 15px;
            text-shadow: 1px 1px 0 #121212;
        }
        .footer-note span {
            background: #2d352d;
            padding: 3px 12px;
            border-radius: 30px;
            border: 1px solid #6c8c6c;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="canvas-wrapper">
            <canvas id="gameCanvas" width="640" height="480"></canvas>
        </div>

        <div class="panel">
            <div class="stats">
                <div class="stat">❤️ 100/100</div>
                <div class="stat">💙 50/50</div>
            </div>
            <div id="messageDisplay" class="message-box">✨ Bienvenido a 2008 ✨</div>
        </div>
        <div class="footer-note">
            <span>▲ ▼ ◀ ▶  o  WASD  •  Tiles RPG 2K8</span>
        </div>
    </div>

    <script>
        (function() {
            // ---------- CONSTANTES Y CONFIGURACIÓN ----------
            const canvas = document.getElementById('gameCanvas');
            const ctx = canvas.getContext('2d');
            const messageEl = document.getElementById('messageDisplay');

            // Tamaño del tile (píxeles)
            const TILE_SIZE = 32;
            const MAP_WIDTH = 20;   // 20 columnas = 640px
            const MAP_HEIGHT = 15;  // 15 filas = 480px

            // Tipos de tiles
            const TILE = {
                GRASS: 0,
                TREE: 1,
                WATER: 2,
                SIGN: 3
            };

            // Propiedades de tiles (colisionable)
            const SOLID_TILES = new Set([TILE.TREE, TILE.WATER]);

            // ---------- MAPA (mundo 2D) ----------
            // Inicializamos todo a GRASS
            let map = Array(MAP_HEIGHT).fill().map(() => Array(MAP_WIDTH).fill(TILE.GRASS));

            // Función para generar el mapa con estética clásica
            function buildMap() {
                // 1. Bordes de árboles (paredes naturales)
                for (let row = 0; row < MAP_HEIGHT; row++) {
                    for (let col = 0; col < MAP_WIDTH; col++) {
                        if (row === 0 || row === MAP_HEIGHT-1 || col === 0 || col === MAP_WIDTH-1) {
                            map[row][col] = TILE.TREE;
                        }
                    }
                }

                // 2. Algunos árboles aleatorios (pero no demasiados)
                const treesPos = [
                    [3,4], [4,3], [5,7], [7,5], [8,2], [12,10], [14,5], [16,12], [17,3], [10,13]
                ];
                treesPos.forEach(([row, col]) => {
                    if (row > 0 && row < MAP_HEIGHT-1 && col > 0 && col < MAP_WIDTH-1) {
                        map[row][col] = TILE.TREE;
                    }
                });

                // 3. Un pequeño lago (agua)
                for (let r = 6; r <= 9; r++) {
                    for (let c = 13; c <= 16; c++) {
                        if (r > 0 && r < MAP_HEIGHT-1 && c > 0 && c < MAP_WIDTH-1) {
                            map[r][c] = TILE.WATER;
                        }
                    }
                }
                // bordeamos el lago con algo de hierba para que no quede pegado al borde de árboles
                // pero ya lo dejamos así.

                // 4. Un cartel / signo (en el 5,5) — interactivo
                map[5][5] = TILE.SIGN;

                // 5. Pequeño detalle: una mina o cueva simulada con agua? no, dejamos así.
            }

            buildMap();

            // Posición inicial del jugador (en tiles)
            let player = { x: 10, y: 7 };  // céntrico

            // Control de tiempo para throttling de movimiento (estilo TABS / turno suave)
            let lastMoveTime = 0;
            const MOVE_COOLDOWN = 200; // milisegundos

            // Mensaje actual (se actualiza por interacción o pisa tile especial)
            let currentMessage = "Pisa el cartel (🪧) para leer";

            // ---------- FUNCIONES DE DIBUJO (estética 2008 pixelada) ----------
            function drawTile(row, col, type) {
                const x = col * TILE_SIZE;
                const y = row * TILE_SIZE;

                // Sombra ligera para dar relieve (muy 2008)
                ctx.shadowColor = '#00000040';
                ctx.shadowBlur = 2;
                ctx.shadowOffsetX = 1;
                ctx.shadowOffsetY = 1;

                switch (type) {
                    case TILE.GRASS:
                        // Césped base con variación de tono
                        ctx.fillStyle = ( (row+col) % 2 === 0 ) ? '#5a9e4e' : '#4b8c3a';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        // textura de puntitos (hierba)
                        ctx.fillStyle = '#6bb85a';
                        ctx.fillRect(x+4, y+4, 6, 6);
                        ctx.fillStyle = '#3f7a2f';
                        ctx.fillRect(x+20, y+18, 8, 8);
                        break;

                    case TILE.TREE:
                        // Suelo de tierra
                        ctx.fillStyle = '#7a5c3a';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        // Tronco
                        ctx.fillStyle = '#6b4a2c';
                        ctx.fillRect(x+12, y+8, 8, 20);
                        // Copa del árbol (verde oscuro)
                        ctx.fillStyle = '#2f6b2f';
                        ctx.beginPath();
                        ctx.arc(x+16, y+12, 12, 0, Math.PI*2);
                        ctx.fill();
                        ctx.fillStyle = '#1f4f1f';
                        ctx.beginPath();
                        ctx.arc(x+8, y+8, 7, 0, Math.PI*2);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x+24, y+10, 7, 0, Math.PI*2);
                        ctx.fill();
                        break;

                    case TILE.WATER:
                        // Agua con ondas
                        ctx.fillStyle = '#3a68a0';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        // Reflejos
                        ctx.fillStyle = '#7aa5d9';
                        ctx.beginPath();
                        ctx.moveTo(x+5, y+8);
                        ctx.lineTo(x+15, y+16);
                        ctx.lineTo(x+25, y+6);
                        ctx.fill();
                        ctx.fillStyle = '#1f3f6f';
                        ctx.beginPath();
                        ctx.moveTo(x+18, y+22);
                        ctx.lineTo(x+28, y+26);
                        ctx.lineTo(x+8, y+28);
                        ctx.fill();
                        break;

                    case TILE.SIGN:
                        // Suelo de hierba (como grass)
                        ctx.fillStyle = ( (row+col) % 2 === 0 ) ? '#5a9e4e' : '#4b8c3a';
                        ctx.fillRect(x, y, TILE_SIZE, TILE_SIZE);
                        // Poste del cartel
                        ctx.fillStyle = '#8b6b4b';
                        ctx.fillRect(x+14, y+10, 4, 20);
                        // Tablero
                        ctx.fillStyle = '#c49a6c';
                        ctx.fillRect(x+6, y+4, 20, 12);
                        ctx.fillStyle = '#3a281a';
                        ctx.font = 'bold 16px "Courier New", monospace';
                        ctx.shadowBlur = 0; // sin sombra en texto pequeño
                        ctx.shadowOffsetX = 0;
                        ctx.shadowOffsetY = 0;
                        ctx.fillStyle = '#3a2a1a';
                        ctx.fillText('🪧', x+10, y+17);
                        break;
                }
                // Reiniciar sombra
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }

            // Dibujar al jugador con estilo RPG básico
            function drawPlayer() {
                const px = player.x * TILE_SIZE;
                const py = player.y * TILE_SIZE;

                // Sombra del personaje
                ctx.shadowColor = '#00000070';
                ctx.shadowBlur = 6;
                ctx.shadowOffsetX = 2;
                ctx.shadowOffsetY = 2;

                // Túnica / cuerpo
                ctx.fillStyle = '#c04040';  // rojo clásico
                ctx.fillRect(px+6, py+8, 20, 22);
                // Cabeza
                ctx.fillStyle = '#f5dbb1';
                ctx.beginPath();
                ctx.ellipse(px+16, py+10, 8, 9, 0, 0, Math.PI*2);
                ctx.fill();
                // Gorro / pelo (puntiagudo)
                ctx.fillStyle = '#a52a2a';
                ctx.beginPath();
                ctx.moveTo(px+8, py+2);
                ctx.lineTo(px+24, py+2);
                ctx.lineTo(px+16, py-4);
                ctx.closePath();
                ctx.fill();
                // Ojos
                ctx.fillStyle = '#000';
                ctx.beginPath();
                ctx.arc(px+12, py+9, 2, 0, 2*Math.PI);
                ctx.arc(px+20, py+9, 2, 0, 2*Math.PI);
                ctx.fill();
                // Arma / bastón (simple)
                ctx.fillStyle = '#5d3a1a';
                ctx.fillRect(px+26, py+12, 4, 24);

                // Reiniciar sombra
                ctx.shadowBlur = 0;
                ctx.shadowOffsetX = 0;
                ctx.shadowOffsetY = 0;
            }

            // Dibujar todo (mapa + jugador)
            function render() {
                ctx.clearRect(0, 0, canvas.width, canvas.height);

                // Dibujar tiles del mapa
                for (let row = 0; row < MAP_HEIGHT; row++) {
                    for (let col = 0; col < MAP_WIDTH; col++) {
                        drawTile(row, col, map[row][col]);
                    }
                }

                // Dibujar personaje encima
                drawPlayer();

                // Pequeña cuadrícula estilo 2008 (opcional)
                ctx.strokeStyle = '#2d3a2d';
                ctx.lineWidth = 0.5;
                ctx.globalAlpha = 0.2;
                for (let i = 0; i <= MAP_WIDTH; i++) {
                    ctx.beginPath();
                    ctx.moveTo(i * TILE_SIZE, 0);
                    ctx.lineTo(i * TILE_SIZE, canvas.height);
                    ctx.stroke();
                }
                for (let i = 0; i <= MAP_HEIGHT; i++) {
                    ctx.beginPath();
                    ctx.moveTo(0, i * TILE_SIZE);
                    ctx.lineTo(canvas.width, i * TILE_SIZE);
                    ctx.stroke();
                }
                ctx.globalAlpha = 1.0;
            }

            // ---------- LÓGICA DE MOVIMIENTO E INTERACCIÓN ----------
            function tryMove(dx, dy) {
                const newX = player.x + dx;
                const newY = player.y + dy;

                // Verificar límites
                if (newX < 0 || newX >= MAP_WIDTH || newY < 0 || newY >= MAP_HEIGHT) {
                    currentMessage = "⬆️ Fin del mundo (necesitas un barco)";
                    messageEl.innerText = currentMessage;
                    return false;
                }

                const tile = map[newY][newX];

                // Colisión con tiles sólidos
                if (SOLID_TILES.has(tile)) {
                    if (tile === TILE.TREE) currentMessage = "🌲 Un árbol frondoso te bloquea";
                    else if (tile === TILE.WATER) currentMessage = "🌊 Agua profunda... mejor no nadar";
                    else currentMessage = "🚧 No puedes pasar";
                    messageEl.innerText = currentMessage;
                    return false;
                }

                // Movimiento válido
                player.x = newX;
                player.y = newY;

                // Interacción automática con el cartel (SIGN)
                if (tile === TILE.SIGN) {
                    currentMessage = "🪧 \"Bienvenido a RuneScape... digo, TABS 2008\"";
                } else {
                    // Mensaje aleatorio ambient
                    const ambientMsg = [
                        "Caminas por la hierba...", 
                        "♪ sonidos de grillo 8-bit ♪",
                        "TABs clásico - 2008",
                        "Un lugar tranquilo..."
                    ];
                    currentMessage = ambientMsg[Math.floor(Math.random() * ambientMsg.length)];
                }
                messageEl.innerText = currentMessage;
                return true;
            }

            // Throttle de movimiento (estilo retro, sin acelerón)
            function handleKeyPress(e) {
                const key = e.key;
                // Evitar scroll con flechas
                if (["ArrowUp", "ArrowDown", "ArrowLeft", "ArrowRight", "w", "W", "A", "a", "s", "S", "d", "D"].includes(key)) {
                    e.preventDefault();
                }

                const now = Date.now();
                if (now - lastMoveTime < MOVE_COOLDOWN) return;

                let dx = 0, dy = 0;
                switch (key) {
                    case 'ArrowUp':
                    case 'w':
                    case 'W':
                        dy = -1;
                        break;
                    case 'ArrowDown':
                    case 's':
                    case 'S':
                        dy = 1;
                        break;
                    case 'ArrowLeft':
                    case 'a':
                    case 'A':
                        dx = -1;
                        break;
                    case 'ArrowRight':
                    case 'd':
                    case 'D':
                        dx = 1;
                        break;
                    default: return;
                }

                if (dx !== 0 || dy !== 0) {
                    if (tryMove(dx, dy)) {
                        lastMoveTime = now;
                        render();
                    }
                }
            }

            // Reiniciar mensaje al hacer clic (extra)
            function showControlsTip() {
                currentMessage = "Flechas / WASD para moverte";
                messageEl.innerText = currentMessage;
                render();
            }

            // ---------- INICIALIZAR EVENTOS Y RENDER ----------
            window.addEventListener('keydown', handleKeyPress);

            // Para dispositivos táctiles / ratón (info extra)
            canvas.addEventListener('click', () => {
                currentMessage = "Usa el teclado (↑ ↓ ← →)  o  WASD";
                messageEl.innerText = currentMessage;
            });

            // Render inicial
            render();

            // Mensaje inicial ambient
            setTimeout(() => {
                currentMessage = "Pisa el cartel (🪧) para leer";
                messageEl.innerText = currentMessage;
            }, 500);

            // Enfoque del canvas para capturar teclas sin perder el foco (opcional)
            canvas.setAttribute('tabindex', '0');  // permite enfocar el canvas
            canvas.focus();
            canvas.addEventListener('click', () => canvas.focus());
            // Estilo de focus
            canvas.style.outline = 'none';
        })();
    </script>
</body>
</html>
