<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Empires · estrategia con ajedrez</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1e3c2c;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Segoe UI', Roboto, system-ui, sans-serif;
            margin: 0;
            padding: 16px;
        }
        .game-container {
            background: #2d5a3a;
            padding: 24px;
            border-radius: 36px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.6);
            border: 4px solid #b68b5c;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #3b2e1e;
            color: #f0e6d2;
            padding: 12px 24px;
            border-radius: 60px;
            margin-bottom: 20px;
            border: 2px solid #c9a87c;
            font-weight: bold;
            font-size: 1.2rem;
        }
        .resources {
            display: flex;
            gap: 32px;
        }
        .gold {
            color: #ffd966;
        }
        .turn-indicator {
            background: #5e4b3c;
            padding: 6px 18px;
            border-radius: 40px;
            text-transform: uppercase;
        }
        canvas {
            display: block;
            margin: 0 auto;
            border-radius: 24px;
            box-shadow: 0 0 0 4px #b68b5c, 0 15px 25px black;
            background: #ebd5b3;
            cursor: pointer;
        }
        .control-panel {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-top: 25px;
            background: #3b2e1e;
            padding: 20px;
            border-radius: 50px;
            border: 2px solid #c9a87c;
            justify-content: center;
        }
        .shop {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
        }
        .btn {
            background: #c9a87c;
            border: none;
            color: #2d2d2d;
            font-weight: bold;
            padding: 10px 22px;
            border-radius: 40px;
            font-size: 1rem;
            cursor: pointer;
            box-shadow: 0 5px 0 #7b623a;
            transition: 0.07s ease;
            border: 1px solid #f0dbb4;
            display: flex;
            align-items: center;
            gap: 6px;
        }
        .btn:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #7b623a;
        }
        .btn:disabled {
            opacity: 0.5;
            transform: none;
            box-shadow: 0 5px 0 #7b623a;
            cursor: not-allowed;
        }
        .info-text {
            color: #f0e6d2;
            background: #1e3c2c;
            padding: 10px 24px;
            border-radius: 36px;
            font-size: 0.95rem;
            border: 1px solid #b68b5c;
            min-width: 200px;
            text-align: center;
        }
        .enemy-turn {
            background: #a14a4a;
            color: white;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.7; }
        }
    </style>
</head>
<body>
<div class="game-container">
    <div class="header">
        <div class="resources">
            <span>💰 <span class="gold" id="goldDisplay">100</span> de oro</span>
            <span>🏰 <span id="baseHealth">10</span> ❤️</span>
        </div>
        <div class="turn-indicator" id="turnIndicator">📌 Tu turno</div>
    </div>

    <canvas id="chessCanvas" width="480" height="480"></canvas>

    <div class="control-panel">
        <div class="shop">
            <button class="btn" id="buyPawn" title="Peón · 5 de oro · mueve 1">♟️ Peón (5)</button>
            <button class="btn" id="buyKnight" title="Caballo · 10 de oro · salta en L">♞ Caballo (10)</button>
            <button class="btn" id="buyRook" title="Torre · 15 de oro · horizontal/vertical">♜ Torre (15)</button>
        </div>
        <button class="btn" id="endTurnBtn">⏭️ Finalizar turno</button>
        <div class="info-text" id="statusMessage">Coloca una unidad o mueve</div>
    </div>
</div>

<script>
(function() {
    // ---------- CONSTANTES Y CONFIGURACIÓN ----------
    const SIZE = 8;               // tablero 8x8
    const CELL_SIZE = 60;          // 480/8
    const GOLD_PER_TURN = 10;      // ingreso base por turno
    const BASE_MAX_HEALTH = 20;     // salud máxima de la base

    // Colores / identidad
    const PLAYER = 'player';
    const ENEMY = 'enemy';

    // Tipos de unidad
    const UNIT_TYPES = {
        PAWN: { name: 'peón', cost: 5, attack: 2, defense: 1, moveRange: 1, symbol: '♟️', playerChar: '♙', enemyChar: '♟️' },
        KNIGHT: { name: 'caballo', cost: 10, attack: 4, defense: 2, moveRange: 2, movePattern: 'L', symbol: '♞', playerChar: '♘', enemyChar: '♞' },
        ROOK: { name: 'torre', cost: 15, attack: 5, defense: 4, moveRange: 7, movePattern: 'line', symbol: '♜', playerChar: '♖', enemyChar: '♜' }
    };

    // ---------- ESTADO DEL JUEGO ----------
    let board = [];                 // 8x8, cada celda: { type: 'base' | 'unit', owner, unitType? , health? }
    let player = {
        gold: 100,
        basePos: { row: 7, col: 3 }, // abajo izquierda (fila 7, col 3)
        baseHealth: BASE_MAX_HEALTH
    };
    let enemy = {
        gold: 100,
        basePos: { row: 0, col: 4 }, // arriba derecha (fila 0, col 4)
        baseHealth: BASE_MAX_HEALTH
    };

    // Turno: true = jugador, false = IA (pero manejado con botón)
    let playerTurn = true;

    // Selección de unidad para mover (solo en turno jugador)
    let selectedUnit = null; // { row, col }

    // Referencias DOM
    const canvas = document.getElementById('chessCanvas');
    const ctx = canvas.getContext('2d');
    const goldSpan = document.getElementById('goldDisplay');
    const baseHealthSpan = document.getElementById('baseHealth');
    const turnIndicator = document.getElementById('turnIndicator');
    const statusMsg = document.getElementById('statusMessage');

    // Botones
    const buyPawnBtn = document.getElementById('buyPawn');
    const buyKnightBtn = document.getElementById('buyKnight');
    const buyRookBtn = document.getElementById('buyRook');
    const endTurnBtn = document.getElementById('endTurnBtn');

    // Inicializar tablero vacío
    function initBoard() {
        board = Array(SIZE).fill().map(() => Array(SIZE).fill(null));
        // Colocar bases
        board[player.basePos.row][player.basePos.col] = { type: 'base', owner: PLAYER, health: player.baseHealth };
        board[enemy.basePos.row][enemy.basePos.col] = { type: 'base', owner: ENEMY, health: enemy.baseHealth };
    }
    initBoard();

    // ---------- FUNCIONES DE DIBUJO ----------
    function drawBoard() {
        ctx.clearRect(0, 0, 480, 480);
        // Dibujar celdas
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                let x = c * CELL_SIZE;
                let y = r * CELL_SIZE;
                // color ajedrez
                ctx.fillStyle = (r + c) % 2 === 0 ? '#f0d9b5' : '#b58863';
                ctx.fillRect(x, y, CELL_SIZE, CELL_SIZE);
                // contorno sutil
                ctx.strokeStyle = '#a17a5a';
                ctx.lineWidth = 1;
                ctx.strokeRect(x, y, CELL_SIZE, CELL_SIZE);
            }
        }

        // Dibujar contenido
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                let cell = board[r][c];
                if (!cell) continue;
                let x = c * CELL_SIZE + CELL_SIZE/2;
                let y = r * CELL_SIZE + CELL_SIZE/2;
                ctx.font = 'bold 32px "Segoe UI", "Arial Unicode MS", Arial, sans-serif';
                ctx.textAlign = 'center';
                ctx.textBaseline = 'middle';

                if (cell.type === 'base') {
                    // Dibujar castillo
                    ctx.font = 'bold 36px sans-serif';
                    ctx.fillStyle = cell.owner === PLAYER ? '#2e74b5' : '#b53b3b';
                    ctx.fillText('🏰', x, y-4);
                    // salud de la base
                    ctx.font = 'bold 16px monospace';
                    ctx.fillStyle = 'white';
                    ctx.shadowColor = 'black';
                    ctx.shadowBlur = 4;
                    ctx.fillText(cell.health, x, y+20);
                    ctx.shadowBlur = 0;
                } else if (cell.type === 'unit') {
                    // Unidad
                    let unit = cell.unitType;
                    let symbol = cell.owner === PLAYER ? unit.playerChar : unit.enemyChar;
                    ctx.fillStyle = cell.owner === PLAYER ? '#1e4f8a' : '#aa3a3a';
                    ctx.fillText(symbol, x, y-2);
                    // pequeña indicación de salud (opcional)
                    ctx.font = '14px monospace';
                    ctx.fillStyle = '#ffffdd';
                    ctx.shadowColor = '#000';
                    ctx.shadowBlur = 3;
                    ctx.fillText('❤️'+cell.health, x, y+20);
                    ctx.shadowBlur = 0;
                }
            }
        }

        // Resaltar celda seleccionada si la hay
        if (selectedUnit) {
            let { row, col } = selectedUnit;
            ctx.strokeStyle = '#f5d742';
            ctx.lineWidth = 5;
            ctx.beginPath();
            ctx.rect(col * CELL_SIZE, row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
            ctx.stroke();

            // Dibujar posibles movimientos (estilo simple)
            let unit = board[row][col];
            if (unit && unit.type === 'unit') {
                let moves = getValidMovesForUnit(row, col, unit.unitType, unit.owner);
                ctx.fillStyle = '#ffe68f66';
                moves.forEach(m => {
                    ctx.fillRect(m.col * CELL_SIZE, m.row * CELL_SIZE, CELL_SIZE, CELL_SIZE);
                });
            }
        }
    }

    // ---------- LÓGICA DE MOVIMIENTO (estilo ajedrez simplificado) ----------
    function getValidMovesForUnit(row, col, unitType, owner) {
        let moves = [];
        let pattern = unitType.movePattern;
        let range = unitType.moveRange;

        if (pattern === 'L') { // caballo
            const offsets = [
                [-2, -1], [-2, 1], [2, -1], [2, 1],
                [-1, -2], [-1, 2], [1, -2], [1, 2]
            ];
            offsets.forEach(([dr, dc]) => {
                let nr = row + dr, nc = col + dc;
                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                    let target = board[nr][nc];
                    if (!target || (target.type === 'unit' && target.owner !== owner) || (target.type === 'base' && target.owner !== owner)) {
                        moves.push({ row: nr, col: nc });
                    }
                }
            });
        } else if (pattern === 'line') { // torre (horizontal/vertical)
            const dirs = [[-1,0],[1,0],[0,-1],[0,1]];
            dirs.forEach(([dr, dc]) => {
                for (let step = 1; step <= range; step++) {
                    let nr = row + dr*step, nc = col + dc*step;
                    if (nr < 0 || nr >= SIZE || nc < 0 || nc >= SIZE) break;
                    let target = board[nr][nc];
                    if (!target) {
                        moves.push({ row: nr, col: nc });
                    } else {
                        if (target.owner !== owner) moves.push({ row: nr, col: nc }); // atacar
                        break; // choca con pieza
                    }
                }
            });
        } else { // peón: mueve 1 en cualquier dirección (para simplificar, no distingue colores, pero puede atacar)
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    let nr = row + dr, nc = col + dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE) {
                        let target = board[nr][nc];
                        if (!target || (target.owner !== owner)) {
                            moves.push({ row: nr, col: nc });
                        }
                    }
                }
            }
        }
        return moves;
    }

    // ---------- COMBATE ----------
    function resolveAttack(attackerCell, defenderCell) {
        // Atacante: la unidad que se mueve a la celda
        // Defensor: el que ya está (o base)
        let attackPower = attackerCell.unitType.attack;
        let defensePower = defenderCell.type === 'base' ? 5 : defenderCell.unitType.defense; // las bases tienen defensa 5
        let damage = Math.max(1, attackPower - Math.floor(defensePower/2)); // daño base
        if (defenderCell.type === 'base') {
            defenderCell.health -= damage;
            if (defenderCell.owner === PLAYER) player.baseHealth = defenderCell.health;
            else enemy.baseHealth = defenderCell.health;
        } else {
            defenderCell.health -= damage;
        }

        // Si defensor muere
        if (defenderCell.health <= 0) {
            return { dead: true, cell: defenderCell };
        }
        return { dead: false, cell: defenderCell };
    }

    // ---------- MOVER UNIDAD (jugador) ----------
    function tryMoveUnit(fromRow, fromCol, toRow, toCol) {
        let unit = board[fromRow][fromCol];
        if (!unit || unit.type !== 'unit' || unit.owner !== PLAYER) return false;

        let validMoves = getValidMovesForUnit(fromRow, fromCol, unit.unitType, PLAYER);
        let isValid = validMoves.some(m => m.row === toRow && m.col === toCol);
        if (!isValid) return false;

        let target = board[toRow][toCol];

        // Si hay algo, combatir
        if (target) {
            let attackRes = resolveAttack(unit, target);
            if (attackRes.dead) {
                board[toRow][toCol] = null; // eliminar defensor
                // mover atacante a la celda
                board[toRow][toCol] = { ...unit };
                board[fromRow][fromCol] = null;
            } else {
                // defensor herido pero vivo, el atacante no se mueve (regla simple)
                statusMsg.innerText = 'Unidad enemiga herida';
                // actualizar salud en el objeto target ya modificado
            }
        } else {
            // mover a casilla vacía
            board[toRow][toCol] = { ...unit };
            board[fromRow][fromCol] = null;
        }

        // Limpiar selección
        selectedUnit = null;
        return true;
    }

    // ---------- COMPRAR UNIDAD (jugador) ----------
    function tryBuyUnit(unitTypeKey) {
        if (!playerTurn) {
            statusMsg.innerText = 'No es tu turno';
            return false;
        }
        let unit = UNIT_TYPES[unitTypeKey];
        if (player.gold < unit.cost) {
            statusMsg.innerText = '¡No tienes suficiente oro!';
            return false;
        }

        // Buscar casillas vacías adyacentes a la base (incluyendo la misma base si está vacía? no, base ocupada)
        let baseR = player.basePos.row, baseC = player.basePos.col;
        let adyacentes = [];
        for (let dr = -1; dr <= 1; dr++) {
            for (let dc = -1; dc <= 1; dc++) {
                if (dr === 0 && dc === 0) continue;
                let nr = baseR + dr, nc = baseC + dc;
                if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === null) {
                    adyacentes.push({ row: nr, col: nc });
                }
            }
        }
        if (adyacentes.length === 0) {
            statusMsg.innerText = 'No hay espacio cerca de la base';
            return false;
        }

        // Colocar en la primera disponible (o elegir por interfaz, simplificamos primera)
        let spawn = adyacentes[0];
        board[spawn.row][spawn.col] = {
            type: 'unit',
            owner: PLAYER,
            unitType: unit,
            health: 5 + unit.defense * 2   // salud base + defensa
        };
        player.gold -= unit.cost;
        statusMsg.innerText = `${unit.name} comprado.`;
        return true;
    }

    // ---------- TURNO DE LA IA ----------
    function enemyTurn() {
        // 1. Ganar oro
        enemy.gold += GOLD_PER_TURN;

        // 2. Intentar comprar unidad (si tiene espacio)
        let unitToBuy = null;
        let types = ['PAWN', 'KNIGHT', 'ROOK']; // orden de preferencia
        for (let t of types) {
            if (enemy.gold >= UNIT_TYPES[t].cost) {
                unitToBuy = UNIT_TYPES[t];
                break;
            }
        }
        if (unitToBuy) {
            // buscar adyacentes a base enemiga
            let baseR = enemy.basePos.row, baseC = enemy.basePos.col;
            let ady = [];
            for (let dr = -1; dr <= 1; dr++) {
                for (let dc = -1; dc <= 1; dc++) {
                    if (dr === 0 && dc === 0) continue;
                    let nr = baseR + dr, nc = baseC + dc;
                    if (nr >= 0 && nr < SIZE && nc >= 0 && nc < SIZE && board[nr][nc] === null) {
                        ady.push({ row: nr, col: nc });
                    }
                }
            }
            if (ady.length > 0) {
                let spawn = ady[Math.floor(Math.random() * ady.length)];
                board[spawn.row][spawn.col] = {
                    type: 'unit',
                    owner: ENEMY,
                    unitType: unitToBuy,
                    health: 5 + unitToBuy.defense * 2
                };
                enemy.gold -= unitToBuy.cost;
            }
        }

        // 3. Mover unidades enemigas aleatoriamente (ataque simple)
        // Recopilar todas las unidades enemigas
        let enemyUnits = [];
        for (let r = 0; r < SIZE; r++) {
            for (let c = 0; c < SIZE; c++) {
                let cell = board[r][c];
                if (cell && cell.type === 'unit' && cell.owner === ENEMY) {
                    enemyUnits.push({ row: r, col: c, unit: cell });
                }
            }
        }

        // Cada unidad intenta un movimiento aleatorio válido
        enemyUnits.forEach(u => {
            let moves = getValidMovesForUnit(u.row, u.col, u.unit.unitType, ENEMY);
            if (moves.length === 0) return;
            let move = moves[Math.floor(Math.random() * moves.length)];
            // ejecutar movimiento / ataque
            let target = board[move.row][move.col];
            if (target) {
                let attackRes = resolveAttack(u.unit, target);
                if (attackRes.dead) {
                    board[move.row][move.col] = null;
                    board[move.row][move.col] = { ...u.unit };
                    board[u.row][u.col] = null;
                } else {
                    // solo daño, no mover
                }
            } else {
                board[move.row][move.col] = { ...u.unit };
                board[u.row][u.col] = null;
            }
        });

        // 4. La IA podría atacar base si tiene unidad adyacente (ya se maneja en movimiento)
    }

    // ---------- FINALIZAR TURNO ----------
    function endTurn() {
        if (!playerTurn) return; // ya es turno de ia, pero bloqueamos

        // 1. Generar oro para jugador
        player.gold += GOLD_PER_TURN;

        // 2. Pasar a turno enemigo
        playerTurn = false;
        turnIndicator.innerText = '🤖 Turno enemigo';
        turnIndicator.classList.add('enemy-turn');
        statusMsg.innerText = 'Pensando...';
        drawBoard();
        updateUI();

        // 3. Ejecutar IA después de un breve retraso (para sensación de turno)
        setTimeout(() => {
            enemyTurn();

            // Verificar fin del juego
            if (enemy.baseHealth <= 0) {
                alert('🏆 ¡Has destruido la base enemiga! Victoria!');
                resetGame();
                return;
            }
            if (player.baseHealth <= 0) {
                alert('💀 Tu base ha sido destruida. Derrota...');
                resetGame();
                return;
            }

            // Volver turno jugador
            playerTurn = true;
            turnIndicator.innerText = '📌 Tu turno';
            turnIndicator.classList.remove('enemy-turn');
            selectedUnit = null;
            drawBoard();
            updateUI();
            statusMsg.innerText = 'Selecciona unidad o compra';
        }, 600);
    }

    // ---------- RESET GAME ----------
    function resetGame() {
        player = { gold: 100, basePos: { row: 7, col: 3 }, baseHealth: BASE_MAX_HEALTH };
        enemy = { gold: 100, basePos: { row: 0, col: 4 }, baseHealth: BASE_MAX_HEALTH };
        initBoard();
        playerTurn = true;
        selectedUnit = null;
        turnIndicator.innerText = '📌 Tu turno';
        turnIndicator.classList.remove('enemy-turn');
        drawBoard();
        updateUI();
        statusMsg.innerText = 'Nueva partida';
    }

    // ---------- ACTUALIZAR UI (oro, salud) ----------
    function updateUI() {
        goldSpan.innerText = player.gold;
        baseHealthSpan.innerText = player.baseHealth;
        // actualizar salud en board (por si acaso)
        if (board[player.basePos.row][player.basePos.col]) {
            board[player.basePos.row][player.basePos.col].health = player.baseHealth;
        }
        if (board[enemy.basePos.row][enemy.basePos.col]) {
            board[enemy.basePos.row][enemy.basePos.col].health = enemy.baseHealth;
        }
    }

    // ---------- MANEJADORES DE EVENTOS ----------
    canvas.addEventListener('click', (e) => {
        if (!playerTurn) {
            statusMsg.innerText = 'Espera al turno enemigo';
            return;
        }
        let rect = canvas.getBoundingClientRect();
        let scaleX = canvas.width / rect.width;
        let scaleY = canvas.height / rect.height;

        let mouseX = (e.clientX - rect.left) * scaleX;
        let mouseY = (e.clientY - rect.top) * scaleY;
        let col = Math.floor(mouseX / CELL_SIZE);
        let row = Math.floor(mouseY / CELL_SIZE);
        if (row < 0 || row >= SIZE || col < 0 || col >= SIZE) return;

        let cell = board[row][col];

        // Si hay unidad seleccionada, intentar mover
        if (selectedUnit) {
            let success = tryMoveUnit(selectedUnit.row, selectedUnit.col, row, col);
            if (success) {
                drawBoard();
                updateUI();
            } else {
                statusMsg.innerText = 'Movimiento no válido';
                // opcional: limpiar selección si se hace clic en otra unidad propia?
                if (cell && cell.type === 'unit' && cell.owner === PLAYER) {
                    selectedUnit = { row, col };
                    statusMsg.innerText = `Unidad seleccionada`;
                } else {
                    selectedUnit = null; // cancelar selección
                }
            }
            drawBoard();
            return;
        }

        // Si no hay selección y es unidad propia, seleccionar
        if (cell && cell.type === 'unit' && cell.owner === PLAYER) {
            selectedUnit = { row, col };
            statusMsg.innerText = `${cell.unitType.name} seleccionado`;
        } else {
            // quizás base? no hacemos nada
        }
        drawBoard();
    });

    // Botones de compra
    buyPawnBtn.addEventListener('click', () => { tryBuyUnit('PAWN'); drawBoard(); updateUI(); });
    buyKnightBtn.addEventListener('click', () => { tryBuyUnit('KNIGHT'); drawBoard(); updateUI(); });
    buyRookBtn.addEventListener('click', () => { tryBuyUnit('ROOK'); drawBoard(); updateUI(); });

    endTurnBtn.addEventListener('click', () => {
        if (!playerTurn) return;
        endTurn();
    });

    // Inicial
    drawBoard();
    updateUI();
})();
</script>
</body>
</html>
