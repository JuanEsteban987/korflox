<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔵 NOOB ARMY · Roblox 2008 🔵</title>
    <style>
        /* --- ESTÉTICA ROBLOX 2008 --- */
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
        }

        body {
            background: #1b3b4f;  /* azul oscuro clásico */
            font-family: 'Courier New', Courier, monospace;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .game-container {
            width: 720px;
            max-width: 100%;
            background: #6d9ac4;  /* fondo celeste Roblox */
            border: 6px ridge #ffffff;
            box-shadow: 12px 12px 0px #0a1f2b;
            padding: 24px 20px;
            position: relative;
        }

        /* cabecera con texto 3D estilo 2008 */
        .header {
            background: #4b6e8c;
            border: 4px outset #e0e0e0;
            padding: 14px 8px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 4px 4px 0px #1f4f6e, 6px 6px 0px #0b2b3f;
            letter-spacing: 2px;
            word-break: break-word;
        }

        /* cajas de estadísticas */
        .stats-panel {
            background: #b8d8f0;
            border: 4px inset #f0f8ff;
            padding: 20px 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 16px 10px;
            box-shadow: inset 2px 2px 0px #3b5e7a;
        }

        .stat-item {
            background: #e6f0fa;
            border: 3px ridge #ffffff;
            padding: 12px 18px;
            font-size: 20px;
            font-weight: bold;
            color: #0f2f44;
            display: flex;
            align-items: center;
            gap: 8px;
            box-shadow: 3px 3px 0px #3b6e8c;
        }

        .stat-item span {
            background: #1b2f44;
            color: #ffffc0;
            padding: 4px 12px;
            border: 2px inset #c0c0c0;
            font-family: 'Courier New', monospace;
            font-size: 26px;
            margin-left: 8px;
        }

        /* enemigo */
        .enemy-panel {
            background: #4f7b9c;
            border: 4px inset #b0d0f0;
            padding: 16px;
            margin-bottom: 20px;
        }

        .enemy-title {
            font-size: 26px;
            color: #fff9c4;
            text-shadow: 2px 2px 0px #a13d2f;
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 12px;
        }

        .enemy-bar {
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .enemy-bar label {
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: #2d4f6e;
            padding: 4px 12px;
            border: 2px ridge #afc9e0;
        }

        progress {
            flex: 1;
            height: 36px;
            border: 4px solid #1f3f5c;
            background: #3a3a3a;
        }

        /* estilos para la barra de progreso (cross-browser retro) */
        progress::-webkit-progress-bar {
            background-color: #4f4f4f;
            box-shadow: inset 2px 2px 0px #1f1f1f;
        }
        progress::-webkit-progress-value {
            background-color: #e04e4e;
            background-image: linear-gradient(145deg, #ff7b7b 0%, #b32e2e 100%);
        }
        progress::-moz-progress-bar {
            background-color: #e04e4e;
            background-image: linear-gradient(145deg, #ff7b7b 0%, #b32e2e 100%);
        }

        /* botones enormes, estilo Roblox antiguo */
        .action-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            justify-content: center;
            margin: 24px 0 20px;
        }

        .roblox-btn {
            background: #c0c0c0;
            border: 6px outset #f8f8f8;
            font-family: 'Courier New', monospace;
            font-size: 26px;
            font-weight: bold;
            padding: 16px 28px;
            cursor: pointer;
            color: #1f2f3f;
            text-transform: uppercase;
            box-shadow: 5px 5px 0px #2f4f6f;
            transition: 0.05s linear;
            flex: 1 1 auto;
            min-width: 200px;
            letter-spacing: 2px;
        }

        .roblox-btn:active {
            border: 6px inset #f8f8f8;
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #2f4f6f;
        }

        .roblox-btn:disabled {
            opacity: 0.4;
            filter: grayscale(60%);
            transform: none;
            border: 6px outset #a0a0a0;
            box-shadow: 2px 2px 0px #1f3f4f;
            cursor: not-allowed;
        }

        /* caja de eventos / log */
        .log-box {
            background: #0f1f2b;
            border: 6px inset #3f6f8f;
            padding: 16px;
            color: #9bff9b;
            font-size: 20px;
            font-family: 'Courier New', monospace;
            min-height: 90px;
            max-height: 140px;
            overflow-y: auto;
            box-shadow: inset 0 0 0 2px #1f4f6e;
            margin-top: 10px;
        }

        .log-box p {
            margin: 4px 0;
            line-height: 1.4;
            border-left: 4px solid #5faf5f;
            padding-left: 10px;
        }

        .footer-note {
            text-align: center;
            margin-top: 16px;
            font-size: 16px;
            color: #e0f0ff;
            text-shadow: 2px 2px 0px #0f2a3f;
            background: #2b4f6b;
            padding: 4px;
            border: 2px ridge #9fbfdf;
        }

        /* iconos e imagenes rudimentarias estilo 2008 */
        .noob-icon {
            display: inline-block;
            width: 28px;
            height: 28px;
            background: #ffe68f;
            border: 3px solid #b87c3a;
            border-radius: 30% 30% 40% 40%;
            position: relative;
            margin-right: 8px;
            box-shadow: 2px 2px 0 #6b4f2a;
        }
        .noob-icon::before {
            content: "☺";
            position: absolute;
            top: -2px;
            left: 4px;
            font-size: 24px;
            color: #000;
        }

        .tix-icon {
            font-size: 28px;
            filter: drop-shadow(2px 2px 0 #ad7f2e);
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            <span class="noob-icon" style="vertical-align: middle;"></span> 
            NOOB ARMY 2008 
            <span class="noob-icon" style="vertical-align: middle;"></span>
        </div>

        <!-- Estadísticas principales -->
        <div class="stats-panel">
            <div class="stat-item">
                <span class="noob-icon" style="width: 34px; height: 34px;"></span> NOOBS
                <span id="noobCount">0</span>
            </div>
            <div class="stat-item">
                <span class="tix-icon">💰</span> TIX
                <span id="tixCount">100</span>
            </div>
            <div class="stat-item">
                ⚔️ PODER <span id="attackPower">1</span>
            </div>
        </div>

        <!-- Panel del enemigo -->
        <div class="enemy-panel">
            <div class="enemy-title">
                <span>👾 ENEMY NOOBS</span> 
                <span id="enemyNoobsDisplay" style="background: #330f0f; color: #ffbebe; padding: 6px 20px; border: 3px inset #8b3a3a;">100</span>
            </div>
            <div class="enemy-bar">
                <label>HP</label>
                <progress id="enemyHealthBar" value="100" max="100"></progress>
            </div>
        </div>

        <!-- Botones de acción -->
        <div class="action-buttons">
            <button class="roblox-btn" id="recruitBtn">🔹 RECLUTAR (10💰)</button>
            <button class="roblox-btn" id="trainBtn">🔸 ENTRENAR (20💰)</button>
            <button class="roblox-btn" id="attackBtn">💥 ATACAR</button>
        </div>

        <!-- Registro de eventos (log) -->
        <div class="log-box" id="logMessages">
            <p>⚡ Bienvenido, general. Recluta noobs y aplasta a la horda enemiga.</p>
        </div>

        <!-- pie de época -->
        <div class="footer-note">
            🔵 ROBLOX 2008 · BLOCKY STYLE · ☁️ NOOB ARMY ☁️
        </div>
    </div>

    <script>
        (function() {
            // --- variables del juego ---
            let noobs = 0;
            let tix = 100;
            let attackPowerPerNoob = 1;      // daño base por cada noob
            let enemyNoobs = 100;
            const ENEMY_MAX = 100;
            const RECRUIT_COST = 10;
            const TRAIN_COST = 20;
            const REWARD = 50;

            // --- elementos del DOM ---
            const noobSpan = document.getElementById('noobCount');
            const tixSpan = document.getElementById('tixCount');
            const powerSpan = document.getElementById('attackPower');
            const enemyNoobsSpan = document.getElementById('enemyNoobsDisplay');
            const enemyBar = document.getElementById('enemyHealthBar');
            const logDiv = document.getElementById('logMessages');

            const recruitBtn = document.getElementById('recruitBtn');
            const trainBtn = document.getElementById('trainBtn');
            const attackBtn = document.getElementById('attackBtn');

            // --- funciones auxiliares ---
            function actualizarUI() {
                noobSpan.textContent = noobs;
                tixSpan.textContent = tix;
                powerSpan.textContent = attackPowerPerNoob;
                enemyNoobsSpan.textContent = enemyNoobs;
                enemyBar.value = enemyNoobs;

                // habilitar/deshabilitar botones según recursos
                recruitBtn.disabled = (tix < RECRUIT_COST);
                trainBtn.disabled = (tix < TRAIN_COST);
                // atacar siempre está habilitado, pero puede no hacer nada
            }

            // función para añadir mensaje al log (máximo 6 líneas)
            function agregarLog(mensaje) {
                const p = document.createElement('p');
                p.textContent = mensaje;
                logDiv.appendChild(p);
                // mantener últimas líneas (borrar si hay más de 6)
                while (logDiv.children.length > 6) {
                    logDiv.removeChild(logDiv.firstChild);
                }
                logDiv.scrollTop = logDiv.scrollHeight; // auto-scroll
            }

            // comprobar si el enemigo ha sido derrotado y entregar premio
            function checkEnemyDefeated() {
                if (enemyNoobs <= 0) {
                    // premio
                    tix += REWARD;
                    enemyNoobs = ENEMY_MAX;  // reaparecen
                    agregarLog(`🏆 VICTORIA! Enemigo aniquilado. +${REWARD} TIX. Nueva oleada.`);
                    actualizarUI();
                }
            }

            // --- eventos ---

            // reclutar noob
            recruitBtn.addEventListener('click', () => {
                if (tix >= RECRUIT_COST) {
                    tix -= RECRUIT_COST;
                    noobs++;
                    agregarLog(`✅ Reclutaste 1 noob. (Total: ${noobs})`);
                    actualizarUI();
                } else {
                    agregarLog(`❌ No tienes suficientes TIX (necesitas ${RECRUIT_COST})`);
                }
            });

            // entrenar (aumenta poder de ataque por noob)
            trainBtn.addEventListener('click', () => {
                if (tix >= TRAIN_COST) {
                    tix -= TRAIN_COST;
                    attackPowerPerNoob++;
                    agregarLog(`⚡ Entrenamiento completado. Poder por noob: ${attackPowerPerNoob}`);
                    actualizarUI();
                } else {
                    agregarLog(`❌ Necesitas ${TRAIN_COST} TIX para entrenar.`);
                }
            });

            // atacar
            attackBtn.addEventListener('click', () => {
                if (noobs === 0) {
                    agregarLog(`😿 No tienes noobs en tu ejército. Recluta primero.`);
                    return;
                }

                // calcular daño total
                let totalDamage = noobs * attackPowerPerNoob;
                let oldEnemy = enemyNoobs;
                enemyNoobs -= totalDamage;

                // evitar número negativo para el display
                if (enemyNoobs < 0) {
                    enemyNoobs = 0;
                }

                let damageDealt = oldEnemy - enemyNoobs; // daño real (sin excedente)
                agregarLog(`⚔️ ATACASTE con ${noobs} noobs (daño ${damageDealt}).`);

                actualizarUI();

                // si el enemigo quedó en 0 o menos, dar recompensa
                if (enemyNoobs === 0) {
                    checkEnemyDefeated();
                } else {
                    // mensaje de contraataque (solo para ambientar)
                    if (damageDealt > 0) {
                        agregarLog(`😤 Enemigo debilitado, le quedan ${enemyNoobs} noobs.`);
                    } else {
                        agregarLog(`🛡️ El enemigo se ríe. Tu ataque fue inútil.`);
                    }
                }

                // recalc botones por si cambió tix (victoria)
                actualizarUI();
            });

            // --- inicializar valores por primera vez ---
            actualizarUI();

            // pequeño extra: mensaje inicial de bienvenida
            agregarLog(`🕹️ Año 2008. Tienes ${tix} TIX. Crea tu Noob Army.`);
        })();
    </script>
</body>
</html>
