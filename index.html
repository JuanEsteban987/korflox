<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🔵 BASE WARS · ROBLOX 2008 🔵</title>
    <style>
        /* --- ESTÉTICA ROBLOX 2008 (blocky, brillante, biseles) --- */
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background: #1b3b4f;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .game-container {
            max-width: 1100px;
            width: 100%;
            background: #6d9ac4;
            border: 6px ridge #ffffff;
            box-shadow: 12px 12px 0px #0a1f2b;
            padding: 24px 20px;
        }

        .header {
            background: #4b6e8c;
            border: 4px outset #e0e0e0;
            padding: 14px 8px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 4px 4px 0px #1f4f6e, 6px 6px 0px #0b2b3f;
            letter-spacing: 2px;
        }

        .stats-panel {
            background: #b8d8f0;
            border: 4px inset #f0f8ff;
            padding: 20px 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 16px;
            box-shadow: inset 2px 2px 0px #3b5e7a;
        }

        .stat-item {
            background: #e6f0fa;
            border: 3px ridge #ffffff;
            padding: 12px 18px;
            font-size: 22px;
            font-weight: bold;
            color: #0f2f44;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 3px 3px 0px #3b6e8c;
        }

        .stat-item span {
            background: #1b2f44;
            color: #ffffc0;
            padding: 4px 16px;
            border: 2px inset #c0c0c0;
            font-size: 30px;
            margin-left: 8px;
        }

        /* --- BASES (jugador a la izquierda, enemigo derecha) --- */
        .bases-row {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }

        .base {
            flex: 1 1 280px;
            background: #2f5f7a;
            border: 6px ridge #c0e0ff;
            padding: 16px;
            box-shadow: 8px 8px 0px #0e2a38;
            display: flex;
            flex-direction: column;
        }

        .base-izq {
            background: #2f6f4a; /* tono verdoso para diferenciar */
        }
        .base-der {
            background: #7a4f2f; /* tono rojizo enemigo */
        }

        .base-titulo {
            font-size: 28px;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0 #1f3f5f;
            background: #1d4155;
            padding: 8px;
            border: 3px inset #a0c0e0;
            text-align: center;
            margin-bottom: 16px;
        }

        .spawner-info {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: #194154;
            padding: 12px;
            border: 4px ridge #8bb0d0;
            margin-bottom: 16px;
            color: white;
            font-size: 24px;
        }

        .spawner-icon {
            font-size: 36px;
            filter: drop-shadow(4px 4px 0 #00000050);
        }

        .troops-area {
            background: #102b36;
            border: 6px inset #3f6f8f;
            min-height: 140px;
            padding: 12px;
            display: flex;
            flex-wrap: wrap;
            align-items: center;
            gap: 8px;
            margin-bottom: 16px;
            box-shadow: inset 0 0 0 3px #1d4f6e;
        }

        /* cada soldadito */
        .troop {
            background: #ffe68f;
            border: 3px solid #b87c3a;
            border-radius: 30% 30% 40% 40%;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            font-weight: bold;
            color: #000;
            box-shadow: 3px 3px 0 #6b4f2a;
        }
        .troop.enemy {
            background: #ffa07a;
            border-color: #a13d2f;
            box-shadow: 3px 3px 0 #6b2f1f;
        }

        .extra-troops {
            font-size: 24px;
            background: #00000060;
            color: white;
            padding: 8px 16px;
            border-radius: 30px;
            border: 3px ridge white;
        }

        /* botones de compra dentro de la base */
        .base-actions {
            display: flex;
            gap: 12px;
            margin-top: 8px;
            flex-wrap: wrap;
        }

        .roblox-btn {
            background: #c0c0c0;
            border: 6px outset #f8f8f8;
            font-size: 22px;
            font-weight: bold;
            padding: 14px 18px;
            cursor: pointer;
            color: #1f2f3f;
            text-transform: uppercase;
            box-shadow: 5px 5px 0px #2f4f6f;
            transition: 0.05s linear;
            flex: 1 1 auto;
            letter-spacing: 2px;
        }

        .roblox-btn:active {
            border: 6px inset #f8f8f8;
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #2f4f6f;
        }

        .roblox-btn:disabled {
            opacity: 0.4;
            filter: grayscale(60%);
            transform: none;
            border: 6px outset #a0a0a0;
            box-shadow: 2px 2px 0px #1f3f4f;
            cursor: not-allowed;
        }

        /* botón de batalla central */
        .attack-area {
            display: flex;
            justify-content: center;
            margin: 30px 0 20px;
        }

        .attack-btn {
            background: #c02f2f;
            border: 8px outset #ffc0c0;
            font-size: 44px;
            padding: 24px 60px;
            color: white;
            text-shadow: 4px 4px 0 #5f1f1f;
            box-shadow: 12px 12px 0 #2f1f1f;
        }

        .log-box {
            background: #0f1f2b;
            border: 6px inset #3f6f8f;
            padding: 16px;
            color: #9bff9b;
            font-size: 20px;
            min-height: 100px;
            max-height: 140px;
            overflow-y: auto;
            box-shadow: inset 0 0 0 2px #1f4f6e;
            margin: 20px 0 10px;
        }

        .log-box p {
            margin: 4px 0;
            border-left: 4px solid #5faf5f;
            padding-left: 10px;
        }

        .footer-note {
            text-align: center;
            font-size: 18px;
            color: #e0f0ff;
            text-shadow: 2px 2px 0 #0f2a3f;
            background: #2b4f6b;
            padding: 6px;
            border: 2px ridge #9fbfdf;
        }

        /* animación de batalla */
        .base.flash {
            animation: battleFlash 0.2s infinite;
        }
        @keyframes battleFlash {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.8) drop-shadow(0 0 10px yellow); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            ⚔️ NOOB BASE WARS · 2008 ⚔️
        </div>

        <!-- Panel de recursos -->
        <div class="stats-panel">
            <div class="stat-item">💰 TIX <span id="tixDisplay">200</span></div>
            <div class="stat-item">🏭 SPAWNERS <span id="spawnerDisplay">1</span></div>
            <div class="stat-item">🤜 TUS NOOBS <span id="playerNoobsDisplay">3</span></div>
        </div>

        <!-- BASES (IZQUIERDA JUGADOR, DERECHA ENEMIGO) -->
        <div class="bases-row">
            <!-- Base Jugador -->
            <div class="base base-izq" id="playerBase">
                <div class="base-titulo">🔵 TU BASE</div>
                <div class="spawner-info">
                    <span class="spawner-icon">🏭</span>
                    <span id="playerSpawnerCount">1</span> spawners
                    <span style="font-size: 18px;">(c/3s)</span>
                </div>
                <div class="troops-area" id="playerTroopsContainer">
                    <!-- Aquí se insertarán los noobs dinámicamente -->
                </div>
                <div class="base-actions">
                    <button class="roblox-btn" id="buySpawnerBtn">COMPRAR SPAWNER (50💰)</button>
                </div>
            </div>

            <!-- Base Enemiga -->
            <div class="base base-der" id="enemyBase">
                <div class="base-titulo">🔴 BASE ENEMIGA</div>
                <div class="spawner-info">
                    <span class="spawner-icon">🏭</span>
                    <span id="enemySpawnerCount">1</span> spawners
                </div>
                <div class="troops-area" id="enemyTroopsContainer">
                    <!-- Noobs enemigos -->
                </div>
                <!-- El enemigo no tiene botones, pero se muestra su poder -->
                <div style="color:white; text-align:center; padding:8px;">🐾 HOSTIL</div>
            </div>
        </div>

        <!-- Botón de batalla central -->
        <div class="attack-area">
            <button class="roblox-btn attack-btn" id="attackBtn">💥 ¡BATALLA! 💥</button>
        </div>

        <!-- Log de eventos -->
        <div class="log-box" id="logMessages">
            <p>⚡ 2008: Construye tu base, compra spawners y aplasta al enemigo.</p>
        </div>

        <div class="footer-note">
            🧱 ROBLOX 2008 · SPAWNER WARS · NOOB ARMY 🧱
        </div>
    </div>

    <script>
        (function() {
            // --- Estado del juego ---
            let playerTix = 200;
            let playerSpawners = 1;
            let playerNoobs = 3;          // empieza con algunos
            let enemySpawners = 1;
            let enemyNoobs = 5;            // enemigo inicial

            const SPAWNER_COST = 50;
            const REWARD = 40;              // tix por victoria en batalla
            const SPAWN_INTERVAL_MS = 3000;  // 3 segundos

            // Elementos DOM
            const tixSpan = document.getElementById('tixDisplay');
            const spawnerSpan = document.getElementById('spawnerDisplay');
            const playerNoobsSpan = document.getElementById('playerNoobsDisplay');
            const playerSpawnerSpan = document.getElementById('playerSpawnerCount');
            const enemySpawnerSpan = document.getElementById('enemySpawnerCount');
            const playerTroopsDiv = document.getElementById('playerTroopsContainer');
            const enemyTroopsDiv = document.getElementById('enemyTroopsContainer');
            const logDiv = document.getElementById('logMessages');
            const buySpawnerBtn = document.getElementById('buySpawnerBtn');
            const attackBtn = document.getElementById('attackBtn');
            const playerBaseDiv = document.getElementById('playerBase');
            const enemyBaseDiv = document.getElementById('enemyBase');

            // Función para actualizar toda la UI (contadores y visualización de tropas)
            function actualizarUI() {
                // Contadores numéricos
                tixSpan.textContent = playerTix;
                spawnerSpan.textContent = playerSpawners;
                playerNoobsSpan.textContent = playerNoobs;
                playerSpawnerSpan.textContent = playerSpawners;
                enemySpawnerSpan.textContent = enemySpawners;

                // Renderizar tropas jugador
                renderTroops(playerTroopsDiv, playerNoobs, 'player');
                // Renderizar tropas enemigo
                renderTroops(enemyTroopsDiv, enemyNoobs, 'enemy');

                // Botón comprar spawner (habilitado si tiene tix suficientes)
                buySpawnerBtn.disabled = (playerTix < SPAWNER_COST);
            }

            // Muestra hasta 8 iconos de noob, si hay más agrega un contador extra
            function renderTroops(container, count, type) {
                container.innerHTML = '';
                const maxIcons = 8;  // mostramos máximo 8 para no saturar
                const showCount = Math.min(count, maxIcons);
                for (let i = 0; i < showCount; i++) {
                    const troopDiv = document.createElement('div');
                    troopDiv.className = 'troop' + (type === 'enemy' ? ' enemy' : '');
                    troopDiv.textContent = '☺';  // carita blocky
                    container.appendChild(troopDiv);
                }
                if (count > maxIcons) {
                    const extra = document.createElement('div');
                    extra.className = 'extra-troops';
                    extra.textContent = `+${count - maxIcons}`;
                    container.appendChild(extra);
                } else if (count === 0) {
                    const emptyMsg = document.createElement('div');
                    emptyMsg.style.color = '#aaa';
                    emptyMsg.style.fontSize = '22px';
                    emptyMsg.style.padding = '8px';
                    emptyMsg.textContent = '⚫ vacío';
                    container.appendChild(emptyMsg);
                }
            }

            // Agregar mensaje al log (máximo 6 líneas)
            function agregarLog(mensaje) {
                const p = document.createElement('p');
                p.textContent = mensaje;
                logDiv.appendChild(p);
                while (logDiv.children.length > 6) {
                    logDiv.removeChild(logDiv.firstChild);
                }
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            // Spawn automático para jugador y enemigo
            function spawnPlayerNoob() {
                if (playerSpawners > 0) {
                    playerNoobs += playerSpawners;  // cada spawner aporta 1 noob por tick
                    agregarLog(`🏭 Tus spawners generan ${playerSpawners} noob(s).`);
                    actualizarUI();
                }
            }

            function spawnEnemyNoob() {
                if (enemySpawners > 0) {
                    enemyNoobs += enemySpawners;
                    agregarLog(`👾 Los spawners enemigos generan ${enemySpawners} noob(s).`);
                    actualizarUI();
                }
            }

            // Iniciar intervalos de spawn
            setInterval(() => {
                spawnPlayerNoob();
            }, SPAWN_INTERVAL_MS);

            setInterval(() => {
                spawnEnemyNoob();
            }, SPAWN_INTERVAL_MS);

            // Compra de spawner
            buySpawnerBtn.addEventListener('click', () => {
                if (playerTix >= SPAWNER_COST) {
                    playerTix -= SPAWNER_COST;
                    playerSpawners++;
                    agregarLog(`✅ Compraste un spawner. Ahora tienes ${playerSpawners}.`);
                    actualizarUI();
                } else {
                    agregarLog(`❌ Necesitas ${SPAWNER_COST} TIX para comprar spawner.`);
                }
            });

            // ATACAR (batalla)
            attackBtn.addEventListener('click', () => {
                if (playerNoobs === 0 && enemyNoobs === 0) {
                    agregarLog('🤷 No hay tropas en ningún bando. Consigue noobs.');
                    return;
                }

                // Aplicar flash de batalla a las bases
                playerBaseDiv.classList.add('flash');
                enemyBaseDiv.classList.add('flash');
                setTimeout(() => {
                    playerBaseDiv.classList.remove('flash');
                    enemyBaseDiv.classList.remove('flash');
                }, 300);

                // Determinar resultado de la batalla (cada noob elimina a un enemigo)
                if (playerNoobs > enemyNoobs) {
                    // Victoria: jugador pierde la misma cantidad que el enemigo, enemigo queda 0
                    let bajas = enemyNoobs;
                    playerNoobs -= bajas;
                    enemyNoobs = 0;
                    playerTix += REWARD;
                    agregarLog(`🎉 VICTORIA! Derrotaste al enemigo. +${REWARD} TIX. Te quedan ${playerNoobs} noobs.`);
                } else if (enemyNoobs > playerNoobs) {
                    // Derrota: enemigo pierde la misma cantidad que jugador, jugador queda 0
                    let bajas = playerNoobs;
                    enemyNoobs -= bajas;
                    playerNoobs = 0;
                    agregarLog(`💔 DERROTA... El enemigo aniquila tus tropas. Les quedan ${enemyNoobs} noobs.`);
                } else {
                    // Empate: ambos a cero
                    playerNoobs = 0;
                    enemyNoobs = 0;
                    agregarLog(`⚖️ EMPATE! Ambos ejércitos se destruyen mutuamente.`);
                }

                actualizarUI();
            });

            // Botón extra: el enemigo de vez en cuando "mejora" (para dificultad dinámica)
            function aumentarDificultadEnemiga() {
                if (enemySpawners < 8) {  // límite para no volverse imposible
                    enemySpawners++;
                    agregarLog(`⚠️ El enemigo construyó un nuevo spawner (total ${enemySpawners}).`);
                    actualizarUI();
                }
            }
            // Cada 30 segundos el enemigo gana un spawner (siempre que no tenga muchos)
            setInterval(() => {
                if (enemySpawners < 8) {
                    aumentarDificultadEnemiga();
                }
            }, 30000); // 30 segundos

            // Inicializar UI
            actualizarUI();
            agregarLog('🔰 Tix inicial: 200. Compra spawners para generar noobs automáticos.');
        })();
    </script>
</body>
</html>
