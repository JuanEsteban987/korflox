<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zombie Survival.io - Multiplayer P2P</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            color: white;
        }

        #gameContainer {
            position: relative;
            width: 1000px;
            height: 700px;
        }

        #gameCanvas {
            background: #2a5a2a;
            border: 3px solid #444;
            cursor: crosshair;
            width: 100%;
            height: 100%;
        }

        #ui {
            position: absolute;
            top: 10px;
            left: 10px;
            right: 10px;
            display: flex;
            justify-content: space-between;
            pointer-events: none;
            z-index: 10;
        }

        #stats {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            gap: 30px;
            font-size: 18px;
            border: 1px solid #ff6b6b;
            pointer-events: auto;
        }

        #skinSelector {
            background: rgba(0, 0, 0, 0.7);
            padding: 10px 20px;
            border-radius: 20px;
            display: flex;
            gap: 10px;
            border: 1px solid #4ecdc4;
            pointer-events: auto;
        }

        .skin-option {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            transition: transform 0.2s;
            border: 2px solid transparent;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
        }

        .skin-option:hover {
            transform: scale(1.1);
        }

        .skin-option.selected {
            border-color: #4ecdc4;
            transform: scale(1.1);
        }

        #playerList {
            position: absolute;
            top: 80px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 15px;
            border-radius: 10px;
            min-width: 200px;
            border: 1px solid #ff6b6b;
            pointer-events: auto;
            max-height: 300px;
            overflow-y: auto;
        }

        #playerList h3 {
            margin-bottom: 10px;
            color: #ff6b6b;
            text-align: center;
        }

        #playerListItems {
            list-style: none;
        }

        #playerListItems li {
            padding: 8px;
            margin: 2px 0;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 5px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        #connectionStatus {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 8px 15px;
            border-radius: 20px;
            font-size: 14px;
            border: 1px solid #4ecdc4;
        }

        #connectionStatus.connected {
            border-color: #2ecc71;
        }

        #connectionStatus.disconnected {
            border-color: #e74c3c;
        }

        #joinScreen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.95);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 20;
        }

        #joinForm {
            background: #2a2a2a;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            border: 2px solid #4ecdc4;
            max-width: 400px;
        }

        #joinForm input {
            padding: 10px;
            margin: 10px 0 20px;
            width: 100%;
            font-size: 16px;
            border-radius: 5px;
            border: none;
            background: #3a3a3a;
            color: white;
        }

        #roomInfo {
            background: #3a3a3a;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
        }

        #roomId {
            font-family: monospace;
            font-size: 24px;
            color: #4ecdc4;
            letter-spacing: 2px;
            margin: 10px 0;
            padding: 10px;
            background: #2a2a2a;
            border-radius: 5px;
            cursor: pointer;
        }

        #joinForm button {
            padding: 12px 30px;
            font-size: 18px;
            background: #4ecdc4;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            color: white;
            font-weight: bold;
            transition: background 0.2s;
            margin: 5px;
        }

        #joinForm button:hover {
            background: #45b7b0;
        }

        #gameOver {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 30;
            border: 2px solid #ff6b6b;
        }

        #gameOver h2 {
            color: #ff6b6b;
            margin-bottom: 20px;
            font-size: 32px;
        }

        #gameOver button {
            padding: 12px 30px;
            font-size: 18px;
            background: #4ecdc4;
            border: none;
            border-radius: 25px;
            cursor: pointer;
            color: white;
            margin-top: 20px;
        }

        .weapon-info {
            position: absolute;
            bottom: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            padding: 10px;
            border-radius: 10px;
            font-size: 14px;
        }

        #roomControls {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <div id="gameContainer">
        <canvas id="gameCanvas" width="1000" height="700"></canvas>
        
        <div id="ui">
            <div id="stats">
                <span>❤️ <span id="health">100</span></span>
                <span>🔫 <span id="ammo">30</span></span>
                <span>💀 <span id="kills">0</span></span>
            </div>
            <div id="skinSelector"></div>
        </div>

        <div id="playerList">
            <h3>👥 Jugadores Conectados</h3>
            <ul id="playerListItems"></ul>
        </div>

        <div id="connectionStatus" class="disconnected">
            🔌 Desconectado
        </div>

        <div id="joinScreen">
            <div id="joinForm">
                <h2 style="color: #4ecdc4; margin-bottom: 20px;">Zombie Survival.io P2P</h2>
                <input type="text" id="playerName" placeholder="Tu nombre" maxlength="15" value="Jugador" + Math.floor(Math.random() * 1000)>
                
                <div id="roomInfo">
                    <p style="color: #888; margin-bottom: 5px;">Tu código de sala:</p>
                    <div id="roomId" onclick="copyRoomId()">CARGANDO...</div>
                    <p style="color: #888; font-size: 12px; margin-top: 5px;">Click para copiar</p>
                </div>

                <div id="roomControls">
                    <input type="text" id="joinRoomId" placeholder="Código de sala" style="flex: 1;">
                    <button onclick="joinRoom()">Unirse</button>
                </div>

                <div style="margin-top: 20px;">
                    <button onclick="createRoom()" style="background: #ff6b6b;">Crear Nueva Sala</button>
                </div>
            </div>
        </div>

        <div id="gameOver">
            <h2>💀 HAS MUERTO 💀</h2>
            <p style="font-size: 24px; margin: 20px 0;">Puntuación: <span id="finalScore">0</span></p>
            <p style="margin-bottom: 20px;">Asesinatos: <span id="finalKills">0</span></p>
            <button onclick="respawn()">Reintentar</button>
        </div>

        <div class="weapon-info">
            <span>🔫 Pistola | ⚡ Recarga automática</span>
        </div>
    </div>

    <script>
        // Sistema de skins persistente
        const SKINS = {
            DEFAULT: { color: '#ffd700', emoji: '👤', name: 'Default' },
            SOLDIER: { color: '#4ecdc4', emoji: '🪖', name: 'Soldado' },
            NINJA: { color: '#95a5a6', emoji: '🥷', name: 'Ninja' },
            SURVIVOR: { color: '#ff6b6b', emoji: '🧟', name: 'Superviviente' },
            MEDIC: { color: '#2ecc71', emoji: '⚕️', name: 'Médico' }
        };

        // Cargar skin guardada
        let selectedSkin = localStorage.getItem('selectedSkin') || 'DEFAULT';

        // Configuración del canvas
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');

        // Variables del juego
        let gameRunning = false;
        let playerId = null;
        let players = {};
        let zombies = [];
        let bullets = [];
        let playerName = '';
        let lastShot = 0;
        const SHOT_COOLDOWN = 200;

        // Estadísticas del jugador
        let playerHealth = 100;
        let playerAmmo = 30;
        let playerKills = 0;
        let playerScore = 0;

        // Variables P2P
        let peer = null;
        let connections = {};
        let roomId = null;
        let isHost = false;

        // Inicializar skins UI
        function initSkinSelector() {
            const skinSelector = document.getElementById('skinSelector');
            skinSelector.innerHTML = '';
            
            Object.entries(SKINS).forEach(([key, skin]) => {
                const div = document.createElement('div');
                div.className = `skin-option ${key === selectedSkin ? 'selected' : ''}`;
                div.style.backgroundColor = skin.color;
                div.title = skin.name;
                div.onclick = () => selectSkin(key);
                div.textContent = skin.emoji;
                skinSelector.appendChild(div);
            });
        }

        function selectSkin(skinKey) {
            selectedSkin = skinKey;
            localStorage.setItem('selectedSkin', skinKey);
            
            document.querySelectorAll('.skin-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            event.target.classList.add('selected');
            
            if (playerId && players[playerId]) {
                players[playerId].skin = skinKey;
                broadcastGameState();
            }
        }

        // Funciones P2P
        async function createRoom() {
            try {
                peer = new Peer();
                
                peer.on('open', (id) => {
                    roomId = id;
                    document.getElementById('roomId').textContent = id;
                    isHost = true;
                    startGame();
                });

                peer.on('connection', (conn) => {
                    connections[conn.peer] = conn;
                    
                    conn.on('open', () => {
                        console.log('Cliente conectado:', conn.peer);
                        
                        // Enviar estado actual
                        conn.send({
                            type: 'init',
                            playerId: playerId,
                            players: players,
                            zombies: zombies,
                            bullets: bullets
                        });

                        // Crear nuevo jugador para el cliente
                        const newPlayerId = conn.peer;
                        players[newPlayerId] = {
                            id: newPlayerId,
                            name: 'Jugador ' + Object.keys(players).length,
                            x: Math.random() * canvas.width,
                            y: Math.random() * canvas.height,
                            skin: 'DEFAULT',
                            kills: 0,
                            score: 0
                        };

                        broadcastGameState();
                    });

                    conn.on('data', handleData);
                    conn.on('close', () => {
                        delete connections[conn.peer];
                        delete players[conn.peer];
                        broadcastGameState();
                    });
                });

            } catch (error) {
                console.error('Error creando sala:', error);
            }
        }

        async function joinRoom() {
            const targetRoomId = document.getElementById('joinRoomId').value.trim();
            if (!targetRoomId) return;

            try {
                peer = new Peer();
                
                peer.on('open', (id) => {
                    roomId = id;
                    const conn = peer.connect(targetRoomId);
                    
                    conn.on('open', () => {
                        connections[targetRoomId] = conn;
                        
                        conn.on('data', handleData);
                        conn.on('close', () => {
                            delete connections[targetRoomId];
                        });

                        // Enviar datos del jugador
                        conn.send({
                            type: 'join',
                            playerId: id,
                            name: playerName,
                            skin: selectedSkin
                        });

                        startGame();
                    });
                });

            } catch (error) {
                console.error('Error uniéndose a sala:', error);
            }
        }

        function handleData(data) {
            switch(data.type) {
                case 'init':
                    playerId = data.playerId;
                    players = data.players;
                    zombies = data.zombies;
                    bullets = data.bullets;
                    break;
                    
                case 'join':
                    players[data.playerId] = {
                        id: data.playerId,
                        name: data.name,
                        x: Math.random() * canvas.width,
                        y: Math.random() * canvas.height,
                        skin: data.skin,
                        kills: 0,
                        score: 0
                    };
                    broadcastGameState();
                    break;
                    
                case 'playerUpdate':
                    if (players[data.playerId]) {
                        players[data.playerId].x = data.x;
                        players[data.playerId].y = data.y;
                        players[data.playerId].skin = data.skin;
                    }
                    break;
                    
                case 'shoot':
                    bullets.push({
                        x: data.x,
                        y: data.y,
                        vx: data.vx,
                        vy: data.vy,
                        owner: data.playerId
                    });
                    break;
                    
                case 'zombieUpdate':
                    zombies = data.zombies;
                    break;
                    
                case 'gameState':
                    players = data.players;
                    zombies = data.zombies;
                    bullets = data.bullets;
                    break;
            }
        }

        function broadcastGameState() {
            const data = {
                type: 'gameState',
                players: players,
                zombies: zombies,
                bullets: bullets
            };
            
            Object.values(connections).forEach(conn => {
                if (conn.open) {
                    conn.send(data);
                }
            });
        }

        function copyRoomId() {
            navigator.clipboard.writeText(roomId);
            alert('¡Código de sala copiado!');
        }

        function startGame() {
            playerName = document.getElementById('playerName').value.trim() || 'Jugador';
            
            if (!players[playerId]) {
                players[playerId] = {
                    id: playerId,
                    name: playerName,
                    x: canvas.width / 2,
                    y: canvas.height / 2,
                    skin: selectedSkin,
                    kills: 0,
                    score: 0
                };
            }

            document.getElementById('joinScreen').style.display = 'none';
            document.getElementById('connectionStatus').className = 'connected';
            document.getElementById('connectionStatus').innerHTML = '🟢 Conectado - ' + Object.keys(connections).length + ' jugadores';
            
            gameRunning = true;
            
            if (isHost) {
                spawnZombies();
            }
            
            gameLoop();
            broadcastLoop();
        }

        // Broadcast loop para hosts
        function broadcastLoop() {
            setInterval(() => {
                if (gameRunning && isHost) {
                    broadcastGameState();
                }
            }, 100);
        }

        // Spawn de zombies (solo host)
        function spawnZombies() {
            setInterval(() => {
                if (!gameRunning || !isHost) return;
                
                for (let i = 0; i < 2; i++) {
                    if (zombies.length < 30) {
                        const side = Math.floor(Math.random() * 4);
                        let x, y;
                        
                        switch(side) {
                            case 0: x = Math.random() * canvas.width; y = -30; break;
                            case 1: x = canvas.width + 30; y = Math.random() * canvas.height; break;
                            case 2: x = Math.random() * canvas.width; y = canvas.height + 30; break;
                            case 3: x = -30; y = Math.random() * canvas.height; break;
                        }
                        
                        zombies.push({
                            x: x,
                            y: y,
                            health: 50,
                            speed: 1.5,
                            size: 20
                        });
                    }
                }
            }, 3000);
        }

        // Control del jugador
        let keys = {};
        let mouseX = 0, mouseY = 0;

        document.addEventListener('keydown', (e) => keys[e.key.toLowerCase()] = true);
        document.addEventListener('keyup', (e) => keys[e.key.toLowerCase()] = false);
        
        canvas.addEventListener('mousemove', (e) => {
            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            mouseX = (e.clientX - rect.left) * scaleX;
            mouseY = (e.clientY - rect.top) * scaleY;
        });

        canvas.addEventListener('click', shoot);

        function shoot() {
            if (!gameRunning || !playerId || !players[playerId] || playerAmmo <= 0) return;
            
            const now = Date.now();
            if (now - lastShot < SHOT_COOLDOWN) return;
            
            lastShot = now;
            playerAmmo--;
            
            const player = players[playerId];
            const angle = Math.atan2(mouseY - player.y, mouseX - player.x);
            
            const bullet = {
                x: player.x,
                y: player.y,
                vx: Math.cos(angle) * 8,
                vy: Math.sin(angle) * 8,
                owner: playerId
            };
            
            bullets.push(bullet);
            
            // Broadcast disparo
            Object.values(connections).forEach(conn => {
                if (conn.open) {
                    conn.send({
                        type: 'shoot',
                        playerId: playerId,
                        x: bullet.x,
                        y: bullet.y,
                        vx: bullet.vx,
                        vy: bullet.vy
                    });
                }
            });
        }

        function updatePlayer() {
            if (!playerId || !players[playerId]) return;
            
            const player = players[playerId];
            const speed = 3;
            let moved = false;
            
            if (keys['w'] || keys['arrowup']) { player.y -= speed; moved = true; }
            if (keys['s'] || keys['arrowdown']) { player.y += speed; moved = true; }
            if (keys['a'] || keys['arrowleft']) { player.x -= speed; moved = true; }
            if (keys['d'] || keys['arrowright']) { player.x += speed; moved = true; }
            
            player.x = Math.max(20, Math.min(canvas.width - 20, player.x));
            player.y = Math.max(20, Math.min(canvas.height - 20, player.y));
            
            if (moved) {
                // Broadcast movimiento
                Object.values(connections).forEach(conn => {
                    if (conn.open) {
                        conn.send({
                            type: 'playerUpdate',
                            playerId: playerId,
                            x: player.x,
                            y: player.y,
                            skin: player.skin
                        });
                    }
                });
            }
        }

        function updateZombies() {
            if (!isHost) return; // Solo host actualiza zombies
            
            if (!playerId || !players[playerId]) return;
            
            const player = players[playerId];
            
            zombies = zombies.filter(zombie => {
                if (zombie.health <= 0) return false;
                
                // Encontrar jugador más cercano
                let closestPlayer = null;
                let closestDist = Infinity;
                
                Object.values(players).forEach(p => {
                    const dx = p.x - zombie.x;
                    const dy = p.y - zombie.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist < closestDist) {
                        closestDist = dist;
                        closestPlayer = p;
                    }
                });
                
                if (closestPlayer) {
                    const dx = closestPlayer.x - zombie.x;
                    const dy = closestPlayer.y - zombie.y;
                    const dist = Math.sqrt(dx * dx + dy * dy);
                    
                    if (dist > 0) {
                        zombie.x += (dx / dist) * zombie.speed;
                        zombie.y += (dy / dist) * zombie.speed;
                    }
                    
                    // Daño al jugador
                    if (dist < 30 && closestPlayer.id === playerId) {
                        playerHealth -= 0.5;
                        if (playerHealth <= 0) {
                            gameOver();
                        }
                    }
                }
                
                return true;
            });
        }

        function updateBullets() {
            bullets = bullets.filter(bullet => {
                bullet.x += bullet.vx;
                bullet.y += bullet.vy;
                
                if (bullet.x < 0 || bullet.x > canvas.width || 
                    bullet.y < 0 || bullet.y > canvas.height) {
                    return false;
                }
                
                // Solo host procesa colisiones
                if (isHost) {
                    for (let i = 0; i < zombies.length; i++) {
                        const zombie = zombies[i];
                        const dx = bullet.x - zombie.x;
                        const dy = bullet.y - zombie.y;
                        const dist = Math.sqrt(dx * dx + dy * dy);
                        
                        if (dist < 25) {
                            zombie.health -= 25;
                            
                            if (zombie.health <= 0 && bullet.owner === playerId) {
                                playerKills++;
                                playerScore += 100;
                                playerAmmo += 5;
                            }
                            
                            return false;
                        }
                    }
                }
                
                return true;
            });
            
            if (playerAmmo <= 0) {
                setTimeout(() => {
                    playerAmmo = 30;
                }, 2000);
            }
        }

        function gameOver() {
            gameRunning = false;
            document.getElementById('finalScore').textContent = playerScore;
            document.getElementById('finalKills').textContent = playerKills;
            document.getElementById('gameOver').style.display = 'block';
        }

        function respawn() {
            if (playerId && players[playerId]) {
                players[playerId].x = canvas.width / 2;
                players[playerId].y = canvas.height / 2;
            }
            
            playerHealth = 100;
            playerAmmo = 30;
            playerKills = 0;
            playerScore = 0;
            zombies = [];
            bullets = [];
            
            document.getElementById('gameOver').style.display = 'none';
            gameRunning = true;
        }

        function updatePlayerList() {
            const list = document.getElementById('playerListItems');
            list.innerHTML = '';
            
            Object.values(players).forEach(p => {
                const li = document.createElement('li');
                li.innerHTML = `
                    <span style="background: ${SKINS[p.skin]?.color || '#ffd700'}; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center;">
                        ${SKINS[p.skin]?.emoji || '👤'}
                    </span>
                    <span style="flex: 1;">${p.name}</span>
                    <span style="color: #ff6b6b;">${p.kills || 0} 💀</span>
                `;
                if (p.id === playerId) {
                    li.style.background = 'rgba(78, 205, 196, 0.2)';
                }
                list.appendChild(li);
            });
            
            document.getElementById('connectionStatus').innerHTML = 
                `🟢 Conectado - ${Object.keys(players).length} jugadores`;
        }

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            
            // Cuadrícula
            ctx.strokeStyle = '#3a6e3a';
            ctx.lineWidth = 1;
            for (let i = 0; i < canvas.width; i += 50) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i, canvas.height);
                ctx.stroke();
            }
            for (let i = 0; i < canvas.height; i += 50) {
                ctx.beginPath();
                ctx.moveTo(0, i);
                ctx.lineTo(canvas.width, i);
                ctx.stroke();
            }
            
            // Zombies
            zombies.forEach(zombie => {
                ctx.fillStyle = '#2ecc71';
                ctx.beginPath();
                ctx.arc(zombie.x, zombie.y, 20, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'black';
                ctx.font = '20px Arial';
                ctx.fillText('🧟', zombie.x - 15, zombie.y - 15);
                
                // Barra de vida
                ctx.fillStyle = 'red';
                ctx.fillRect(zombie.x - 20, zombie.y - 30, 40, 5);
                ctx.fillStyle = 'green';
                ctx.fillRect(zombie.x - 20, zombie.y - 30, 40 * (zombie.health / 50), 5);
            });
            
            // Balas
            bullets.forEach(bullet => {
                ctx.fillStyle = 'yellow';
                ctx.beginPath();
                ctx.arc(bullet.x, bullet.y, 5, 0, Math.PI * 2);
                ctx.fill();
            });
            
            // Jugadores
            Object.values(players).forEach(player => {
                const skin = SKINS[player.skin] || SKINS.DEFAULT;
                
                ctx.fillStyle = skin.color;
                ctx.beginPath();
                ctx.arc(player.x, player.y, 20, 0, Math.PI * 2);
                ctx.fill();
                
                ctx.fillStyle = 'black';
                ctx.font = '20px Arial';
                ctx.fillText(skin.emoji, player.x - 15, player.y - 15);
                
                // Nombre
                ctx.fillStyle = 'white';
                ctx.font = '12px Arial';
                ctx.textAlign = 'center';
                ctx.fillText(player.name, player.x, player.y - 30);
                
                // Indicador de jugador local
                if (player.id === playerId) {
                    ctx.strokeStyle = 'white';
                    ctx.lineWidth = 2;
                    ctx.beginPath();
                    ctx.arc(player.x, player.y, 22, 0, Math.PI * 2);
                    ctx.stroke();
                }
            });
            
            // UI
            document.getElementById('health').textContent = Math.max(0, Math.floor(playerHealth));
            document.getElementById('ammo').textContent = playerAmmo;
            document.getElementById('kills').textContent = playerKills;
            
            updatePlayerList();
        }

        function gameLoop() {
            if (!gameRunning) return;
            
            updatePlayer();
            if (isHost) {
                updateZombies();
            }
            updateBullets();
            draw();
            
            requestAnimationFrame(gameLoop);
        }

        // Inicializar
        initSkinSelector();

        // Cargar PeerJS
        const script = document.createElement('script');
        script.src = 'https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js';
        script.onload = () => {
            console.log('PeerJS cargado');
            createRoom(); // Crear sala automáticamente
        };
        document.head.appendChild(script);
    </script>
</body>
</html>
