<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌲 NOOB TERRITORY · ROBLOX 2008 🌲</title>
    <style>
        /* --- ESTÉTICA ROBLOX 2008 (blocky, brillante, biseles) --- */
        * {
            box-sizing: border-box;
            image-rendering: pixelated;
            image-rendering: crisp-edges;
            font-family: 'Courier New', Courier, monospace;
        }

        body {
            background: #1b3b4f;
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 16px;
        }

        .game-container {
            max-width: 1200px;
            width: 100%;
            background: #6d9ac4;
            border: 6px ridge #ffffff;
            box-shadow: 12px 12px 0px #0a1f2b;
            padding: 24px 20px;
        }

        .header {
            background: #4b6e8c;
            border: 4px outset #e0e0e0;
            padding: 14px 8px;
            margin-bottom: 24px;
            text-align: center;
            font-size: 32px;
            font-weight: bold;
            color: #ffffff;
            text-shadow: 4px 4px 0px #1f4f6e, 6px 6px 0px #0b2b3f;
            letter-spacing: 2px;
        }

        .stats-panel {
            background: #b8d8f0;
            border: 4px inset #f0f8ff;
            padding: 20px 15px;
            margin-bottom: 20px;
            display: flex;
            flex-wrap: wrap;
            justify-content: space-around;
            gap: 16px;
            box-shadow: inset 2px 2px 0px #3b5e7a;
        }

        .stat-item {
            background: #e6f0fa;
            border: 3px ridge #ffffff;
            padding: 12px 18px;
            font-size: 22px;
            font-weight: bold;
            color: #0f2f44;
            display: flex;
            align-items: center;
            gap: 10px;
            box-shadow: 3px 3px 0px #3b6e8c;
        }

        .stat-item span {
            background: #1b2f44;
            color: #ffffc0;
            padding: 4px 16px;
            border: 2px inset #c0c0c0;
            font-size: 30px;
            margin-left: 8px;
        }

        /* --- MAPA CON PARCELAS (bases) --- */
        .map-row {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            justify-content: center;
        }

        .base-territory {
            flex: 1 1 400px;
            background: #4a7a5c;  /* verde césped */
            border: 8px ridge #6b8f6b;
            padding: 20px 20px 25px;
            box-shadow: 10px 10px 0px #1f3f2f;
            display: flex;
            flex-direction: column;
        }

        .base-title {
            font-size: 28px;
            font-weight: bold;
            color: #fffbc2;
            text-shadow: 3px 3px 0 #2f5f2f;
            background: #2d5a3d;
            padding: 10px;
            border: 4px ridge #9fcf9f;
            text-align: center;
            margin-bottom: 20px;
        }

        /* zona de spawners (edificios) */
        .spawner-row {
            display: flex;
            align-items: center;
            gap: 12px;
            background: #2b5a3b;
            border: 5px inset #7fa07f;
            padding: 16px 18px;
            margin-bottom: 25px;
            color: white;
            font-size: 26px;
            flex-wrap: wrap;
        }

        .spawner-icon {
            font-size: 40px;
            filter: drop-shadow(4px 4px 0 #1f3f2f);
        }

        .spawner-badge {
            background: #1f3f2f;
            padding: 8px 20px;
            border: 3px ridge #afcfaf;
            font-size: 32px;
            font-weight: bold;
            color: #ffffb0;
            margin-left: auto;
        }

        /* cuadrícula de parcelas (4x4) */
        .parcel-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 12px;
            background: #2f6f3f;
            border: 6px inset #5f9f6f;
            padding: 16px;
            min-height: 240px;
            box-shadow: inset 0 0 0 4px #1f4f2f;
        }

        .parcel {
            background: #5f9f6f;
            border: 4px ridge #b0e0b0;
            aspect-ratio: 1 / 1;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 38px;
            box-shadow: 3px 3px 0 #1f4f2f;
            transition: 0.1s;
        }

        .parcel.occupied {
            background: #ffe68f;
            border-color: #b87c3a;
            box-shadow: 3px 3px 0 #8b5a2f;
        }

        .parcel.enemy-occupied {
            background: #ffa07a;
            border-color: #b85a3a;
            box-shadow: 3px 3px 0 #8b3a2f;
        }

        .parcel .noob-emoji {
            font-size: 40px;
            line-height: 1;
        }

        .parcel .extra-indicator {
            background: #00000080;
            color: white;
            font-size: 24px;
            padding: 4px 8px;
            border-radius: 40px;
            border: 2px solid white;
        }

        /* botones dentro de la base */
        .base-actions {
            margin-top: 25px;
            display: flex;
            justify-content: center;
        }

        .roblox-btn {
            background: #c0c0c0;
            border: 6px outset #f8f8f8;
            font-size: 26px;
            font-weight: bold;
            padding: 16px 32px;
            cursor: pointer;
            color: #1f2f3f;
            text-transform: uppercase;
            box-shadow: 5px 5px 0px #2f4f6f;
            transition: 0.05s linear;
            letter-spacing: 2px;
        }

        .roblox-btn:active {
            border: 6px inset #f8f8f8;
            transform: translate(4px, 4px);
            box-shadow: 2px 2px 0px #2f4f6f;
        }

        .roblox-btn:disabled {
            opacity: 0.4;
            filter: grayscale(60%);
            transform: none;
            border: 6px outset #a0a0a0;
            box-shadow: 2px 2px 0px #1f3f4f;
            cursor: not-allowed;
        }

        /* botón de ataque central */
        .attack-area {
            display: flex;
            justify-content: center;
            margin: 30px 0 20px;
        }

        .attack-btn {
            background: #c02f2f;
            border: 8px outset #ffc0c0;
            font-size: 48px;
            padding: 24px 70px;
            color: white;
            text-shadow: 4px 4px 0 #5f1f1f;
            box-shadow: 12px 12px 0 #2f1f1f;
        }

        .log-box {
            background: #0f1f2b;
            border: 6px inset #3f6f8f;
            padding: 16px;
            color: #9bff9b;
            font-size: 20px;
            min-height: 100px;
            max-height: 140px;
            overflow-y: auto;
            box-shadow: inset 0 0 0 2px #1f4f6e;
            margin: 20px 0 10px;
        }

        .log-box p {
            margin: 4px 0;
            border-left: 4px solid #5faf5f;
            padding-left: 10px;
        }

        .footer-note {
            text-align: center;
            font-size: 18px;
            color: #e0f0ff;
            text-shadow: 2px 2px 0 #0f2a3f;
            background: #2b4f6b;
            padding: 6px;
            border: 2px ridge #9fbfdf;
        }

        /* animación de batalla */
        .base-territory.flash {
            animation: battleFlash 0.2s infinite;
        }
        @keyframes battleFlash {
            0% { filter: brightness(1); }
            50% { filter: brightness(1.8) drop-shadow(0 0 10px yellow); }
            100% { filter: brightness(1); }
        }
    </style>
</head>
<body>
    <div class="game-container">
        <div class="header">
            🗺️ NOOB TERRITORY · 2008 🗺️
        </div>

        <!-- Panel de recursos -->
        <div class="stats-panel">
            <div class="stat-item">💰 TIX <span id="tixDisplay">200</span></div>
            <div class="stat-item">🏭 SPAWNERS <span id="spawnerDisplay">1</span></div>
            <div class="stat-item">🪖 TUS NOOBS <span id="playerNoobsDisplay">3</span></div>
        </div>

        <!-- MAPA CON DOS BASES (izquierda jugador, derecha enemigo) -->
        <div class="map-row">
            <!-- Base Jugador -->
            <div class="base-territory" id="playerBase">
                <div class="base-title">🔵 TU TERRITORIO</div>
                <!-- Spawners del jugador -->
                <div class="spawner-row">
                    <span class="spawner-icon">🏭</span>
                    <span>SPAWNERS</span>
                    <span class="spawner-badge" id="playerSpawnerCount">1</span>
                </div>
                <!-- Parcelas (grid 4x4) -->
                <div class="parcel-grid" id="playerParcelGrid">
                    <!-- Se llena con JS -->
                </div>
                <!-- Botón comprar spawner -->
                <div class="base-actions">
                    <button class="roblox-btn" id="buySpawnerBtn">➕ COMPRAR SPAWNER (50💰)</button>
                </div>
            </div>

            <!-- Base Enemiga -->
            <div class="base-territory" id="enemyBase">
                <div class="base-title">🔴 TERRITORIO ENEMIGO</div>
                <div class="spawner-row">
                    <span class="spawner-icon">🏭</span>
                    <span>SPAWNERS</span>
                    <span class="spawner-badge" id="enemySpawnerCount">1</span>
                </div>
                <div class="parcel-grid" id="enemyParcelGrid">
                    <!-- Se llena con JS -->
                </div>
                <!-- Sin acciones para el enemigo, solo decoración -->
                <div style="text-align: center; margin-top: 20px; color: #ffcf9f; font-size: 22px;">⚔️ HOSTIL</div>
            </div>
        </div>

        <!-- Botón de batalla central -->
        <div class="attack-area">
            <button class="roblox-btn attack-btn" id="attackBtn">⚡ ¡INVADIR! ⚡</button>
        </div>

        <!-- Log de eventos -->
        <div class="log-box" id="logMessages">
            <p>🌲 2008: Conquista el territorio enemigo. Compra spawners y ocupa parcelas.</p>
        </div>

        <div class="footer-note">
            🧱 ROBLOX 2008 · PARCEL WARS · NOOB TERRITORY 🧱
        </div>
    </div>

    <script>
        (function() {
            // --- Estado del juego ---
            let playerTix = 200;
            let playerSpawners = 1;
            let playerNoobs = 3;          // empieza con algunos
            let enemySpawners = 1;
            let enemyNoobs = 5;            // enemigo inicial

            const SPAWNER_COST = 50;
            const REWARD = 40;              // tix por victoria en batalla
            const SPAWN_INTERVAL_MS = 3000;  // 3 segundos

            // Elementos DOM
            const tixSpan = document.getElementById('tixDisplay');
            const spawnerSpan = document.getElementById('spawnerDisplay');
            const playerNoobsSpan = document.getElementById('playerNoobsDisplay');
            const playerSpawnerSpan = document.getElementById('playerSpawnerCount');
            const enemySpawnerSpan = document.getElementById('enemySpawnerCount');
            const playerParcelGrid = document.getElementById('playerParcelGrid');
            const enemyParcelGrid = document.getElementById('enemyParcelGrid');
            const logDiv = document.getElementById('logMessages');
            const buySpawnerBtn = document.getElementById('buySpawnerBtn');
            const attackBtn = document.getElementById('attackBtn');
            const playerBaseDiv = document.getElementById('playerBase');
            const enemyBaseDiv = document.getElementById('enemyBase');

            // --- Función para actualizar las parcelas (grid 4x4) ---
            function renderParcelas(container, count, esEnemigo) {
                container.innerHTML = ''; // Limpiar grid
                const totalCeldas = 16; // 4x4
                for (let i = 0; i < totalCeldas; i++) {
                    const parcela = document.createElement('div');
                    parcela.className = 'parcel';
                    
                    // Determinar si esta celda debe estar ocupada por un noob
                    if (i < count) {
                        // Mostrar un noob en esta parcela
                        if (esEnemigo) {
                            parcela.classList.add('enemy-occupied');
                        } else {
                            parcela.classList.add('occupied');
                        }
                        // Si es la última celda y hay más noobs que celdas, mostramos un contador extra
                        if (i === totalCeldas - 1 && count > totalCeldas) {
                            // En lugar de un noob, mostramos +X
                            const extra = count - (totalCeldas - 1);
                            parcela.innerHTML = `<span class="extra-indicator">+${extra}</span>`;
                        } else {
                            parcela.innerHTML = '<span class="noob-emoji">☺</span>';
                        }
                    } else {
                        // Parcela vacía
                        parcela.innerHTML = '🌿';
                    }
                    container.appendChild(parcela);
                }
            }

            // Función para actualizar toda la UI
            function actualizarUI() {
                // Contadores numéricos
                tixSpan.textContent = playerTix;
                spawnerSpan.textContent = playerSpawners;
                playerNoobsSpan.textContent = playerNoobs;
                playerSpawnerSpan.textContent = playerSpawners;
                enemySpawnerSpan.textContent = enemySpawners;

                // Renderizar parcelas
                renderParcelas(playerParcelGrid, playerNoobs, false);
                renderParcelas(enemyParcelGrid, enemyNoobs, true);

                // Botón comprar spawner habilitado según TIX
                buySpawnerBtn.disabled = (playerTix < SPAWNER_COST);
            }

            // Agregar mensaje al log (máximo 6 líneas)
            function agregarLog(mensaje) {
                const p = document.createElement('p');
                p.textContent = mensaje;
                logDiv.appendChild(p);
                while (logDiv.children.length > 6) {
                    logDiv.removeChild(logDiv.firstChild);
                }
                logDiv.scrollTop = logDiv.scrollHeight;
            }

            // Spawn automático para jugador y enemigo
            function spawnPlayerNoob() {
                if (playerSpawners > 0) {
                    playerNoobs += playerSpawners;  // cada spawner aporta 1 noob por tick
                    agregarLog(`🏭 Tus spawners generan ${playerSpawners} noob(s).`);
                    actualizarUI();
                }
            }

            function spawnEnemyNoob() {
                if (enemySpawners > 0) {
                    enemyNoobs += enemySpawners;
                    agregarLog(`👾 Los spawners enemigos generan ${enemySpawners} noob(s).`);
                    actualizarUI();
                }
            }

            // Iniciar intervalos de spawn
            setInterval(() => {
                spawnPlayerNoob();
            }, SPAWN_INTERVAL_MS);

            setInterval(() => {
                spawnEnemyNoob();
            }, SPAWN_INTERVAL_MS);

            // Compra de spawner
            buySpawnerBtn.addEventListener('click', () => {
                if (playerTix >= SPAWNER_COST) {
                    playerTix -= SPAWNER_COST;
                    playerSpawners++;
                    agregarLog(`✅ Compraste un spawner. Ahora tienes ${playerSpawners}.`);
                    actualizarUI();
                } else {
                    agregarLog(`❌ Necesitas ${SPAWNER_COST} TIX para comprar spawner.`);
                }
            });

            // ATACAR (batalla)
            attackBtn.addEventListener('click', () => {
                if (playerNoobs === 0 && enemyNoobs === 0) {
                    agregarLog('🤷 No hay tropas en ningún territorio. Consigue noobs.');
                    return;
                }

                // Aplicar flash de batalla a los territorios
                playerBaseDiv.classList.add('flash');
                enemyBaseDiv.classList.add('flash');
                setTimeout(() => {
                    playerBaseDiv.classList.remove('flash');
                    enemyBaseDiv.classList.remove('flash');
                }, 300);

                // Determinar resultado de la batalla (cada noob elimina a un enemigo)
                if (playerNoobs > enemyNoobs) {
                    // Victoria: jugador pierde la misma cantidad que el enemigo, enemigo queda 0
                    let bajas = enemyNoobs;
                    playerNoobs -= bajas;
                    enemyNoobs = 0;
                    playerTix += REWARD;
                    agregarLog(`🎉 VICTORIA! Conquistas el territorio. +${REWARD} TIX. Te quedan ${playerNoobs} noobs.`);
                } else if (enemyNoobs > playerNoobs) {
                    // Derrota: enemigo pierde la misma cantidad que jugador, jugador queda 0
                    let bajas = playerNoobs;
                    enemyNoobs -= bajas;
                    playerNoobs = 0;
                    agregarLog(`💔 DERROTA... El enemigo invade tu base. Les quedan ${enemyNoobs} noobs.`);
                } else {
                    // Empate: ambos a cero
                    playerNoobs = 0;
                    enemyNoobs = 0;
                    agregarLog(`⚖️ EMPATE! Ambos territorios quedan vacíos.`);
                }

                actualizarUI();
            });

            // El enemigo aumenta su dificultad cada 30 segundos (hasta 8 spawners)
            function aumentarDificultadEnemiga() {
                if (enemySpawners < 8) {
                    enemySpawners++;
                    agregarLog(`⚠️ El enemigo construyó un nuevo spawner (total ${enemySpawners}).`);
                    actualizarUI();
                }
            }
            setInterval(() => {
                if (enemySpawners < 8) {
                    aumentarDificultadEnemiga();
                }
            }, 30000); // 30 segundos

            // Inicializar UI
            actualizarUI();
            agregarLog('🔰 Tix inicial: 200. Compra spawners y ocupa parcelas con noobs.');
        })();
    </script>
</body>
</html>
