<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2008 · DEFENSA POR OLEADAS</title>
    <style>
        /* ESTÉTICA 2008 — GLOSS, BORDES REDONDEADOS, SOMBRAS, DEGRADÉS */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            background: #2a2a2a url('data:image/svg+xml;utf8,<svg width="60" height="60" viewBox="0 0 60 60" xmlns="http://www.w3.org/2000/svg"><path d="M30 0 L60 30 L30 60 L0 30 Z" fill="%23333333" fill-opacity="0.15"/></svg>');
            font-family: 'Arial', 'Helvetica', 'Trebuchet MS', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0;
            padding: 16px;
        }

        .ventana {
            max-width: 800px;
            width: 100%;
            background: #eae3d7;
            background: linear-gradient(145deg, #f2ecdf 0%, #d9cfbc 100%);
            border: 3px solid #5d4b3a;
            border-radius: 24px 24px 20px 20px;
            box-shadow: inset 0 1px 4px #fff4e6, 0 12px 20px rgba(0,0,0,0.7), 0 0 0 2px #3b2e22;
            padding: 28px 24px 32px 24px;
            position: relative;
        }

        .ventana::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 50px;
            background: radial-gradient(circle at 20% 20%, rgba(255,255,245,0.7) 0%, rgba(255,255,255,0) 70%);
            pointer-events: none;
            border-radius: 24px 24px 0 0;
        }

        h1 {
            font-size: 2.8rem;
            font-weight: 900;
            text-align: center;
            margin: 0 0 8px 0;
            letter-spacing: -0.5px;
            color: #1f2b1f;
            text-shadow: 3px 3px 0 #8b7a64, 1px 1px 0 #d9c8b2, 4px 4px 0 #3a2e20;
            font-family: 'Impact', 'Arial Black', 'Arial', sans-serif;
            word-break: break-word;
            line-height: 1.1;
            transform: rotate(-0.5deg);
        }

        .subhead {
            text-align: center;
            font-size: 1.1rem;
            margin-bottom: 28px;
            font-style: italic;
            color: #2c3e2c;
            background: #c9bcab;
            display: inline-block;
            padding: 4px 24px;
            border-radius: 40px;
            margin-left: auto;
            margin-right: auto;
            width: fit-content;
            border: 2px solid #948470;
            box-shadow: inset 0 1px 4px #efebdd, 0 2px 0 #5f4f3e;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* Caja de madera */
        .crate-wrapper {
            display: flex;
            justify-content: center;
            margin: 16px 0 24px 0;
            cursor: pointer;
        }

        .crate {
            position: relative;
            width: 240px;
            height: 180px;
            background-color: #b87c4b;
            background-image: repeating-linear-gradient(0deg, 
                #9c6b3e 0px, 
                #9c6b3e 12px, 
                #b87c4b 12px, 
                #b87c4b 24px);
            border: 8px solid #5f3e28;
            border-radius: 20px 20px 16px 16px;
            box-shadow: inset 0 0 0 2px #e4b585, 0 14px 0 #3e2e1d, 0 20px 15px rgba(0,0,0,0.5);
            transition: transform 0.1s ease, box-shadow 0.1s ease;
        }

        /* ANIMACIÓN AL ABRIR LA CAJA */
        .crate.shake {
            animation: crateShake 0.3s cubic-bezier(0.25, 0.1, 0.25, 1) forwards;
        }

        @keyframes crateShake {
            0% { transform: translateX(0) rotateZ(0deg); }
            20% { transform: translateX(-8px) rotateZ(-4deg); }
            40% { transform: translateX(8px) rotateZ(4deg); }
            60% { transform: translateX(-5px) rotateZ(-2deg); }
            80% { transform: translateX(5px) rotateZ(2deg); }
            100% { transform: translateX(0) rotateZ(0); }
        }

        .crate:hover:not(.shake) {
            transform: scale(1.02);
            box-shadow: inset 0 0 0 2px #f3ca9c, 0 14px 0 #3e2e1d, 0 22px 20px rgba(0,0,0,0.6);
        }

        .stripe {
            position: absolute;
            background: #2d2d2d;
            background: linear-gradient(135deg, #3a3a3a, #1e1e1e);
            border-radius: 6px;
            box-shadow: 0 0 0 2px #6b4f31, 2px 2px 0 #1a1a1a;
            z-index: 2;
        }

        .stripe.horizontal {
            width: 100%;
            height: 16px;
            top: 40%;
            left: 0;
            transform: translateY(-50%);
        }

        .stripe.vertical {
            width: 16px;
            height: 100%;
            left: 25%;
            top: 0;
        }

        .stripe.vertical2 {
            width: 16px;
            height: 100%;
            left: 70%;
            top: 0;
        }

        .crate-label {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: #1f1f1f;
            color: #e0d9c7;
            font-family: 'Impact', 'Arial Black', sans-serif;
            font-size: 2.5rem;
            padding: 10px 16px 4px 16px;
            border: 4px solid #ab7e54;
            border-radius: 18px;
            box-shadow: inset 0 -2px 0 #4d3f2b, 0 5px 0 #422f1d, 0 8px 10px black;
            letter-spacing: 3px;
            text-shadow: 2px 2px 0 #211810;
            z-index: 5;
            line-height: 1;
        }

        /* tropa actual (apertura) */
        .current-troop {
            background: #3d3329;
            border: 6px ridge #8b735b;
            border-radius: 50px 16px 50px 16px;
            padding: 20px 16px;
            margin: 20px 0 18px 0;
            text-align: center;
            font-size: 1.8rem;
            font-weight: bold;
            color: white;
            text-shadow: 3px 3px 0 #1f1f1f, 1px 1px 10px black;
            box-shadow: inset 0 0 30px #1f1712, 0 10px 10px rgba(0,0,0,0.5);
            word-break: break-word;
        }

        .troop-rarity {
            font-size: 1.2rem;
            display: block;
            margin-top: 8px;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 2px;
            background: rgba(0,0,0,0.6);
            padding: 6px 12px;
            border-radius: 40px;
            display: inline-block;
        }

        /* botón gigante */
        .open-btn {
            display: block;
            width: 100%;
            background: transparent;
            border: none;
            margin: 24px 0 18px 0;
        }

        .open-btn button {
            width: 100%;
            padding: 24px 10px;
            font-size: 2.4rem;
            font-weight: bold;
            background: #d6b17e;
            background: linear-gradient(180deg, #f3dbb8 0%, #c99f68 50%, #a07442 100%);
            border: 6px solid #6e4f2b;
            border-radius: 120px;
            color: #211c14;
            text-shadow: 3px 3px 0 #dbbd92, 0 2px 0 white;
            box-shadow: inset 0 -6px 0 #5f401f, inset 0 6px 10px #ffefcd, 0 16px 12px rgba(0,0,0,0.5);
            cursor: pointer;
            transition: all 0.06s linear;
            font-family: 'Arial', 'Helvetica', sans-serif;
            letter-spacing: 5px;
        }

        .open-btn button:active {
            transform: translateY(8px);
            box-shadow: inset 0 -2px 0 #5f401f, inset 0 6px 8px #ffefcd, 0 8px 6px rgba(0,0,0,0.5);
        }

        /* panel de oleadas */
        .wave-panel {
            background: #322c1f;
            border: 6px ridge #a3825a;
            border-radius: 30px 8px 30px 8px;
            padding: 16px 20px;
            margin: 20px 0 20px 0;
            display: flex;
            justify-content: space-between;
            color: #fadfaa;
            font-weight: bold;
            font-size: 1.3rem;
            text-shadow: 2px 2px 0 #2c1e0f;
            box-shadow: inset 0 0 0 3px #cbaa7a, 0 8px 0 #4a3824;
        }

        .wave-panel span {
            background: #1e1a10;
            padding: 8px 18px;
            border-radius: 40px;
            border: 3px solid #b49462;
        }

        /* MAPA: 3 puestos de defensa */
        .map-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2b2b1a;
            text-shadow: 2px 2px 0 #bba88b;
            margin: 30px 0 12px 0;
            border-bottom: 4px dotted #7a6548;
            padding-bottom: 6px;
        }

        .defense-grid {
            display: flex;
            justify-content: center;
            gap: 30px;
            background: #6c8e5a;
            background: linear-gradient(145deg, #5b7e49, #3e632a);
            border: 8px ridge #7a613f;
            padding: 30px 20px;
            border-radius: 80px 20px 80px 20px;
            box-shadow: inset 0 0 0 4px #b1a07b, 0 10px 0 #3a4f2a, 0 15px 15px black;
            margin-bottom: 30px;
        }

        .defense-post {
            background: #4b6333;
            background: radial-gradient(circle at 30% 30%, #7c9e60, #2e4d1e);
            width: 120px;
            height: 140px;
            border: 6px groove #af8f5a;
            border-radius: 30px 8px 30px 8px;
            box-shadow: inset 0 -4px 0 #1d2e0e, 0 10px 0 #1e2e12, 0 10px 10px black;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            color: white;
            text-shadow: 3px 3px 0 #1a1a1a;
            font-weight: bold;
            font-size: 1rem;
            padding: 10px 5px;
            text-align: center;
            transition: 0.2s;
        }

        .defense-post span.name {
            font-size: 1.2rem;
            display: block;
            background: rgba(0,0,0,0.5);
            width: 100%;
            border-radius: 10px;
            padding: 4px 0;
        }

        .defense-post span.rarity-tag {
            font-size: 0.7rem;
            background: black;
            padding: 4px 8px;
            border-radius: 30px;
            margin-top: 6px;
            max-width: 100%;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        /* historial */
        .history-title {
            font-size: 1.5rem;
            font-weight: bold;
            color: #2b2b1a;
            text-shadow: 2px 2px 0 #bba88b;
            margin-bottom: 12px;
            border-bottom: 4px dotted #7a6548;
            padding-bottom: 6px;
        }

        .history-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            justify-content: center;
            background: #bba88b;
            background: linear-gradient(0deg, #988f7a, #cbbaa7);
            border: 4px inset #6d5c46;
            padding: 20px 12px;
            border-radius: 30px 8px 30px 8px;
            min-height: 110px;
            box-shadow: inset 0 0 0 3px #efe2cf, 0 5px 0 #4d3d2e;
        }

        .history-item {
            background: #4b3d31;
            color: white;
            padding: 8px 6px;
            border-radius: 16px 4px 16px 4px;
            font-size: 1.0rem;
            font-weight: bold;
            text-align: center;
            text-shadow: 2px 2px 0 #1c1c1c;
            border: 3px solid #b5976c;
            box-shadow: 0 6px 0 #3a2d1f, 0 8px 8px black;
            min-width: 90px;
            max-width: 110px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            transition: 0.1s ease;
            flex: 0 1 auto;
        }

        .history-item span {
            display: block;
            font-size: 0.7rem;
            text-transform: uppercase;
            opacity: 0.9;
        }

        footer {
            margin-top: 28px;
            color: #3b3522;
            font-size: 0.9rem;
            text-align: center;
            background: #cbbc9f;
            padding: 4px 8px;
            border-radius: 50px;
            border: 2px solid #8f754b;
        }

        .game-over {
            background: #aa2b2b;
            color: white;
            font-weight: bold;
            padding: 8px;
            border-radius: 40px;
            text-align: center;
            animation: pulse 1s infinite;
        }
        @keyframes pulse {
            0% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
<body>
<div class="ventana">
    <h1>★ OLEADAS TROPAS 2OO8 ★</h1>
    <div class="subhead">abre cajas · defiende el mapa</div>

    <!-- crate clickeable con animación -->
    <div class="crate-wrapper" id="crateClick">
        <div class="crate" id="crate">
            <div class="stripe horizontal"></div>
            <div class="stripe vertical"></div>
            <div class="stripe vertical2"></div>
            <div class="crate-label">TROPA</div>
        </div>
    </div>

    <!-- tropa actual (apertura) -->
    <div class="current-troop" id="currentTroop">
        HAZ CLICK EN LA CAJA
        <span class="troop-rarity" id="currentRarity"></span>
    </div>

    <!-- botón enorme -->
    <div class="open-btn">
        <button id="openBtn">ABRIR CAJA</button>
    </div>

    <!-- panel de oleadas -->
    <div class="wave-panel">
        <span>🌊 OLEADA <span id="waveNumber">0</span></span>
        <span>❤️ VIDAS <span id="lives">5</span></span>
        <span>💀 ENEMIGOS <span id="enemiesDefeated">0</span></span>
    </div>

    <!-- MAPA: 3 puestos de defensa -->
    <div class="map-title">🗺️ PUESTOS DE DEFENSA</div>
    <div class="defense-grid" id="defenseGrid">
        <!-- 3 puestos generados por JS -->
    </div>

    <!-- historial últimas tropas -->
    <div class="history-title">ÚLTIMAS TROPAS RECLUTADAS</div>
    <div class="history-list" id="historyList"></div>

    <footer>
        ⚡ cada 8 segundos oleada · consigue tropas para cubrir puestos ⚡
    </footer>
</div>

<script>
    (function() {
        // ---------- BASE DE DATOS DE TROPAS (misma rareza) ----------
        const troopsByRarity = [
            { rarity: "CONSCRIPT (GRIS)",   color: "#b0c3d9", weight: 50, items: ["Recluta", "Miliano", "Infante", "Soldado raso", "Centinela"] },
            { rarity: "REGULAR (AZUL CLARO)",color: "#5e98d9", weight: 20, items: ["Fusilero", "Granadero", "Ametrallador", "Explorador", "Sanitario"] },
            { rarity: "VETERANO (AZUL)",     color: "#4b69ff", weight: 15, items: ["Cabo", "Sargento", "Francotirador", "Bombardero", "Ingeniero"] },
            { rarity: "ÉLITE (PÚRPURA)",     color: "#8847ff", weight: 8,  items: ["Comando", "Boinas Verdes", "Paracaidista", "Fuerza Delta", "Lancero"] },
            { rarity: "HÉROE (ROSA)",        color: "#d32ce6", weight: 4,  items: ["Capitán", "Comandante", "Guerrillero", "Mercenario", "Justiciero"] },
            { rarity: "LEYENDA (ROJO)",      color: "#eb4b4b", weight: 2,  items: ["General", "Héroe", "Señor de la guerra", "Inmortal", "Cacique"] },
            { rarity: "MITO (ORO)",           color: "#ffd700", weight: 1,  items: ["Semidiós", "Emperador", "Elegido", "Fénix", "Titán"] }
        ];

        // Variables de juego
        let lives = 5;
        let wave = 0;
        let enemiesDefeated = 0;
        let gameActive = true;
        let waveInterval = null;

        // Puestos de defensa (array de 3 elementos, cada uno = tropa o null)
        let defensePosts = [null, null, null];

        // Historial últimos 5 reclutas
        let lastItems = [];

        // Elementos DOM
        const currentTroopDiv = document.getElementById('currentTroop');
        const currentRaritySpan = document.getElementById('currentRarity');
        const waveSpan = document.getElementById('waveNumber');
        const livesSpan = document.getElementById('lives');
        const enemiesSpan = document.getElementById('enemiesDefeated');
        const defenseGridDiv = document.getElementById('defenseGrid');
        const historyListDiv = document.getElementById('historyList');
        const openBtn = document.getElementById('openBtn');
        const crateClick = document.getElementById('crateClick');
        const crateElement = document.getElementById('crate');

        // Función para obtener tropa aleatoria
        function getRandomTroop() {
            const totalWeight = troopsByRarity.reduce((acc, curr) => acc + curr.weight, 0);
            let rand = Math.random() * totalWeight;
            for (let i = 0; i < troopsByRarity.length; i++) {
                const tier = troopsByRarity[i];
                if (rand < tier.weight) {
                    const randomIndex = Math.floor(Math.random() * tier.items.length);
                    return {
                        name: tier.items[randomIndex],
                        rarity: tier.rarity,
                        color: tier.color,
                        rarityIndex: i  // para comparar calidad (0 peor, 6 mejor)
                    };
                }
                rand -= tier.weight;
            }
            return { name: "Mercenario", rarity: "ÉLITE (PÚRPURA)", color: "#8847ff", rarityIndex: 3 };
        }

        // Colocar tropa en un puesto (mejora si es mejor que la existente o puesto vacío)
        function placeTroopInDefense(troop) {
            // Buscar primer puesto vacío
            let emptyIndex = defensePosts.findIndex(p => p === null);
            if (emptyIndex !== -1) {
                defensePosts[emptyIndex] = troop;
            } else {
                // Si no hay vacío, reemplazar la tropa de menor rareza (menor índice)
                let worstIndex = 0;
                for (let i = 1; i < defensePosts.length; i++) {
                    if (defensePosts[i].rarityIndex < defensePosts[worstIndex].rarityIndex) {
                        worstIndex = i;
                    }
                }
                // Si la nueva tropa es mejor (o igual) que la peor, reemplazar
                if (troop.rarityIndex >= defensePosts[worstIndex].rarityIndex) {
                    defensePosts[worstIndex] = troop;
                } // si no, no se coloca (se pierde)
            }
            renderDefense();
        }

        // Renderizar los puestos de defensa
        function renderDefense() {
            defenseGridDiv.innerHTML = '';
            defensePosts.forEach((troop, index) => {
                const post = document.createElement('div');
                post.className = 'defense-post';
                if (troop) {
                    post.style.backgroundColor = troop.color;
                    post.style.color = '#111';
                    post.style.textShadow = '1px 1px 0 rgba(255,255,255,0.5)';
                    const nameSpan = document.createElement('span');
                    nameSpan.className = 'name';
                    nameSpan.innerText = troop.name.length > 8 ? troop.name.substring(0,6)+'…' : troop.name;
                    const raritySpan = document.createElement('span');
                    raritySpan.className = 'rarity-tag';
                    raritySpan.innerText = troop.rarity.split(' ')[0];
                    raritySpan.style.background = 'rgba(0,0,0,0.7)';
                    raritySpan.style.color = 'white';
                    post.appendChild(nameSpan);
                    post.appendChild(raritySpan);
                } else {
                    post.innerHTML = '<span class="name">🛡️ VACÍO</span><span class="rarity-tag">—</span>';
                    post.style.background = '#3b552b';
                    post.style.color = '#aaa';
                }
                defenseGridDiv.appendChild(post);
            });
        }

        // Procesar una oleada: aparece un enemigo en puesto aleatorio
        function processWave() {
            if (!gameActive) return;
            wave++;
            waveSpan.innerText = wave;

            // Elige un puesto al azar (0,1,2)
            const attackPos = Math.floor(Math.random() * 3);
            if (defensePosts[attackPos] !== null) {
                // Hay tropa defendiendo: el enemigo muere, la tropa permanece
                enemiesDefeated++;
                enemiesSpan.innerText = enemiesDefeated;
            } else {
                // Puesto vacío: perdemos una vida
                lives--;
                livesSpan.innerText = lives;
                if (lives <= 0) {
                    lives = 0;
                    gameActive = false;
                    livesSpan.innerText = lives;
                    // Mostrar game over y detener interval
                    if (waveInterval) {
                        clearInterval(waveInterval);
                        waveInterval = null;
                    }
                    alert('¡GAME OVER! Has perdido todas tus vidas. Recarga la página para empezar de nuevo.');
                }
            }
        }

        // Iniciar oleadas automáticas (cada 8 segundos)
        function startWaves() {
            if (waveInterval) clearInterval(waveInterval);
            waveInterval = setInterval(() => {
                processWave();
            }, 8000); // 8 segundos
        }

        // Reiniciar juego (lo llamamos al cargar)
        function initGame() {
            lives = 5;
            wave = 0;
            enemiesDefeated = 0;
            gameActive = true;
            defensePosts = [null, null, null];
            lastItems = [];
            livesSpan.innerText = lives;
            waveSpan.innerText = wave;
            enemiesSpan.innerText = enemiesDefeated;
            renderDefense();
            renderHistory();
            startWaves();
        }

        // Actualizar historial
        function renderHistory() {
            historyListDiv.innerHTML = '';
            if (lastItems.length === 0) {
                const emptyMsg = document.createElement('div');
                emptyMsg.innerText = '⚡ NINGUNA ⚡';
                emptyMsg.style.background = '#5b4f3f';
                emptyMsg.style.padding = '16px';
                emptyMsg.style.borderRadius = '12px';
                emptyMsg.style.color = '#ddd';
                emptyMsg.style.width = '100%';
                emptyMsg.style.textAlign = 'center';
                historyListDiv.appendChild(emptyMsg);
                return;
            }

            lastItems.forEach(item => {
                const historyBox = document.createElement('div');
                historyBox.className = 'history-item';
                historyBox.style.backgroundColor = item.color;
                historyBox.style.color = '#111';
                historyBox.style.textShadow = '1px 1px 0 rgba(255,255,255,0.5)';
                historyBox.setAttribute('title', `${item.name} (${item.rarity})`);

                const nameSpan = document.createElement('span');
                nameSpan.style.fontWeight = 'bold';
                nameSpan.innerText = item.name.length > 14 ? item.name.substring(0,12)+'…' : item.name;

                const raritySpan = document.createElement('span');
                raritySpan.innerText = item.rarity.split(' ')[0];

                historyBox.appendChild(nameSpan);
                historyBox.appendChild(raritySpan);
                historyListDiv.appendChild(historyBox);
            });
        }

        // Abrir caja con animación
        function openCrate() {
            if (!gameActive) {
                alert('La partida ha terminado. Recarga para empezar de nuevo.');
                return;
            }

            crateElement.classList.add('shake');
            setTimeout(() => {
                crateElement.classList.remove('shake');
            }, 300);

            setTimeout(() => {
                const newTroop = getRandomTroop();

                // Mostrar en current
                currentTroopDiv.innerHTML = `${newTroop.name} <span class="troop-rarity" style="background: ${newTroop.color}; color: #111; text-shadow: 1px 1px 0 white;">${newTroop.rarity}</span>`;
                currentTroopDiv.style.backgroundColor = newTroop.color;
                currentTroopDiv.style.color = '#111';
                currentTroopDiv.style.textShadow = '2px 2px 0 rgba(255,255,255,0.5)';

                // Agregar a historial
                lastItems.unshift({ name: newTroop.name, rarity: newTroop.rarity, color: newTroop.color });
                if (lastItems.length > 5) lastItems.pop();
                renderHistory();

                // Colocar en defensa
                placeTroopInDefense(newTroop);
            }, 50);
        }

        // Eventos
        openBtn.addEventListener('click', openCrate);
        crateClick.addEventListener('click', openCrate);

        // Inicializar
        initGame();
    })();
</script>
</body>
</html>
