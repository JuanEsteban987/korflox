<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Noob Grid Combat · Estrategia por turnos</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: #1a2f2f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Courier New', monospace;
            margin: 0;
            padding: 16px;
        }
        .game-wrapper {
            background: #1e3b3b;
            border-radius: 32px;
            padding: 24px;
            border: 4px solid #4f7f7f;
            box-shadow: 0 10px 0 #0f2a2a;
        }
        canvas {
            display: block;
            margin: 0 auto;
            background: #2f4f4f;
            border-radius: 20px;
            box-shadow: inset 0 0 0 2px #6f9f9f;
            cursor: pointer;
        }
        .panel {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            background: #1f3f3f;
            margin-top: 20px;
            padding: 15px 20px;
            border-radius: 60px;
            border: 2px solid #5f9f9f;
            color: #c8ffff;
            font-weight: bold;
            font-size: 20px;
            gap: 15px;
        }
        .stats {
            display: flex;
            gap: 30px;
        }
        .stats span {
            background: #0f2f2f;
            padding: 6px 20px;
            border-radius: 40px;
            border: 2px solid #5fbfbf;
        }
        button {
            background: #6f9f9f;
            border: none;
            color: #1f3f3f;
            font-size: 22px;
            font-weight: bold;
            padding: 8px 30px;
            border-radius: 40px;
            border-bottom: 5px solid #2f6f6f;
            cursor: pointer;
            font-family: inherit;
            transition: 0.08s;
            box-shadow: 0 4px 0 #1f4f4f;
        }
        button:hover {
            background: #8fbfbf;
            border-bottom-width: 3px;
            transform: translateY(2px);
        }
        button:active {
            border-bottom-width: 1px;
            transform: translateY(4px);
        }
        .info {
            font-size: 18px;
            background: #1f3737;
            padding: 5px 20px;
            border-radius: 30px;
            border: 1px solid #5f9f9f;
        }
    </style>
</head>
<body>
<div class="game-wrapper">
    <canvas id="gridCanvas" width="600" height="600"></canvas>

    <div class="panel">
        <div class="stats">
            <span>💰 <span id="goldDisplay">200</span></span>
            <span>⚔️ <span id="turnDisplay">Jugador</span></span>
        </div>
        <div class="info">
            <span>🖱️ Clic en casilla vacía = comprar noob (50💰)</span>
        </div>
        <button id="endTurnBtn">🔁 Terminar turno</button>
    </div>
    <div style="display: flex; justify-content: center; margin-top: 16px;">
        <button id="restartBtn" style="background: #b36f6f; border-bottom-color: #6f3f3f;">💀 Reiniciar partida</button>
    </div>
</div>

<script>
    (function() {
        // ---------- Configuración del grid ----------
        const canvas = document.getElementById('gridCanvas');
        const ctx = canvas.getContext('2d');
        const goldSpan = document.getElementById('goldDisplay');
        const turnSpan = document.getElementById('turnDisplay');
        const endTurnBtn = document.getElementById('endTurnBtn');
        const restartBtn = document.getElementById('restartBtn');

        const GRID_SIZE = 8;            // 8x8 tablero
        const CELL_SIZE = canvas.width / GRID_SIZE; // 75px

        // Estados de casilla
        const TILE_EMPTY = 0;
        const TILE_PLAYER = 1;   // Noob aliado
        const TILE_ENEMY = 2;    // Enemigo rojo

        // Recursos y turno
        let gold = 200;
        let turn = 'player'; // 'player' o 'enemy'
        let gameOver = false;

        // Grid: matriz 8x8, cada celda es un objeto con tipo y salud (opcional)
        let grid = [];

        // Inicializar grid vacío
        function initGrid() {
            grid = [];
            for (let row = 0; row < GRID_SIZE; row++) {
                let rowArray = [];
                for (let col = 0; col < GRID_SIZE; col++) {
                    rowArray.push({
                        type: TILE_EMPTY,
                        hp: 0
                    });
                }
                grid.push(rowArray);
            }
        }

        // Colocar enemigos iniciales (por ejemplo algunos aleatorios)
        function spawnInitialEnemies() {
            for (let i = 0; i < 5; i++) {
                let row, col;
                do {
                    row = Math.floor(Math.random() * GRID_SIZE);
                    col = Math.floor(Math.random() * GRID_SIZE);
                } while (grid[row][col].type !== TILE_EMPTY || (row === 0 && col === 0)); // evitar spawn en (0,0) por cortesía
                grid[row][col].type = TILE_ENEMY;
                grid[row][col].hp = 100; // vida de enemigo
            }
        }

        // Reiniciar juego
        function restartGame() {
            gameOver = false;
            gold = 200;
            turn = 'player';
            initGrid();
            spawnInitialEnemies();
            // Colocar un noob inicial gratis para no empezar vacío
            grid[0][0].type = TILE_PLAYER;
            grid[0][0].hp = 100;
            updateDisplay();
            drawGrid();
        }

        // Actualizar UI
        function updateDisplay() {
            goldSpan.textContent = gold;
            turnSpan.textContent = turn === 'player' ? 'Jugador' : 'Enemigos';
        }

        // ---------- Lógica de compra/colocación (solo turno jugador) ----------
        function tryBuyNoob(row, col) {
            if (gameOver) return false;
            if (turn !== 'player') return false;
            if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) return false;
            if (grid[row][col].type !== TILE_EMPTY) return false;
            if (gold < 50) return false;

            // Comprar
            gold -= 50;
            grid[row][col].type = TILE_PLAYER;
            grid[row][col].hp = 100;
            updateDisplay();
            drawGrid();
            return true;
        }

        // ---------- Movimiento y ataque por turnos (muy simplificado) ----------
        // Para mantenerlo simple: cada unidad (jugador o enemigo) puede moverse 1 casilla (4 direcciones) y si hay enemigo adyacente, ataca.

        function processPlayerTurn() {
            // Nuevo grid después de acciones del jugador
            // Vamos a hacerlo por fases: primero todas las unidades aliadas se mueven/atacan
            // Decidimos un orden: por simplicidad, cada unidad que tenga un enemigo adyacente ataca (sin movimiento)
            // Si no hay enemigo adyacente, se mueve hacia el enemigo más cercano (movimiento básico)
            // Pero esto puede ser complejo. Para un grid pequeño, haré que el jugador controle el movimiento con clics (seleccionar unidad y luego destino)
            // Sin embargo el usuario pide "tropas que se puedan crear tropas y se muevan en cuadriculas", quizás espera control directo.
            // Cambio de enfoque: Haré que en el turno del jugador, puedas hacer clic en una unidad aliada y luego en una casilla vacía adyacente para moverla.
            // Y si haces clic en una unidad enemiga adyacente, atacas.
            // Pero eso requiere selección. Voy a implementar un sistema de selección simple.

            // Para no complicar demasiado, haré que el jugador pueda:
            // - Comprar (clic en vacío) ya implementado
            // - Para atacar/mover: clic en unidad aliada (la selecciona) y luego clic en destino (vacío o enemigo adyacente)
            // Implementaré selección.

            // Pero como el usuario solo pidió "tropas que se muevan en cuadrículas", podría ser automático.
            // Me decidiré por un sistema automático para mantener el juego jugable: las unidades aliadas atacan automáticamente a enemigos adyacentes, si no, se mueven aleatoriamente? No es muy estratégico.

            // Mejor: turno por turnos con control directo mediante clics (seleccionar y mover/atacar). Eso da más sensación de juego de estrategia.
            // Voy a implementar selección.
        }

        // Implementaré selección de unidad
        let selectedRow = -1, selectedCol = -1; // -1 significa nada seleccionado

        // Detectar clic en el canvas
        canvas.addEventListener('click', (e) => {
            if (gameOver) return;

            const rect = canvas.getBoundingClientRect();
            const scaleX = canvas.width / rect.width;
            const scaleY = canvas.height / rect.height;
            const mouseX = (e.clientX - rect.left) * scaleX;
            const mouseY = (e.clientY - rect.top) * scaleY;
            const col = Math.floor(mouseX / CELL_SIZE);
            const row = Math.floor(mouseY / CELL_SIZE);
            if (row < 0 || row >= GRID_SIZE || col < 0 || col >= GRID_SIZE) return;

            // Si es turno del jugador
            if (turn === 'player' && !gameOver) {
                handlePlayerClick(row, col);
            }
            // Nota: en turno enemigo no se permite interacción (excepto compra? no, solo ver)
            drawGrid();
        });

        function handlePlayerClick(row, col) {
            const cell = grid[row][col];

            // Opción 1: Si no hay nada seleccionado
            if (selectedRow === -1) {
                // Si clic en unidad aliada, seleccionarla
                if (cell.type === TILE_PLAYER) {
                    selectedRow = row;
                    selectedCol = col;
                }
                // Si clic en casilla vacía, intentar comprar
                else if (cell.type === TILE_EMPTY) {
                    tryBuyNoob(row, col);
                }
                // Si clic en enemigo, no pasa nada (primero hay que seleccionar aliado)
            } else {
                // Ya hay una unidad seleccionada
                // Comprobar que la unidad seleccionada sigue siendo aliada y existe
                if (grid[selectedRow][selectedCol].type !== TILE_PLAYER) {
                    // Unidad desapareció? cancelar selección
                    selectedRow = -1;
                    selectedCol = -1;
                    return;
                }

                // Mismo clic en la misma unidad: cancelar selección
                if (selectedRow === row && selectedCol === col) {
                    selectedRow = -1;
                    selectedCol = -1;
                    return;
                }

                // Verificar si el destino es adyacente (incluyendo diagonal? No, solo ortogonal para simplificar)
                const dr = Math.abs(row - selectedRow);
                const dc = Math.abs(col - selectedCol);
                const isAdjacent = (dr === 1 && dc === 0) || (dr === 0 && dc === 1);

                if (!isAdjacent) {
                    // No adyacente, no se puede mover/atacar, además se cancela selección (opcional)
                    selectedRow = -1;
                    selectedCol = -1;
                    return;
                }

                // Ahora según el destino
                if (grid[row][col].type === TILE_EMPTY) {
                    // Movimiento: mover la unidad
                    grid[row][col].type = TILE_PLAYER;
                    grid[row][col].hp = grid[selectedRow][selectedCol].hp; // transferir vida
                    grid[selectedRow][selectedCol].type = TILE_EMPTY;
                    grid[selectedRow][selectedCol].hp = 0;
                    selectedRow = -1; // Deseleccionar
                }
                else if (grid[row][col].type === TILE_ENEMY) {
                    // Ataque: la unidad aliada ataca al enemigo
                    // Daño fijo: 30
                    grid[row][col].hp -= 30;
                    if (grid[row][col].hp <= 0) {
                        grid[row][col].type = TILE_EMPTY;
                        grid[row][col].hp = 0;
                        // Podría ganar oro por matar? Sí
                        gold += 25;
                    }
                    // La unidad aliada no se mueve (se queda en su sitio)
                    selectedRow = -1; // Deseleccionar
                }
                else if (grid[row][col].type === TILE_PLAYER) {
                    // Si es otro aliado, cambiar selección a ese
                    selectedRow = row;
                    selectedCol = col;
                }

                updateDisplay();
            }
        }

        // Turno de los enemigos (automático)
        function processEnemyTurn() {
            if (gameOver) return;

            // Los enemigos atacan si están adyacentes a un jugador, si no, se mueven hacia el jugador más cercano (movimiento simple)
            // Haremos una copia de acciones para no interferir
            let actions = [];

            // Primero, decidir acciones: cada enemigo puede atacar o moverse
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c].type === TILE_ENEMY) {
                        // Buscar jugadores adyacentes (ortogonal)
                        let attacked = false;
                        const directions = [[-1,0],[1,0],[0,-1],[0,1]];
                        for (let [dr, dc] of directions) {
                            const nr = r + dr, nc = c + dc;
                            if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE) {
                                if (grid[nr][nc].type === TILE_PLAYER) {
                                    // Atacar
                                    actions.push({
                                        type: 'attack',
                                        enemyRow: r, enemyCol: c,
                                        targetRow: nr, targetCol: nc
                                    });
                                    attacked = true;
                                    break;
                                }
                            }
                        }
                        if (!attacked) {
                            // Moverse hacia algún jugador (heurística simple: buscar la dirección que reduce distancia a cualquier jugador)
                            // Encontrar el jugador más cercano (distancia Manhattan)
                            let closestDist = Infinity;
                            let targetR = -1, targetC = -1;
                            for (let pr = 0; pr < GRID_SIZE; pr++) {
                                for (let pc = 0; pc < GRID_SIZE; pc++) {
                                    if (grid[pr][pc].type === TILE_PLAYER) {
                                        const dist = Math.abs(pr - r) + Math.abs(pc - c);
                                        if (dist < closestDist) {
                                            closestDist = dist;
                                            targetR = pr;
                                            targetC = pc;
                                        }
                                    }
                                }
                            }
                            if (targetR !== -1) {
                                // Determinar mejor movimiento (reducir distancia)
                                let bestDir = null;
                                let bestDist = closestDist;
                                for (let [dr, dc] of directions) {
                                    const nr = r + dr, nc = c + dc;
                                    if (nr >= 0 && nr < GRID_SIZE && nc >= 0 && nc < GRID_SIZE && grid[nr][nc].type === TILE_EMPTY) {
                                        const newDist = Math.abs(targetR - nr) + Math.abs(targetC - nc);
                                        if (newDist < bestDist) {
                                            bestDist = newDist;
                                            bestDir = [dr, dc];
                                        }
                                    }
                                }
                                if (bestDir) {
                                    actions.push({
                                        type: 'move',
                                        enemyRow: r, enemyCol: c,
                                        newRow: r + bestDir[0], newCol: c + bestDir[1]
                                    });
                                }
                            }
                        }
                    }
                }
            }

            // Aplicar acciones (sin conflictos, por simplicidad asumimos que no se pisan porque es turno enemigo y solo ellos se mueven)
            // Pero podría haber dos enemigos queriendo moverse a la misma casilla. Lo resolvemos con orden: primero ataques, luego movimientos, y si colisión de movimiento, el primero que llegue (por orden de recorrido)
            let newGrid = JSON.parse(JSON.stringify(grid)); // copia

            // Aplicar ataques (daño)
            for (let action of actions) {
                if (action.type === 'attack') {
                    const { targetRow, targetCol } = action;
                    if (newGrid[targetRow][targetCol].type === TILE_PLAYER) {
                        newGrid[targetRow][targetCol].hp -= 35; // daño enemigo
                        if (newGrid[targetRow][targetCol].hp <= 0) {
                            newGrid[targetRow][targetCol].type = TILE_EMPTY;
                            newGrid[targetRow][targetCol].hp = 0;
                        }
                    }
                }
            }

            // Aplicar movimientos (solo si la casilla destino sigue vacía en newGrid)
            for (let action of actions) {
                if (action.type === 'move') {
                    const { enemyRow, enemyCol, newRow, newCol } = action;
                    // Comprobar que la celda de origen sigue siendo enemiga (no fue eliminada por ataque de otro enemigo? improbable)
                    if (newGrid[enemyRow][enemyCol].type === TILE_ENEMY && newGrid[newRow][newCol].type === TILE_EMPTY) {
                        newGrid[newRow][newCol].type = TILE_ENEMY;
                        newGrid[newRow][newCol].hp = newGrid[enemyRow][enemyCol].hp; // transferir vida
                        newGrid[enemyRow][enemyCol].type = TILE_EMPTY;
                        newGrid[enemyRow][enemyCol].hp = 0;
                    }
                }
            }

            grid = newGrid;

            // Comprobar si algún jugador sobrevive
            let playerAlive = false;
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    if (grid[r][c].type === TILE_PLAYER) {
                        playerAlive = true;
                        break;
                    }
                }
            }
            if (!playerAlive) {
                gameOver = true;
                turn = 'gameover';
            }
        }

        // Terminar turno actual
        function endTurn() {
            if (gameOver) return;

            if (turn === 'player') {
                // Cambiar a turno enemigo, procesar enemigos, luego volver a jugador
                turn = 'enemy';
                updateDisplay();
                drawGrid();

                // Pequeño retraso para que se vea el cambio (opcional)
                setTimeout(() => {
                    if (!gameOver) {
                        processEnemyTurn();
                        turn = 'player';
                        // Deseleccionar cualquier unidad
                        selectedRow = -1;
                        selectedCol = -1;
                        updateDisplay();
                        drawGrid();

                        // Comprobar game over después del turno enemigo
                        let playerExists = false;
                        for (let r = 0; r < GRID_SIZE; r++) {
                            for (let c = 0; c < GRID_SIZE; c++) {
                                if (grid[r][c].type === TILE_PLAYER) {
                                    playerExists = true;
                                    break;
                                }
                            }
                        }
                        if (!playerExists) {
                            gameOver = true;
                            turn = 'gameover';
                            drawGrid();
                        }
                    }
                }, 200);
            }
            // Si turno enemigo, no se debería llamar
        }

        endTurnBtn.addEventListener('click', endTurn);
        restartBtn.addEventListener('click', () => {
            restartGame();
            selectedRow = -1;
            selectedCol = -1;
            drawGrid();
        });

        // ---------- Dibujar grid y unidades ----------
        function drawGrid() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            // Dibujar líneas de cuadrícula
            ctx.strokeStyle = '#5f9f9f';
            ctx.lineWidth = 2;
            for (let i = 0; i <= GRID_SIZE; i++) {
                ctx.beginPath();
                ctx.strokeStyle = '#5f9f9f';
                ctx.lineWidth = 1.5;
                ctx.moveTo(i * CELL_SIZE, 0);
                ctx.lineTo(i * CELL_SIZE, canvas.height);
                ctx.stroke();
                ctx.moveTo(0, i * CELL_SIZE);
                ctx.lineTo(canvas.width, i * CELL_SIZE);
                ctx.stroke();
            }

            // Dibujar celdas
            for (let r = 0; r < GRID_SIZE; r++) {
                for (let c = 0; c < GRID_SIZE; c++) {
                    const x = c * CELL_SIZE;
                    const y = r * CELL_SIZE;
                    const cell = grid[r][c];

                    // Resaltar selección
                    if (selectedRow === r && selectedCol === c) {
                        ctx.fillStyle = '#cfffff';
                        ctx.globalAlpha = 0.3;
                        ctx.fillRect(x+2, y+2, CELL_SIZE-4, CELL_SIZE-4);
                        ctx.globalAlpha = 1;
                    }

                    if (cell.type === TILE_PLAYER) {
                        // Noob aliado
                        ctx.shadowColor = '#f5d742';
                        ctx.shadowBlur = 12;
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, CELL_SIZE*0.3, 0, 2*Math.PI);
                        ctx.fillStyle = '#f5d742';
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // Ojos
                        ctx.fillStyle = '#000';
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.35, y + CELL_SIZE*0.4, 5, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.65, y + CELL_SIZE*0.4, 5, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.32, y + CELL_SIZE*0.37, 2, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.62, y + CELL_SIZE*0.37, 2, 0, 2*Math.PI);
                        ctx.fill();
                        // HP bar
                        ctx.fillStyle = '#2fbf2f';
                        ctx.fillRect(x+10, y+CELL_SIZE-15, (cell.hp/100)* (CELL_SIZE-20), 6);
                    }
                    else if (cell.type === TILE_ENEMY) {
                        ctx.shadowColor = '#e33f3f';
                        ctx.shadowBlur = 12;
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE/2, y + CELL_SIZE/2, CELL_SIZE*0.3, 0, 2*Math.PI);
                        ctx.fillStyle = '#e33f3f';
                        ctx.fill();
                        ctx.shadowBlur = 0;
                        // Ojos malvados
                        ctx.fillStyle = '#000';
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.35, y + CELL_SIZE*0.4, 5, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.65, y + CELL_SIZE*0.4, 5, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.fillStyle = '#fff';
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.32, y + CELL_SIZE*0.37, 2, 0, 2*Math.PI);
                        ctx.fill();
                        ctx.beginPath();
                        ctx.arc(x + CELL_SIZE*0.62, y + CELL_SIZE*0.37, 2, 0, 2*Math.PI);
                        ctx.fill();
                        // HP bar
                        ctx.fillStyle = '#bf2f2f';
                        ctx.fillRect(x+10, y+CELL_SIZE-15, (cell.hp/100)* (CELL_SIZE-20), 6);
                    }
                }
            }

            // Si game over, overlay
            if (gameOver) {
                ctx.fillStyle = 'rgba(0,0,0,0.6)';
                ctx.fillRect(0, 0, canvas.width, canvas.height);
                ctx.font = 'bold 48px "Courier New"';
                ctx.fillStyle = '#ffd966';
                ctx.shadowColor = '#a00';
                ctx.shadowBlur = 10;
                ctx.fillText('GAME OVER', 100, 300);
            }
        }

        // Inicializar
        restartGame();
        drawGrid();

        // Bucle opcional de redibujo
        function loop() {
            drawGrid();
            requestAnimationFrame(loop);
        }
        loop();
    })();
</script>
</body>
</html>
