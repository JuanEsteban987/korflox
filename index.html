<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BATTLE SIMULATOR 2008 · TERRENO + ESTÉTICA BÁSICA</title>
    <style>
        body {
            margin: 0;
            overflow: hidden;
            font-family: 'Courier New', monospace;
            background-color: #000;
            color: #0f0;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 10px;
            background: #000;
            padding: 5px 10px;
            border: 2px solid #0f0;
            z-index: 100;
            font-size: 16px;
            text-shadow: 0 0 5px #0f0;
        }
        #contador {
            position: absolute;
            top: 50px;
            left: 10px;
            background: #000;
            padding: 5px 10px;
            border: 2px solid #0ff;
            color: #0ff;
            z-index: 100;
            font-size: 14px;
        }
        #panel-herramientas {
            position: absolute;
            bottom: 150px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 3px solid #ffaa00;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            z-index: 200;
            box-shadow: 0 0 20px #ffaa00;
        }
        .modo-btn {
            background: #000;
            border: 2px solid #0ff;
            color: #0ff;
            font-size: 20px;
            padding: 8px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
            box-shadow: 0 0 10px #0ff;
        }
        .modo-btn.activo {
            background: #0ff;
            color: #000;
            border-color: #000;
        }
        #panel-colocacion {
            position: absolute;
            bottom: 80px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 3px solid #ffaa00;
            padding: 10px 20px;
            display: flex;
            gap: 20px;
            z-index: 200;
            box-shadow: 0 0 20px #ffaa00;
        }
        .boton-bando {
            background: #000;
            border: 2px solid;
            font-size: 20px;
            padding: 8px 20px;
            cursor: pointer;
            text-transform: uppercase;
            font-family: 'Courier New', monospace;
        }
        #btnRojo {
            border-color: #f33;
            color: #f33;
            box-shadow: 0 0 10px #f33;
        }
        #btnRojo.activo {
            background: #f33;
            color: #000;
        }
        #btnAzul {
            border-color: #36f;
            color: #36f;
            box-shadow: 0 0 10px #36f;
        }
        #btnAzul.activo {
            background: #36f;
            color: #000;
        }
        #btnIniciar {
            background: #000;
            border: 3px solid #0f0;
            color: #0f0;
            font-size: 24px;
            padding: 8px 30px;
            cursor: pointer;
            box-shadow: 0 0 20px #0f0;
            font-family: 'Courier New', monospace;
        }
        #btnIniciar:disabled {
            opacity: 0.3;
            pointer-events: none;
        }
        #btnReiniciar {
            position: absolute;
            bottom: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #000;
            border: 3px solid #f0f;
            color: #f0f;
            font-size: 18px;
            padding: 8px 30px;
            cursor: pointer;
            box-shadow: 0 0 20px #f0f;
            z-index: 200;
        }
        #custom-panel {
            position: absolute;
            top: 100px;
            left: 20px;
            background: #000;
            border: 3px solid #ffaa00;
            padding: 10px;
            width: 220px;
            color: #ffaa00;
            box-shadow: 0 0 20px #ffaa00;
            z-index: 150;
            font-size: 14px;
        }
        .custom-row {
            margin-bottom: 10px;
        }
        .color-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
        }
        .color-btn {
            width: 30px;
            height: 30px;
            border: 2px solid #fff;
            cursor: pointer;
        }
        .color-btn.selected {
            border-color: #ff0;
            transform: scale(1.1);
        }
        .shape-buttons {
            display: flex;
            gap: 5px;
        }
        .shape-btn {
            background: #000;
            border: 2px solid #0ff;
            color: #0ff;
            font-size: 16px;
            padding: 5px;
            cursor: pointer;
            flex: 1;
        }
        .shape-btn.selected {
            background: #0ff;
            color: #000;
        }
        .slider-container {
            display: flex;
            align-items: center;
            gap: 5px;
        }
        .slider-container input {
            flex: 1;
            cursor: pointer;
        }
        .slider-container span {
            min-width: 40px;
            text-align: right;
        }
        .instruccion {
            position: absolute;
            top: 100px;
            right: 20px;
            background: #000;
            border: 2px solid #ff0;
            color: #ff0;
            padding: 8px;
            max-width: 200px;
            text-align: center;
            box-shadow: 0 0 15px #ff0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div id="info">⚡ BATTLE 2008 · TERRENO ⚡</div>
    <div id="contador">ROJO: <span id="rojo-count">0</span> | AZUL: <span id="azul-count">0</span></div>
    
    <!-- Panel de personalización de tropas (básico) -->
    <div id="custom-panel">
        <h3 style="margin:0 0 10px; text-align:center;">🎨 TROPAS</h3>
        <div class="custom-row">
            <span>COLOR</span>
            <div class="color-buttons">
                <div class="color-btn" style="background:#f33;" data-color="#f33" data-name="rojo"></div>
                <div class="color-btn" style="background:#36f;" data-color="#36f" data-name="azul"></div>
                <div class="color-btn" style="background:#3f3;" data-color="#3f3" data-name="verde"></div>
                <div class="color-btn" style="background:#ff3;" data-color="#ff3" data-name="amarillo"></div>
                <div class="color-btn" style="background:#f3f;" data-color="#f3f" data-name="morado"></div>
                <div class="color-btn" style="background:#f80;" data-color="#f80" data-name="naranja"></div>
            </div>
        </div>
        <div class="custom-row">
            <span>FORMA CABEZA</span>
            <div class="shape-buttons">
                <button class="shape-btn" data-shape="sphere">⚪</button>
                <button class="shape-btn" data-shape="cube">⬛</button>
                <button class="shape-btn" data-shape="pyramid">🔺</button>
            </div>
        </div>
        <div class="custom-row">
            <span>VELOCIDAD <span id="speed-val">0.06</span></span>
            <div class="slider-container">
                <input type="range" id="speed-slider" min="0.02" max="0.15" step="0.01" value="0.06">
            </div>
        </div>
        <div class="custom-row">
            <span>TAMAÑO <span id="size-val">1.0</span></span>
            <div class="slider-container">
                <input type="range" id="size-slider" min="0.6" max="1.8" step="0.1" value="1.0">
            </div>
        </div>
    </div>

    <div class="instruccion">
        🖱️ MODO TROPAS: clic para colocar unidad<br>
        🧱 MODO TERRENO: clic para colocar obstáculo<br>
        (clic derecho elimina obstáculo)
    </div>

    <!-- Panel de selección de modo (tropas/terreno) -->
    <div id="panel-herramientas">
        <button class="modo-btn activo" id="modoTropas">⚔️ TROPAS</button>
        <button class="modo-btn" id="modoTerreno">🧱 TERRENO</button>
    </div>

    <!-- Panel de colocación de tropas y control -->
    <div id="panel-colocacion">
        <button class="boton-bando activo" id="btnRojo">🔥 ROJO</button>
        <button class="boton-bando" id="btnAzul">💧 AZUL</button>
        <button id="btnIniciar">⚔️ INICIAR</button>
    </div>
    <button id="btnReiniciar">🔄 REINICIAR</button>

    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'https://unpkg.com/three@0.128.0/examples/jsm/controls/OrbitControls.js';

        // --- CONFIGURACIÓN ---
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a2a);
        
        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(15, 12, 20);
        camera.lookAt(0, 2, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: false });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxPolarAngle = Math.PI / 2.3;
        controls.target.set(0, 2, 0);

        // --- LUCES ---
        const ambientLight = new THREE.AmbientLight(0x404060);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1);
        dirLight.position.set(5, 15, 10);
        dirLight.castShadow = true;
        dirLight.receiveShadow = true;
        dirLight.shadow.mapSize.width = 1024;
        dirLight.shadow.mapSize.height = 1024;
        dirLight.shadow.camera.left = -15;
        dirLight.shadow.camera.right = 15;
        dirLight.shadow.camera.top = 15;
        dirLight.shadow.camera.bottom = -15;
        dirLight.shadow.camera.near = 1;
        dirLight.shadow.camera.far = 30;
        scene.add(dirLight);

        // Luces de colores
        const lightRed = new THREE.PointLight(0xff3333, 0.6, 30);
        lightRed.position.set(-8, 5, 5);
        scene.add(lightRed);
        
        const lightBlue = new THREE.PointLight(0x3333ff, 0.6, 30);
        lightBlue.position.set(8, 5, -5);
        scene.add(lightBlue);

        // --- SUELO ---
        const groundGeo = new THREE.PlaneGeometry(30, 30);
        const groundMat = new THREE.MeshStandardMaterial({ color: 0x224422 });
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.position.y = 0;
        ground.receiveShadow = true;
        scene.add(ground);

        const gridHelper = new THREE.GridHelper(30, 20, 0xff00ff, 0x00ffff);
        gridHelper.position.y = 0.01;
        scene.add(gridHelper);

        // Estrellas de fondo
        for (let i = 0; i < 30; i++) {
            const starMat = new THREE.MeshStandardMaterial({ color: Math.random() * 0xffffff, emissive: 0x222222 });
            const starGeo = new THREE.BoxGeometry(0.2, 0.2, 0.2);
            const star = new THREE.Mesh(starGeo, starMat);
            star.position.set((Math.random() - 0.5) * 50, Math.random() * 15 + 5, (Math.random() - 0.5) * 50);
            star.castShadow = true;
            scene.add(star);
        }

        // --- ESTADO GLOBAL ---
        let armyRed = [];
        let armyBlue = [];
        let obstacles = []; // { mesh, pos }
        let jumpingUnits = [];
        let batallaIniciada = false;
        let modoActual = 'tropas'; // 'tropas' o 'terreno'
        let bandoSeleccionado = 'rojo';

        // Personalización
        const customState = {
            color: '#f33',
            shape: 'sphere',
            speed: 0.06,
            size: 1.0
        };

        // --- INTERFAZ ---
        const btnRojo = document.getElementById('btnRojo');
        const btnAzul = document.getElementById('btnAzul');
        const btnIniciar = document.getElementById('btnIniciar');
        const btnReiniciar = document.getElementById('btnReiniciar');
        const modoTropas = document.getElementById('modoTropas');
        const modoTerreno = document.getElementById('modoTerreno');

        btnRojo.classList.add('activo');

        btnRojo.addEventListener('click', () => {
            bandoSeleccionado = 'rojo';
            btnRojo.classList.add('activo');
            btnAzul.classList.remove('activo');
        });

        btnAzul.addEventListener('click', () => {
            bandoSeleccionado = 'azul';
            btnAzul.classList.add('activo');
            btnRojo.classList.remove('activo');
        });

        modoTropas.addEventListener('click', () => {
            modoActual = 'tropas';
            modoTropas.classList.add('activo');
            modoTerreno.classList.remove('activo');
        });

        modoTerreno.addEventListener('click', () => {
            modoActual = 'terreno';
            modoTerreno.classList.add('activo');
            modoTropas.classList.remove('activo');
        });

        // Personalización UI
        document.querySelectorAll('.color-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.color-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                customState.color = btn.dataset.color;
            });
        });
        document.querySelector('.color-btn[data-color="#f33"]').classList.add('selected');

        document.querySelectorAll('.shape-btn').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.shape-btn').forEach(b => b.classList.remove('selected'));
                btn.classList.add('selected');
                customState.shape = btn.dataset.shape;
            });
        });
        document.querySelector('.shape-btn[data-shape="sphere"]').classList.add('selected');

        const speedSlider = document.getElementById('speed-slider');
        const speedSpan = document.getElementById('speed-val');
        speedSlider.addEventListener('input', (e) => {
            customState.speed = parseFloat(e.target.value);
            speedSpan.textContent = customState.speed.toFixed(2);
        });

        const sizeSlider = document.getElementById('size-slider');
        const sizeSpan = document.getElementById('size-val');
        sizeSlider.addEventListener('input', (e) => {
            customState.size = parseFloat(e.target.value);
            sizeSpan.textContent = customState.size.toFixed(1);
        });

        // --- FUNCIONES DE CREACIÓN ---
        function crearUnidad(equipo) {
            const group = new THREE.Group();
            const colorHex = parseInt(customState.color.slice(1), 16);
            
            const bodyGeo = new THREE.CylinderGeometry(0.5 * customState.size, 0.5 * customState.size, 1.2 * customState.size, 8);
            const bodyMat = new THREE.MeshStandardMaterial({ color: colorHex, emissive: 0x222222 });
            const body = new THREE.Mesh(bodyGeo, bodyMat);
            body.position.y = 0.6 * customState.size;
            body.castShadow = true;
            body.receiveShadow = true;
            group.add(body);
            
            let headGeo;
            if (customState.shape === 'sphere') {
                headGeo = new THREE.SphereGeometry(0.4 * customState.size, 6, 4);
            } else if (customState.shape === 'cube') {
                headGeo = new THREE.BoxGeometry(0.7 * customState.size, 0.7 * customState.size, 0.7 * customState.size);
            } else if (customState.shape === 'pyramid') {
                headGeo = new THREE.ConeGeometry(0.5 * customState.size, 0.8 * customState.size, 4);
            }
            const headMat = new THREE.MeshStandardMaterial({ color: 0xffcc88, emissive: 0x332200 });
            const head = new THREE.Mesh(headGeo, headMat);
            head.position.y = 1.4 * customState.size;
            head.castShadow = true;
            head.receiveShadow = true;
            group.add(head);
            
            const eyeGeo = new THREE.SphereGeometry(0.1 * customState.size, 4);
            const eyeMat = new THREE.MeshStandardMaterial({ color: 0x000000 });
            const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
            eyeL.position.set(-0.2 * customState.size, 1.5 * customState.size, 0.4 * customState.size);
            group.add(eyeL);
            const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
            eyeR.position.set(0.2 * customState.size, 1.5 * customState.size, 0.4 * customState.size);
            group.add(eyeR);
            
            return group;
        }

        function crearObstaculo(posicion) {
            const size = 0.8;
            const geo = new THREE.BoxGeometry(size, size, size);
            const mat = new THREE.MeshStandardMaterial({ color: 0x888888, emissive: 0x111111 });
            const cube = new THREE.Mesh(geo, mat);
            cube.position.copy(posicion);
            cube.position.y = size/2;
            cube.castShadow = true;
            cube.receiveShadow = true;
            scene.add(cube);
            
            // Borde neón
            const edges = new THREE.EdgesGeometry(geo);
            const line = new THREE.LineSegments(edges, new THREE.LineBasicMaterial({ color: 0x00ffff }));
            line.position.copy(cube.position);
            scene.add(line);
            
            obstacles.push({ mesh: cube, line: line, pos: posicion.clone() });
        }

        // --- CLIC PARA COLOCAR ---
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        function onMouseClick(event) {
            if (batallaIniciada) return;

            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, target)) {
                if (Math.abs(target.x) > 14 || Math.abs(target.z) > 14) return;

                if (modoActual === 'tropas') {
                    // Colocar unidad
                    if (bandoSeleccionado === 'rojo' && armyRed.length >= 15) {
                        alert('Máximo 15 rojas');
                        return;
                    }
                    if (bandoSeleccionado === 'azul' && armyBlue.length >= 15) {
                        alert('Máximo 15 azules');
                        return;
                    }
                    const unidad = crearUnidad(bandoSeleccionado);
                    unidad.position.copy(target);
                    unidad.position.y = 0;
                    unidad.rotation.y = Math.random() * Math.PI * 2;
                    scene.add(unidad);
                    
                    const data = { mesh: unidad, health: 1, speed: customState.speed, team: bandoSeleccionado };
                    if (bandoSeleccionado === 'rojo') armyRed.push(data);
                    else armyBlue.push(data);
                    
                } else if (modoActual === 'terreno') {
                    // Colocar obstáculo (evitar solapamiento simple)
                    const existe = obstacles.some(obs => obs.pos.distanceTo(target) < 1.0);
                    if (!existe) {
                        crearObstaculo(target);
                    }
                }
                actualizarContador();
            }
        }

        // Eliminar obstáculo con clic derecho
        function onRightClick(event) {
            event.preventDefault();
            if (batallaIniciada) return;
            
            mouse.x = (event.clientX / renderer.domElement.clientWidth) * 2 - 1;
            mouse.y = -(event.clientY / renderer.domElement.clientHeight) * 2 + 1;
            raycaster.setFromCamera(mouse, camera);
            
            const plane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
            const target = new THREE.Vector3();
            if (raycaster.ray.intersectPlane(plane, target)) {
                // Buscar obstáculo cercano
                for (let i = obstacles.length - 1; i >= 0; i--) {
                    if (obstacles[i].pos.distanceTo(target) < 1.0) {
                        scene.remove(obstacles[i].mesh);
                        scene.remove(obstacles[i].line);
                        obstacles.splice(i, 1);
                        break;
                    }
                }
            }
        }

        renderer.domElement.addEventListener('click', onMouseClick);
        renderer.domElement.addEventListener('contextmenu', onRightClick);

        function actualizarContador() {
            document.getElementById('rojo-count').innerText = armyRed.length;
            document.getElementById('azul-count').innerText = armyBlue.length;
        }

        // --- INICIAR / REINICIAR ---
        btnIniciar.addEventListener('click', () => {
            if (armyRed.length === 0 || armyBlue.length === 0) {
                alert('Ambos bandos deben tener tropas');
                return;
            }
            batallaIniciada = true;
            btnIniciar.disabled = true;
            document.getElementById('info').innerHTML = '⚡ BATALLA EN CURSO ⚡';
        });

        btnReiniciar.addEventListener('click', () => {
            // Limpiar todo
            armyRed.forEach(u => scene.remove(u.mesh));
            armyBlue.forEach(u => scene.remove(u.mesh));
            jumpingUnits.forEach(u => scene.remove(u.mesh));
            obstacles.forEach(o => {
                scene.remove(o.mesh);
                scene.remove(o.line);
            });
            armyRed = [];
            armyBlue = [];
            jumpingUnits = [];
            obstacles = [];
            
            batallaIniciada = false;
            btnIniciar.disabled = false;
            document.getElementById('info').innerHTML = '⚡ BATTLE 2008 · TERRENO ⚡';
            actualizarContador();
        });

        // --- IA Y MOVIMIENTO (con detección de obstáculos) ---
        function findNearestEnemy(unit, enemyArray) {
            let nearest = null;
            let minDist = Infinity;
            for (let other of enemyArray) {
                const dist = unit.mesh.position.distanceTo(other.mesh.position);
                if (dist < minDist) {
                    minDist = dist;
                    nearest = other;
                }
            }
            return nearest;
        }

        function hayObstaculoEn(pos) {
            for (let obs of obstacles) {
                if (obs.mesh.position.distanceTo(pos) < 0.9) return true;
            }
            return false;
        }

        function moverUnidad(unit, direccion, velocidad) {
            const nuevaPos = unit.mesh.position.clone().add(direccion.multiplyScalar(velocidad));
            if (!hayObstaculoEn(nuevaPos)) {
                unit.mesh.position.copy(nuevaPos);
                return true;
            }
            return false;
        }

        function updateBatalla() {
            if (!batallaIniciada) return;

            // Mover rojos hacia azul más cercano
            for (let red of armyRed) {
                const target = findNearestEnemy(red, armyBlue);
                if (target) {
                    const dir = new THREE.Vector3().subVectors(target.mesh.position, red.mesh.position);
                    const dist = dir.length();
                    if (dist > 0.5) {
                        dir.normalize();
                        moverUnidad(red, dir, red.speed);
                        red.mesh.rotation.y = Math.atan2(dir.x, dir.z);
                    }
                }
            }

            for (let blue of armyBlue) {
                const target = findNearestEnemy(blue, armyRed);
                if (target) {
                    const dir = new THREE.Vector3().subVectors(target.mesh.position, blue.mesh.position);
                    const dist = dir.length();
                    if (dist > 0.5) {
                        dir.normalize();
                        moverUnidad(blue, dir, blue.speed);
                        blue.mesh.rotation.y = Math.atan2(dir.x, dir.z);
                    }
                }
            }

            // Colisiones y saltos
            for (let i = armyRed.length - 1; i >= 0; i--) {
                const red = armyRed[i];
                for (let j = armyBlue.length - 1; j >= 0; j--) {
                    const blue = armyBlue[j];
                    if (red.mesh.position.distanceTo(blue.mesh.position) < 1.5) {
                        // Iniciar salto
                        iniciarSalto(red, blue);
                        armyRed.splice(i, 1);
                        armyBlue.splice(j, 1);
                        break;
                    }
                }
            }
        }

        function iniciarSalto(u1, u2) {
            [u1, u2].forEach(u => {
                jumpingUnits.push({
                    mesh: u.mesh,
                    vy: 0.2,
                    life: 20
                });
            });
        }

        function updateJumping() {
            for (let i = jumpingUnits.length - 1; i >= 0; i--) {
                const j = jumpingUnits[i];
                j.vy -= 0.015;
                j.mesh.position.y += j.vy;
                j.life--;
                if (j.life <= 0 || j.mesh.position.y < 0) {
                    scene.remove(j.mesh);
                    jumpingUnits.splice(i, 1);
                }
            }
        }

        // --- ANIMACIÓN ---
        function animate() {
            requestAnimationFrame(animate);

            updateBatalla();
            updateJumping();

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        actualizarContador();
    </script>
</body>
</html>
