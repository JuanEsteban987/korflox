<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Visual Script 2008 · Edición Deluxe</title>
    <!-- Drawflow base -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/drawflow@0.0.58/dist/drawflow.min.css">
    <style>
        /* ===== ESTÉTICA 2008 PULIDA =====
           - Más brillos, texturas y sombras
           - Sensación de "programa de autor" de la época
           - Botones con efecto cristal / glossy
           - Fondo con ruido analógico
        */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
        }

        body {
            font-family: 'Tahoma', 'Verdana', 'Segoe UI', sans-serif;
            background: #1b2a3a; /* Fondo más profundo */
            overflow: hidden;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }

        /* BARRA SUPERIOR ESTILO VISTA + TOQUES MEDIA CENTER */
        .toolbar {
            background: linear-gradient(180deg, #3f7ac6 0%, #1f4a9c 50%, #0f2f6a 100%);
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 20px;
            border-bottom: 3px solid #fdd023;
            box-shadow: 0 5px 15px rgba(0,0,0,0.7), inset 0 1px 0 #a0c0ff;
            color: white;
            text-shadow: 2px 2px 0 #0a1e3a;
            font-size: 14px;
            letter-spacing: 0.5px;
            position: relative;
            z-index: 10;
        }

        .toolbar::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 8px, rgba(255,255,255,0.02) 8px, rgba(255,255,255,0.02) 16px);
            pointer-events: none;
        }

        .toolbar h1 {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(180deg, #ffffff, #c7e0ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 3px 3px 0 #0b2550;
            margin-right: 15px;
            font-style: italic;
            letter-spacing: 1px;
        }

        .badge {
            background: #fee38b;
            color: #1f3f6e;
            padding: 5px 18px;
            border-radius: 40px;
            font-weight: bold;
            font-size: 16px;
            border: 2px solid #f5b81b;
            box-shadow: inset 0 2px 5px #ffffdd, 0 4px 0 #7f5f1c, 0 6px 8px black;
            text-shadow: 0 1px 0 white;
            display: inline-flex;
            align-items: center;
            gap: 5px;
        }

        .badge span {
            font-size: 18px;
            background: #203e6b;
            color: #fee38b;
            border-radius: 30px;
            padding: 0px 8px;
            margin-left: 5px;
            border: 1px solid #f5b81b;
        }

        .toolbar button {
            background: linear-gradient(180deg, #f5faff, #b0cdf0);
            border: 2px solid #fde470;
            border-radius: 40px;
            padding: 8px 24px;
            font-weight: bold;
            color: #17315b;
            font-size: 15px;
            box-shadow: 0 5px 0 #7f5f1c, inset 0 2px 10px white;
            cursor: pointer;
            transition: 0.05s linear;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .toolbar button:active {
            transform: translateY(4px);
            box-shadow: 0 1px 0 #7f5f1c, inset 0 2px 6px white;
        }

        /* CONTENEDOR DEL EDITOR — con ruido y textura papel */
        #drawflow-container {
            flex: 1;
            width: 100%;
            background: #4f555d;
            background-image: 
                radial-gradient(circle at 20% 30%, rgba(255,250,210,0.15) 0%, transparent 25%),
                repeating-linear-gradient(45deg, rgba(0,0,0,0.02) 0px, rgba(0,0,0,0.02) 4px, transparent 4px, transparent 12px);
            position: relative;
            overflow: hidden;
            box-shadow: inset 0 0 30px #00000055;
        }

        /* Estilos de nodo aún más detallados */
        .drawflow-node {
            background: transparent !important;
            border: none !important;
            box-shadow: none !important;
            width: auto !important;
        }

        .drawflow-node .node-content {
            background: linear-gradient(135deg, #f6fafe 0%, #d5e2f0 100%);
            border: 4px solid #fde158;
            border-radius: 28px 14px 28px 14px;
            box-shadow: 0 12px 0 #7f5f1c, 0 10px 20px rgba(0,0,0,0.8), inset 0 1px 8px white;
            padding: 14px 18px;
            min-width: 210px;
            font-family: 'Tahoma', 'Verdana', sans-serif;
            color: #11253d;
            transition: all 0.12s ease;
            position: relative;
            backdrop-filter: blur(1px);
            /* textura sutil de ruido */
            background-blend-mode: overlay;
        }

        .drawflow-node .node-content::before {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: repeating-linear-gradient(45deg, transparent, transparent 10px, rgba(0,0,0,0.02) 10px, rgba(0,0,0,0.02) 20px);
            pointer-events: none;
            border-radius: inherit;
        }

        /* brillo glossy exagerado */
        .drawflow-node .node-content::after {
            content: "";
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 45%;
            background: radial-gradient(circle at 15% 15%, rgba(255, 255, 255, 0.9) 0%, rgba(255, 255, 240, 0.4) 50%, transparent 85%);
            pointer-events: none;
            border-radius: 26px 12px 0 0;
        }

        .node-header {
            font-weight: bold;
            font-size: 17px;
            text-align: center;
            padding-bottom: 12px;
            margin-bottom: 14px;
            border-bottom: 3px solid #fecb2f;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: #002d72;
            text-shadow: 0 2px 2px white;
            background: linear-gradient(180deg, #fff9, transparent);
            border-radius: 20px 20px 0 0;
            position: relative;
            z-index: 2;
        }

        .node-inputs, .node-outputs {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 12px;
            margin: 12px 0;
        }

        /* Puertos con efecto 3D más pronunciado */
        .input, .output {
            background: linear-gradient(180deg, #e1edff, #a5bfe5);
            border: 3px solid #133e72;
            border-radius: 40px;
            padding: 6px 18px;
            font-size: 12px;
            font-weight: bold;
            color: #0b2342;
            box-shadow: inset 0 3px 5px white, 0 5px 0 #133e72;
            cursor: crosshair;
            text-align: center;
            min-width: 60px;
            transition: 0.03s linear;
            position: relative;
            text-transform: uppercase;
        }

        .output {
            background: linear-gradient(180deg, #fff2d4, #fccf7a);
            border-color: #ad5f0e;
            box-shadow: inset 0 3px 5px white, 0 5px 0 #ad5f0e;
            color: #5a3a04;
        }

        .input:active, .output:active {
            transform: translateY(4px);
            box-shadow: inset 0 3px 5px white, 0 1px 0 #133e72;
        }

        /* Conexiones con estilo cable de audio vintage */
        .drawflow .connection .main-path {
            stroke: #ffd966 !important;
            stroke-width: 5px !important;
            filter: drop-shadow(0 5px 3px #00000099) drop-shadow(0 0 2px #ffb347);
            stroke-dasharray: 0;
        }

        .drawflow .connection .point {
            fill: #f5b81b;
            stroke: #a15500;
            stroke-width: 3px;
            r: 6;
        }

        /* nodo seleccionado con brillo dorado */
        .drawflow-node.selected .node-content {
            border-color: #ffb703;
            box-shadow: 0 0 0 5px #ffeeaa, 0 12px 0 #7f5f1c, 0 15px 25px black;
        }

        /* clases de tipo con colores más vivos */
        .node-type-event .node-content {
            background: linear-gradient(135deg, #b7d9ff, #4781d4);
        }
        .node-type-action .node-content {
            background: linear-gradient(135deg, #bcf5bc, #4ba84b);
        }
        .node-type-condition .node-content {
            background: linear-gradient(135deg, #fff2b5, #e5b83b);
        }
        .node-type-variable .node-content {
            background: linear-gradient(135deg, #e5c7ff, #9f6fe0);
        }
        .node-type-math .node-content {
            background: linear-gradient(135deg, #ffcf9f, #f57c31);
        }
        .node-type-sound .node-content {
            background: linear-gradient(135deg, #ffb5c8, #db6180);
        }
        .node-type-physics .node-content {
            background: linear-gradient(135deg, #b5e7ff, #3697b5);
        }
        .node-type-io .node-content {
            background: linear-gradient(135deg, #d3c6ff, #8266b0);
        }
        .node-type-network .node-content {
            background: linear-gradient(135deg, #b5f0e6, #2f9688);
        }
        .node-type-animation .node-content {
            background: linear-gradient(135deg, #fcc1f0, #c73e9b);
        }

        /* scrollbar retro mejorado */
        ::-webkit-scrollbar {
            width: 18px;
            background: #32373d;
        }
        ::-webkit-scrollbar-thumb {
            background: linear-gradient(180deg, #d9e2f0, #7b99cf);
            border-radius: 20px;
            border: 3px solid #fecb2f;
            box-shadow: inset 0 1px 4px white;
        }
    </style>
</head>
<body>
    <div class="toolbar">
        <h1>🎮 VISUAL SCRIPT 2008 DX</h1>
        <div class="badge" id="nodeCounter">
            ⚡ NODOS <span id="nodeCountValue">0</span>
        </div>
        <button id="btnRandomConnect">🔀 CONECTAR ALEATORIO</button>
        <button id="btnAddNode">✨ NUEVO NODO</button>
        <button id="btnOrganize">🌀 REORGANIZAR (simple)</button>
        <div style="flex:1; text-align:right; font-size:13px; color:#c7e0ff; text-shadow:1px 1px 0 #102541;">
            ⚙️ 256+ NODOS • MODO RETRO
        </div>
    </div>
    <div id="drawflow-container"></div>

    <script src="https://cdn.jsdelivr.net/npm/drawflow@0.0.58/dist/drawflow.min.js"></script>
    <script>
        (function() {
            // ---------- INICIALIZACIÓN DRAWFLOW ----------
            const container = document.getElementById('drawflow-container');
            const editor = new Drawflow(container);
            editor.start();
            editor.reroute = true;
            editor.grid = true;
            editor.gridsize = 25; // cuadrícula más notoria

            // Almacén de IDs
            let nodeIds = [];
            const nodeCountSpan = document.getElementById('nodeCountValue');

            // ---------- TIPOS DE NODOS EXTENDIDOS (muchos más) ----------
            const tipos = [
                { name: 'event', class: 'node-type-event', color: '#a8d8ff' },
                { name: 'action', class: 'node-type-action', color: '#b8e0b8' },
                { name: 'condition', class: 'node-type-condition', color: '#fff0b0' },
                { name: 'variable', class: 'node-type-variable', color: '#d8b8ff' },
                { name: 'math', class: 'node-type-math', color: '#ffd8b0' },
                { name: 'sound', class: 'node-type-sound', color: '#ffb5c8' },
                { name: 'physics', class: 'node-type-physics', color: '#b5e7ff' },
                { name: 'io', class: 'node-type-io', color: '#d3c6ff' },
                { name: 'network', class: 'node-type-network', color: '#b5f0e6' },
                { name: 'animation', class: 'node-type-animation', color: '#fcc1f0' }
            ];

            // Títulos específicos para cada categoría (más de 100 nombres distintos)
            const titulosPorTipo = {
                event: ['On Start', 'On Update', 'On Collide', 'On Click', 'On Key Press', 'On Timer', 'On Destroy', 'On Spawn', 'On Trigger Enter', 'On Trigger Exit', 'On Health Change', 'On Score', 'On Level Load', 'On Pause', 'On Resume', 'On Game Over', 'On Checkpoint', 'On Respawn'],
                action: ['Move Player', 'Jump', 'Play Sound', 'Spawn Enemy', 'Add Score', 'Destroy Object', 'Play Animation', 'Set Gravity', 'Apply Force', 'Teleport', 'Rotate Object', 'Set Material', 'Play Particle', 'Stop Sound', 'Save Game', 'Load Game', 'Open Door', 'Shoot Projectile', 'Heal Player', 'Set Camera'],
                condition: ['If Health <', 'If Score >', 'Is Grounded', 'Distance <', 'Has Item', 'Button Pressed', 'Random Chance', 'If Variable =', 'If In Zone', 'If Visible', 'If Key Held', 'If Near', 'If Daytime', 'If Timer Done'],
                variable: ['Set Variable', 'Get Variable', 'Global Data', 'Player Data', 'Enemy Var', 'String Concat', 'Increment', 'Decrement', 'Random Int', 'Random Float', 'Format String', 'To Integer', 'To Float', 'Array Get', 'Array Set'],
                math: ['Add', 'Subtract', 'Multiply', 'Divide', 'Random Range', 'Clamp', 'Lerp', 'Sin', 'Cos', 'Tan', 'ArcTan', 'Square Root', 'Absolute', 'Round', 'Floor', 'Ceil', 'Min', 'Max', 'Modulo'],
                sound: ['Play Music', 'Stop Music', 'Set Volume', 'Fade In', 'Fade Out', 'Play SFX', 'Pause Sound', 'Resume Sound', 'Set Pitch', 'Set Pan', 'Play Voice', 'Loop Sound'],
                physics: ['Set Velocity', 'Add Force', 'Set Mass', 'Set Drag', 'Use Gravity', 'Raycast', 'Collision Check', 'Set Trigger', 'Set Kinematic', 'Apply Torque', 'Get Velocity'],
                io: ['Read Input', 'Read Axis', 'Mouse Position', 'Mouse Button', 'Any Key', 'Get Joystick', 'Get Touch', 'Get Accelerometer'],
                network: ['Connect', 'Send Data', 'Receive Data', 'Disconnect', 'Is Connected', 'Ping', 'Host Server', 'Join Room', 'RPC Call', 'Sync Variable'],
                animation: ['Play Anim', 'Stop Anim', 'Set Blend', 'Set Speed', 'Set Layer', 'Crossfade', 'Add Animation Event', 'IK Pass', 'Set Bone']
            };

            // Función para obtener título aleatorio de su tipo
            function getRandomTitle(tipo) {
                const list = titulosPorTipo[tipo] || titulosPorTipo.event;
                return list[Math.floor(Math.random() * list.length)];
            }

            // ---------- GENERAR HTML DEL NODO (con más puertos) ----------
            function generarNodeHTML(titulo, numInputs, numOutputs, tipoClase) {
                let inputsHtml = '';
                for (let i = 0; i < numInputs; i++) {
                    inputsHtml += `<div class="input" data-input="input_${i}">▶ IN ${i+1}</div>`;
                }
                let outputsHtml = '';
                for (let i = 0; i < numOutputs; i++) {
                    outputsHtml += `<div class="output" data-output="output_${i}">OUT ${i+1} ◀</div>`;
                }

                return `
                    <div class="node-content ${tipoClase}">
                        <div class="node-header">${titulo}</div>
                        <div class="node-inputs">${inputsHtml}</div>
                        <div class="node-outputs">${outputsHtml}</div>
                    </div>
                `;
            }

            // ---------- CREAR CANTIDAD MASIVA DE NODOS (256) ----------
            function generarNodosIniciales() {
                const cantidad = 256; // ¡más de 100!
                for (let i = 0; i < cantidad; i++) {
                    const tipoIdx = Math.floor(Math.random() * tipos.length);
                    const tipo = tipos[tipoIdx];
                    const titulo = getRandomTitle(tipo.name);
                    // Ahora pueden tener entre 1 y 4 entradas/salidas
                    const numInputs = Math.floor(Math.random() * 4) + 1;
                    const numOutputs = Math.floor(Math.random() * 4) + 1;
                    const clase = tipo.class;

                    const html = generarNodeHTML(titulo, numInputs, numOutputs, clase);

                    // Distribución más amplia (4200x3200) para que no se solapen tanto
                    const posX = Math.floor(Math.random() * 4000) + 200;
                    const posY = Math.floor(Math.random() * 3000) + 200;

                    try {
                        const nodeId = editor.addNode(html, numInputs, numOutputs, posX, posY, 'node-' + tipo.name, { tipo: tipo.name, titulo });
                        nodeIds.push(nodeId);
                    } catch (e) {
                        console.warn('Error añadiendo nodo', e);
                    }
                }
                actualizarContador();
                // Zoom out para ver la magnitud
                editor.zoom = 0.3;
                editor.offsetX = -800;
                editor.offsetY = -400;
                editor.zoom_refresh();
            }

            // ---------- CONEXIONES ALEATORIAS (más abundantes) ----------
            function conectarNodosAleatorios(cantidad = 80) {
                if (nodeIds.length < 2) return;
                for (let c = 0; c < cantidad; c++) {
                    const fromId = nodeIds[Math.floor(Math.random() * nodeIds.length)];
                    let toId = nodeIds[Math.floor(Math.random() * nodeIds.length)];
                    let attempts = 0;
                    while (toId === fromId && attempts < 10) {
                        toId = nodeIds[Math.floor(Math.random() * nodeIds.length)];
                        attempts++;
                    }
                    if (fromId === toId) continue; // evitar autoconectar

                    const fromNode = editor.getNodeFromId(fromId);
                    const toNode = editor.getNodeFromId(toId);
                    if (!fromNode || !toNode) continue;

                    const numOutputs = fromNode.outputs ? Object.keys(fromNode.outputs).length : 0;
                    const numInputs = toNode.inputs ? Object.keys(toNode.inputs).length : 0;
                    if (numOutputs === 0 || numInputs === 0) continue;

                    const outputKey = 'output_' + Math.floor(Math.random() * numOutputs);
                    const inputKey = 'input_' + Math.floor(Math.random() * numInputs);

                    try {
                        editor.addConnection(fromId, outputKey, toId, inputKey);
                    } catch (e) { /* ignorar conexión inválida */ }
                }
            }

            // ---------- REORGANIZACIÓN SIMPLE (desplazar algunos nodos) ----------
            function reorganizarNodos() {
                // Desplazar cada nodo un poco aleatoriamente para que no estén tan amontonados
                nodeIds.forEach(id => {
                    const node = editor.getNodeFromId(id);
                    if (node) {
                        const newX = node.pos_x + (Math.random() * 200 - 100);
                        const newY = node.pos_y + (Math.random() * 200 - 100);
                        editor.updateNodePos(id, newX, newY);
                    }
                });
            }

            // ---------- AÑADIR NODO EXTRA (cerca del centro visual) ----------
            function agregarNodoExtra() {
                const tipoIdx = Math.floor(Math.random() * tipos.length);
                const tipo = tipos[tipoIdx];
                const titulo = getRandomTitle(tipo.name);
                const numInputs = Math.floor(Math.random() * 4) + 1;
                const numOutputs = Math.floor(Math.random() * 4) + 1;
                const clase = tipo.class;
                const html = generarNodeHTML(titulo, numInputs, numOutputs, clase);

                // Centro aproximado de la vista
                const viewportCenter = container.getBoundingClientRect();
                const posX = editor.offsetX + (viewportCenter.width / 2) / editor.zoom - 100;
                const posY = editor.offsetY + (viewportCenter.height / 2) / editor.zoom - 50;

                const nodeId = editor.addNode(html, numInputs, numOutputs, posX, posY, 'node-' + tipo.name, { tipo: tipo.name, titulo });
                nodeIds.push(nodeId);
                actualizarContador();
            }

            function actualizarContador() {
                nodeCountSpan.innerText = nodeIds.length;
            }

            // ---------- INICIALIZAR ----------
            window.onload = function() {
                generarNodosIniciales();
                setTimeout(() => {
                    conectarNodosAleatorios(110); // muchas conexiones para simular complejidad
                }, 300);

                document.getElementById('btnRandomConnect').addEventListener('click', () => {
                    conectarNodosAleatorios(25);
                });
                document.getElementById('btnAddNode').addEventListener('click', () => {
                    agregarNodoExtra();
                });
                document.getElementById('btnOrganize').addEventListener('click', () => {
                    reorganizarNodos();
                });

                // Exponer editor globalmente (por si se quiere jugar)
                window.editor = editor;
            };
        })();
    </script>
</body>
</html>
