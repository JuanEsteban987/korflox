<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PVZ Creator - Crea tus plantas, zombies y niveles</title>
    <style>
        * {
            box-sizing: border-box;
            user-select: none;
        }
        body {
            background: linear-gradient(145deg, #1a4d2a 0%, #2e7d32 100%);
            font-family: 'Segoe UI', system-ui, sans-serif;
            margin: 0;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
        }
        .game-container {
            background: #5b8c5a;
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 20px 30px rgba(0,0,0,0.5), inset 0 2px 5px rgba(255,255,200,0.4);
            border: 5px solid #7b5e3b;
        }
        .main-panel {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .grid-area {
            background: #3e6b3e;
            padding: 16px;
            border-radius: 24px;
            border: 4px solid #9b7e4b;
            box-shadow: inset 0 0 0 2px #2d4d2d;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(9, 64px);
            grid-template-rows: repeat(5, 64px);
            gap: 6px;
            background: #5f8b4b;
            padding: 8px;
            border-radius: 16px;
        }
        .cell {
            background: #8bb56a;
            border-radius: 12px;
            box-shadow: inset 0 -4px 0 #4b6e3a, 0 2px 5px black;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            cursor: pointer;
            transition: 0.1s ease;
            position: relative;
        }
        .cell.planta { background: #7ec850; box-shadow: inset 0 -4px 0 #3f7a23, 0 2px 0 #1f3f1f; }
        .cell.zombie { background: #6d4c3d; box-shadow: inset 0 -4px 0 #3f2c1f, 0 2px 0 #2d1e15; }
        .cell:hover { filter: brightness(1.1); transform: scale(0.98); }
        .plant-emoji { font-size: 36px; filter: drop-shadow(2px 4px 3px rgba(0,0,0,0.4)); }
        .zombie-emoji { font-size: 34px; filter: drop-shadow(2px 4px 2px #301f12); }
        
        .toolbar {
            background: #c9a87c;
            border-radius: 30px;
            padding: 20px;
            min-width: 260px;
            border: 5px solid #9b7e4b;
            box-shadow: inset 0 2px 10px #efd9a8, 0 8px 0 #6b4f2b;
            color: #2d2d0a;
        }
        h2 {
            margin: 0 0 12px 0;
            text-align: center;
            font-family: 'Courier New', monospace;
            font-weight: 900;
            text-shadow: 2px 2px 0 #b98f47;
        }
        .section {
            background: #b58b54;
            border-radius: 20px;
            padding: 12px;
            margin-bottom: 20px;
            border: 2px solid #eedbaa;
        }
        .item-list {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin: 10px 0;
        }
        .creator-item {
            background: #f7e3b1;
            border-radius: 40px;
            padding: 8px 16px;
            display: flex;
            align-items: center;
            gap: 8px;
            border: 3px solid #8f6b3e;
            font-weight: bold;
            box-shadow: 0 4px 0 #6b4f2b;
        }
        .creator-item button {
            margin-left: auto;
            background: #a75252;
            border: none;
            color: white;
            border-radius: 50%;
            width: 28px;
            height: 28px;
            font-weight: bold;
            cursor: pointer;
            box-shadow: 0 3px 0 #5f3232;
        }
        .creator-item button:hover { background: #c55454; }
        input, select {
            background: #faf0cf;
            border: 3px solid #8b6a40;
            border-radius: 40px;
            padding: 8px 16px;
            font-weight: bold;
            width: 100%;
            margin: 5px 0;
            outline: none;
        }
        .btn {
            background: #fedb7a;
            border: none;
            border-radius: 40px;
            padding: 10px 16px;
            font-weight: 900;
            box-shadow: 0 5px 0 #b37b3a;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.07s linear;
            margin: 4px 0;
            border: 2px solid #ffeab3;
        }
        .btn:active { transform: translateY(5px); box-shadow: none; }
        .btn.play { background: #6fbf4c; box-shadow: 0 5px 0 #2f6b1f; color: white; }
        .share-bar {
            display: flex;
            gap: 8px;
            margin-top: 16px;
        }
        .share-bar input {
            flex: 1;
            background: #e6d8b5;
            font-size: 12px;
            border-radius: 40px;
        }
        .lawn-mower { font-size: 22px; position: absolute; left: 2px; bottom: 0px; filter: drop-shadow(0 4px 2px #333); }
        .sun-counter { 
            background: #f5c542; padding: 4px 12px; border-radius: 40px; font-weight: bold;
            display: inline-block; border: 3px solid #a67c1e; margin-bottom: 8px; box-shadow: 0 4px 0 #7b5e2a;
        }
    </style>
</head>
<body>
<div class="game-container">
    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; background: #ecd59b; padding: 8px 20px; border-radius: 60px; border: 4px solid #a48144;">
        <span class="sun-counter">☀️ <span id="sunDisplay">150</span></span>
        <span style="font-weight: 900; font-size: 22px;">🌱 CREADOR PVZ 🌱</span>
        <span id="waveDisplay" style="background: #3f2530; color: #efc6a0; padding: 6px 14px; border-radius: 30px;">🌊 1/3</span>
    </div>
    <div class="main-panel">
        <div class="grid-area">
            <div class="grid" id="gameGrid"></div>
        </div>
        <div class="toolbar" id="toolbar">
            <h2>🧪 LABORATORIO</h2>
            <div class="section">
                <strong>🌻 PLANTAS CREADAS</strong>
                <div id="plantList" class="item-list"></div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="newPlantName" placeholder="ej: Petacereza" maxlength="12" value="Exploto">
                    <input type="text" id="newPlantEmoji" placeholder="🥦" maxlength="3" value="🍒" style="width: 60px;">
                </div>
                <button class="btn" id="addPlantBtn">➕ CREAR PLANTA</button>
            </div>
            <div class="section">
                <strong>🧟 ZOMBIES CREADOS</strong>
                <div id="zombieList" class="item-list"></div>
                <div style="display: flex; gap: 5px;">
                    <input type="text" id="newZombieName" placeholder="ej: Zombiestrella" value="Rapero">
                    <input type="text" id="newZombieEmoji" placeholder="🧟" maxlength="3" value="🧟‍♂️" style="width: 60px;">
                </div>
                <button class="btn" id="addZombieBtn">➕ CREAR ZOMBIE</button>
            </div>
            <div class="section">
                <strong>⚙️ CONTROLES</strong>
                <button class="btn" id="saveLevelBtn">💾 GUARDAR NIVEL</button>
                <button class="btn" id="loadLevelBtn">📂 CARGAR NIVEL</button>
                <button class="btn play" id="nextWaveBtn">🌊 SIGUIENTE OLEADA</button>
                <button class="btn" id="resetGameBtn">🔄 REINICIAR</button>
            </div>
            <div class="share-bar">
                <input type="text" id="shareUrl" readonly placeholder="Comparte tu nivel..." value="🎮 Listo para compartir">
                <button class="btn" id="copyBtn" style="width: auto;">📋</button>
            </div>
            <p style="font-size: 12px; text-align: center;">Click: planta · Ctrl+Click: zombie · Delete: borra</p>
        </div>
    </div>
</div>

<script>
    (function() {
        // ---------- Estado Global ----------
        const ROWS = 5, COLS = 9;

        // gridData: cada celda: { type: 'planta'|'zombie'|null, emoji: string, nombre: string, idCustom?: string }
        let gridData = Array(ROWS).fill().map(() => Array(COLS).fill(null));

        // colecciones personalizables
        let plantas = JSON.parse(localStorage.getItem('pvz_plantas')) || [
            { nombre: 'Girasol', emoji: '🌻' },
            { nombre: 'LanzaGuisantes', emoji: '🟢' },
            { nombre: 'Nuez', emoji: '🥥' }
        ];
        let zombies = JSON.parse(localStorage.getItem('pvz_zombies')) || [
            { nombre: 'Zombie básico', emoji: '🧟' },
            { nombre: 'Zombie cono', emoji: '🧟‍♂️' },
            { nombre: 'Zombie cubo', emoji: '🧟‍♀️' }
        ];

        // oleadas
        let waves = [ [], [], [] ];  // cada wave: array de { row, col, zombieEmoji, zombieName }
        let currentWave = 0;  // 0,1,2
        let sun = 150;
        let selectedTool = 'planta'; // 'planta' o 'zombie'

        // elemento seleccionado para colocar (índice en la lista)
        let selectedPlantIndex = 0;
        let selectedZombieIndex = 0;

        // ---------- Utilidades ----------
        function saveToStorage() {
            localStorage.setItem('pvz_plantas', JSON.stringify(plantas));
            localStorage.setItem('pvz_zombies', JSON.stringify(zombies));
        }

        // Renderiza grid completo
        function renderGrid() {
            const gridEl = document.getElementById('gameGrid');
            gridEl.innerHTML = '';
            for (let r = 0; r < ROWS; r++) {
                for (let c = 0; c < COLS; c++) {
                    const cell = document.createElement('div');
                    cell.className = 'cell';
                    cell.dataset.row = r;
                    cell.dataset.col = c;

                    const content = gridData[r][c];
                    if (content) {
                        if (content.type === 'planta') {
                            cell.classList.add('planta');
                            const span = document.createElement('span');
                            span.className = 'plant-emoji';
                            span.textContent = content.emoji || '🌱';
                            cell.appendChild(span);
                        } else if (content.type === 'zombie') {
                            cell.classList.add('zombie');
                            const span = document.createElement('span');
                            span.className = 'zombie-emoji';
                            span.textContent = content.emoji || '🧟';
                            cell.appendChild(span);
                        }
                    }
                    // agregar cortadora (opcional, solo primera columna)
                    if (c === 0 && !content) {
                        const mower = document.createElement('span');
                        mower.className = 'lawn-mower';
                        mower.textContent = '🛻';
                        cell.appendChild(mower);
                    }
                    gridEl.appendChild(cell);
                }
            }
            updateSunDisplay();
            updateWaveDisplay();
        }

        function updateSunDisplay() {
            document.getElementById('sunDisplay').innerText = sun;
        }
        function updateWaveDisplay() {
            document.getElementById('waveDisplay').innerHTML = `🌊 ${currentWave+1}/${waves.length}`;
        }

        // poblar listas en toolbar
        function renderLists() {
            const plantListDiv = document.getElementById('plantList');
            const zombieListDiv = document.getElementById('zombieList');
            
            plantListDiv.innerHTML = '';
            plantas.forEach((p, idx) => {
                const div = document.createElement('div');
                div.className = `creator-item ${selectedPlantIndex === idx ? 'selected' : ''}`;
                div.style.background = selectedPlantIndex === idx ? '#f5e57a' : '#f7e3b1';
                div.innerHTML = `<span style="font-size:26px;">${p.emoji}</span> ${p.nombre}`;
                const delBtn = document.createElement('button');
                delBtn.textContent = '✕';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (plantas.length > 1) {
                        plantas.splice(idx, 1);
                        if (selectedPlantIndex >= plantas.length) selectedPlantIndex = plantas.length-1;
                        saveToStorage();
                        renderLists();
                    } else alert('Debe haber al menos 1 planta');
                };
                div.appendChild(delBtn);
                div.onclick = () => {
                    selectedPlantIndex = idx;
                    selectedTool = 'planta';
                    renderLists();
                };
                plantListDiv.appendChild(div);
            });

            zombieListDiv.innerHTML = '';
            zombies.forEach((z, idx) => {
                const div = document.createElement('div');
                div.className = `creator-item ${selectedZombieIndex === idx ? 'selected' : ''}`;
                div.style.background = selectedZombieIndex === idx ? '#d68b6b' : '#f7e3b1';
                div.innerHTML = `<span style="font-size:26px;">${z.emoji}</span> ${z.nombre}`;
                const delBtn = document.createElement('button');
                delBtn.textContent = '✕';
                delBtn.onclick = (e) => {
                    e.stopPropagation();
                    if (zombies.length > 1) {
                        zombies.splice(idx, 1);
                        if (selectedZombieIndex >= zombies.length) selectedZombieIndex = zombies.length-1;
                        saveToStorage();
                        renderLists();
                    } else alert('Debe haber al menos 1 zombie');
                };
                div.appendChild(delBtn);
                div.onclick = () => {
                    selectedZombieIndex = idx;
                    selectedTool = 'zombie';
                    renderLists();
                };
                zombieListDiv.appendChild(div);
            });
        }

        // Colocar en grid
        function handleCellClick(e) {
            const row = parseInt(e.currentTarget.dataset.row);
            const col = parseInt(e.currentTarget.dataset.col);
            const isCtrl = e.ctrlKey || e.metaKey;

            // delete: si se hace click con tecla delete (usamos Alt+Click para simular delete)
            if (e.altKey) {
                gridData[row][col] = null;
                renderGrid();
                return;
            }

            if (isCtrl) { // zombie
                if (selectedTool === 'zombie') {
                    const zombie = zombies[selectedZombieIndex];
                    gridData[row][col] = { type: 'zombie', emoji: zombie.emoji, nombre: zombie.nombre };
                } else {
                    // si no hay zombie seleccionado explícitamente, usar zombie indice actual
                    const zombie = zombies[selectedZombieIndex];
                    gridData[row][col] = { type: 'zombie', emoji: zombie.emoji, nombre: zombie.nombre };
                }
            } else { // planta
                if (selectedTool === 'planta') {
                    const planta = plantas[selectedPlantIndex];
                    gridData[row][col] = { type: 'planta', emoji: planta.emoji, nombre: planta.nombre };
                } else {
                    const planta = plantas[selectedPlantIndex];
                    gridData[row][col] = { type: 'planta', emoji: planta.emoji, nombre: planta.nombre };
                }
            }
            renderGrid();
        }

        // Inicializar eventos en celdas
        function attachGridEvents() {
            document.querySelectorAll('.cell').forEach(cell => {
                cell.removeEventListener('click', handleCellClick);
                cell.addEventListener('click', handleCellClick);
            });
        }

        // Guardar wave actual en waves[currentWave] a partir de grid zombies
        function captureCurrentWave() {
            const waveZombies = [];
            for (let r=0; r<ROWS; r++) {
                for (let c=0; c<COLS; c++) {
                    const cell = gridData[r][c];
                    if (cell && cell.type === 'zombie') {
                        waveZombies.push({ row: r, col: c, emoji: cell.emoji, nombre: cell.nombre });
                    }
                }
            }
            waves[currentWave] = waveZombies;
        }

        // Cargar wave actual en grid (solo zombies, las plantas no se sobrescriben, pero cuidado: normalmente se mezcla)
        function loadWaveIntoGrid() {
            // Primero quitamos todos los zombies del grid
            for (let r=0; r<ROWS; r++) {
                for (let c=0; c<COLS; c++) {
                    if (gridData[r][c] && gridData[r][c].type === 'zombie') {
                        gridData[r][c] = null;
                    }
                }
            }
            // Cargar zombies de la wave actual
            const wave = waves[currentWave] || [];
            wave.forEach(z => {
                if (z.row < ROWS && z.col < COLS) {
                    gridData[z.row][z.col] = { type: 'zombie', emoji: z.emoji, nombre: z.nombre };
                }
            });
            renderGrid();
        }

        // Generar URL para compartir
        function generateShareUrl() {
            const data = {
                plantas: plantas,
                zombies: zombies,
                waves: waves,
                grid: gridData.map(row => row.map(cell => cell ? { type: cell.type, emoji: cell.emoji, nombre: cell.nombre } : null))
            };
            const json = JSON.stringify(data);
            const compressed = btoa(encodeURIComponent(json)); // base64
            const url = new URL(window.location.href);
            url.hash = compressed;
            return url.toString();
        }

        function loadFromHash() {
            if (window.location.hash.length > 1) {
                try {
                    const compressed = window.location.hash.substring(1);
                    const json = decodeURIComponent(atob(compressed));
                    const data = JSON.parse(json);
                    if (data.plantas) plantas = data.plantas;
                    if (data.zombies) zombies = data.zombies;
                    if (data.waves) waves = data.waves;
                    if (data.grid) {
                        gridData = data.grid;
                    }
                    // asegurar waves
                    while (waves.length < 3) waves.push([]);
                    currentWave = 0;
                    saveToStorage();
                    renderLists();
                    loadWaveIntoGrid(); // Esto actualiza grid con zombies de wave0 (plantas se preservan)
                    renderGrid();
                } catch (e) {
                    alert('Error al cargar nivel');
                }
            }
        }

        // ---------- Event Listeners ----------
        document.addEventListener('DOMContentLoaded', () => {
            renderGrid();
            attachGridEvents();
            renderLists();
            loadFromHash(); // si hay hash lo carga

            // Botones
            document.getElementById('addPlantBtn').addEventListener('click', () => {
                const name = document.getElementById('newPlantName').value.trim() || 'Planta';
                const emoji = document.getElementById('newPlantEmoji').value.trim() || '🌿';
                plantas.push({ nombre: name, emoji: emoji });
                saveToStorage();
                renderLists();
            });

            document.getElementById('addZombieBtn').addEventListener('click', () => {
                const name = document.getElementById('newZombieName').value.trim() || 'Zombie';
                const emoji = document.getElementById('newZombieEmoji').value.trim() || '🧟';
                zombies.push({ nombre: name, emoji: emoji });
                saveToStorage();
                renderLists();
            });

            document.getElementById('saveLevelBtn').addEventListener('click', () => {
                captureCurrentWave(); // guarda wave actual
                const url = generateShareUrl();
                document.getElementById('shareUrl').value = url;
            });

            document.getElementById('loadLevelBtn').addEventListener('click', () => {
                const url = prompt('Pega la URL del nivel:');
                if (url) {
                    try {
                        const hash = new URL(url).hash;
                        if (hash) {
                            window.location.hash = hash.substring(1);
                            loadFromHash();
                        }
                    } catch { alert('URL inválida'); }
                }
            });

            document.getElementById('nextWaveBtn').addEventListener('click', () => {
                captureCurrentWave(); // guarda wave actual antes de cambiar
                if (currentWave < waves.length-1) {
                    currentWave++;
                } else {
                    // opcional: añadir otra wave, pero lo dejamos en ciclo 0
                    currentWave = 0;
                }
                loadWaveIntoGrid();
                sun += 50;
                updateSunDisplay();
            });

            document.getElementById('resetGameBtn').addEventListener('click', () => {
                if (confirm('Reiniciar nivel?')) {
                    gridData = Array(ROWS).fill().map(() => Array(COLS).fill(null));
                    waves = [ [], [], [] ];
                    currentWave = 0;
                    sun = 150;
                    renderGrid();
                    updateSunDisplay();
                }
            });

            document.getElementById('copyBtn').addEventListener('click', () => {
                const shareInput = document.getElementById('shareUrl');
                shareInput.select();
                document.execCommand('copy');
                alert('Enlace copiado!');
            });
        });

        // Reattached después de cada render
        const observer = new MutationObserver(() => attachGridEvents());
        observer.observe(document.getElementById('gameGrid'), { childList: true, subtree: true });
    })();
</script>
</body>
</html>
